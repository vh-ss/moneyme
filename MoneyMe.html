  const joinObj = (obj, key) => { const e = Object.entries(obj); return e.length ? e.map(([c,o])=>money(round2(key?o[key]:o),c)).join(' ¬Ј ') : 'вАФ'; };

  const sum = el(`<div class="sumcards" style="margin-top:12px">
    <div class="card sumcard"><div class="k">–Т—Б—М–Њ–≥–Њ (–ї—Ц–Љ—Ц—В)</div><div class="v tabnum">${joinObj(agg,'limit')}</div></div>
    <div class="card sumcard"><div class="k">–Т–Є–Ї–Њ—А–Є—Б—В–∞–љ–Њ</div><div class="v tabnum" style="color:var(--red)">${joinObj(agg,'used')}</div></div>
    <div class="card sumcard"><div class="k">–Ф–Њ—Б—В—Г–њ–љ–Њ</div><div class="v tabnum" style="color:var(--green)">${joinObj(agg,'avail')}</div></div>
    <div class="card sumcard"><div class="k">–Э–∞–≤–∞–љ—В–∞–ґ–µ–љ–љ—П/–Љ—Ц—Б</div><div class="v tabnum" style="color:var(--amber)">${joinObj(burdenByCur,null)}</div></div>
  </div>`);
  app.appendChild(sum);

  if (state.banks.length === 0) {
    app.appendChild(el(`<div class="empty">–Ф–Њ–і–∞–є—В–µ –±–∞–љ–Ї, —Й–Њ–± –≤–µ—Б—В–Є –Ї—А–µ–і–Є—В–љ—Ц –ї—Ц–Љ—Ц—В–Є —В–∞ –Ї—А–µ–і–Є—В–Є.</div>`));
    return;
  }

  // –±–∞–љ–Ї–Є –Ј –љ—Г–ї—М–Њ–≤–Є–Љ –ї—Ц–Љ—Ц—В–Њ–Љ вАФ –њ—А–Є—Е–Њ–≤–∞–љ—Ц, –Ј –Ї–љ–Њ–њ–Ї–Њ—О –њ–Њ–Ї–∞–Ј—Г
  const hidden = state.banks.filter(b => (b.limit || 0) <= 0);
  const visible = showZeroLimitBanks ? state.banks : state.banks.filter(b => (b.limit || 0) > 0);
  if (hidden.length > 0) {
    const t = el(`<div style="margin-top:10px"><button class="btn ghost sm">${showZeroLimitBanks ? `–°—Е–Њ–≤–∞—В–Є –±–∞–љ–Ї–Є –±–µ–Ј –ї—Ц–Љ—Ц—В—Г (${hidden.length})` : `–Я–Њ–Ї–∞–Ј–∞—В–Є –±–∞–љ–Ї–Є –±–µ–Ј –ї—Ц–Љ—Ц—В—Г (${hidden.length})`}</button></div>`);
    t.firstElementChild.onclick = () => { showZeroLimitBanks = !showZeroLimitBanks; render(); };
    app.appendChild(t);
  }

  visible.forEach(bank => {
    const out = bankOutstanding(bank.id);
    const avail = bankAvailable(bank);
    const burden = bankMonthlyBurden(bank.id);
    const usedPct = bank.limit > 0 ? Math.min(100, Math.round(out / bank.limit * 100)) : 0;
    const card = el(`<section class="card" style="padding:16px;margin-top:12px">
      <div class="row" style="justify-content:space-between;align-items:center;gap:8px">
        <h2 style="min-width:0;display:flex;align-items:center;gap:8px"><span class="grip" title="–Я–µ—А–µ—В—П–≥–љ—Ц—В—М, —Й–Њ–± –Ј–Љ—Ц–љ–Є—В–Є –њ–Њ—А—П–і–Њ–Ї –±–∞–љ–Ї—Ц–≤">в†њ</span><span style="min-width:0;overflow:hidden;text-overflow:ellipsis">${esc(bank.name)}</span> <span class="muted small">${curSym(bank.currency)}</span></h2>
        <div class="bankacts" style="display:flex;gap:6px;flex:0 0 auto"></div></div>
      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-top:12px">
        <div><div class="muted small">–Ы—Ц–Љ—Ц—В</div><div class="tabnum" style="font-weight:700">${money(bank.limit,bank.currency)}</div></div>
        <div><div class="muted small">–Т–Є–Ї–Њ—А–Є—Б—В–∞–љ–Њ</div><div class="tabnum" style="font-weight:700">${money(out,bank.currency)}</div></div>
        <div><div class="muted small">–Ф–Њ—Б—В—Г–њ–љ–Њ</div><div class="tabnum" style="font-weight:700;color:${avail<0?'var(--red)':'var(--green)'}">${money(avail,bank.currency)}</div></div>
        <div><div class="muted small">–Э–∞–≤–∞–љ—В–∞–ґ–µ–љ–љ—П/–Љ—Ц—Б</div><div class="tabnum" style="font-weight:700;color:var(--amber)">${money(burden,bank.currency)}</div></div>
      </div>
      <div class="bar" style="margin-top:12px"><i style="width:${usedPct}%;background:${avail<0?'var(--red)':'var(--accent)'}"></i></div>
      <div class="loansbox" style="margin-top:12px"></div>
    </section>`);
    const acts = $('.bankacts', card);
    const addLoan = el(`<button class="btn sm">+ –Ъ—А–µ–і–Є—В</button>`); addLoan.onclick = () => openLoanForm(null, bank.id);
    const edB = el(`<button class="btn ghost sm" title="–†–µ–і–∞–≥—Г–≤–∞—В–Є –±–∞–љ–Ї">вЬО</button>`); edB.onclick = () => openBankForm(bank);
    const delB = el(`<button class="btn danger sm" title="–Т–Є–і–∞–ї–Є—В–Є –±–∞–љ–Ї">вЬХ</button>`);
    delB.onclick = () => deleteWithUndo(`–С–∞–љ–Ї ¬Ђ${bank.name}¬ї –≤–Є–і–∞–ї–µ–љ–Њ`, () => {
      state.banks = state.banks.filter(x=>x.id!==bank.id);
      state.loans = state.loans.filter(l=>l.bank_id!==bank.id);
      state.accounts.forEach(a => { if (a.bank_id === bank.id) a.bank_id = null; });
    });
    acts.appendChild(addLoan); acts.appendChild(edB); acts.appendChild(delB);

    const box = $('.loansbox', card);
    const loans = state.loans.filter(l => l.bank_id === bank.id);
    if (loans.length === 0) box.appendChild(el(`<div class="muted small">–Ъ—А–µ–і–Є—В—Ц–≤ –љ–µ–Љ–∞—Ф.</div>`));
    loans.forEach(l => box.appendChild(loanRow(l, bank)));
    makeReorderable(card, 'bank', bank.id, reorderBank);
    app.appendChild(card);
  });
};

function loanRow(l, bank) {
  const monthly = loanMonthly(l), out = loanOutstanding(l);
  const paidPct = l.principal > 0 ? Math.min(100, Math.round((l.paid||0) / l.principal * 100)) : 0;
  const closed = !loanActive(l);
  const interest = l.has_interest ? `${l.rate||0}% —А—Ц—З–љ–Є—Е` : '–±–µ–Ј –≤—Ц–і—Б–Њ—В–Ї—Ц–≤';
  const node = el(`<div class="card" style="padding:12px;margin-top:8px;${closed?'opacity:.6':''}">
    <div class="row" style="justify-content:space-between;align-items:flex-start;gap:8px">
      <div style="min-width:0">
        <div style="font-weight:600">${esc(l.name||'–Ъ—А–µ–і–Є—В')}${closed?' <span class="muted small">(–Ј–∞–Ї—А–Є—В–Њ)</span>':''}</div>
        <div class="muted small">${money(l.principal,bank.currency)} ¬Ј ${l.months} –Љ—Ц—Б ¬Ј ${interest}${l.due_date?' ¬Ј —Б–њ–Є—Б–∞–љ–љ—П '+fmtDate(l.due_date):''}</div>
      </div>
      <div style="text-align:right;flex:0 0 auto">
        <div class="tabnum" style="font-weight:700;color:var(--amber)">${money(monthly,bank.currency)}/–Љ—Ц—Б</div>
        <div class="muted small">–Ј–∞–ї–Є—И–Њ–Ї ${money(out,bank.currency)}</div>
      </div>
    </div>
    <div class="bar" style="margin-top:8px"><i style="width:${paidPct}%;background:var(--green)"></i></div>
    <div class="row" style="justify-content:space-between;align-items:center;margin-top:6px">
      <span class="muted small">–Т–Є–њ–ї–∞—З–µ–љ–Њ ${money(l.paid||0,bank.currency)} –Ј ${money(l.principal,bank.currency)} (${paidPct}%)</span>
      <span class="loanacts" style="display:flex;gap:6px"></span>
    </div>
  </div>`);
  const acts = $('.loanacts', node);
  if (!closed) {
    const pay = el(`<button class="btn sm" title="–Т–љ–µ—Б—В–Є –њ–ї–∞—В—Ц–ґ –Ј–∞ –Љ—Ц—Б—П—Ж—М">–Я–ї–∞—В—Ц–ґ</button>`);
    pay.onclick = () => openLoanPayment(l, bank);
    acts.appendChild(pay);
    if (l.has_interest && l.rate > 0) { const po = el(`<button class="btn ghost sm" title="–Ъ–∞–ї—М–Ї—Г–ї—П—В–Њ—А –і–Њ—Б—В—А–Њ–Ї–Њ–≤–Њ–≥–Њ –њ–Њ–≥–∞—И–µ–љ–љ—П">–Ф–Њ—Б—В—А–Њ–Ї–Њ–≤–Њ</button>`); po.onclick = () => openPayoff(l, bank); acts.appendChild(po); }
  }
  const ed = el(`<button class="btn ghost sm">вЬО</button>`); ed.onclick = () => openLoanForm(l);
  const del = el(`<button class="btn danger sm">вЬХ</button>`);
  del.onclick = () => deleteWithUndo('–Ъ—А–µ–і–Є—В –≤–Є–і–∞–ї–µ–љ–Њ', () => { state.loans = state.loans.filter(x=>x.id!==l.id); });
  acts.appendChild(ed); acts.appendChild(del);
  return node;
}

// –Т–љ–µ—Б–µ–љ–љ—П –њ–ї–∞—В–µ–ґ—Г: —Б—Г–Љ–∞ –Ј–∞ –Љ—Ц—Б—П—Ж—М —А–∞—Е—Г—Ф—В—М—Б—П –∞–≤—В–Њ–Љ–∞—В–Є—З–љ–Њ, –Ї–Њ—А–Є—Б—В—Г–≤–∞—З –њ—Ц–і—В–≤–µ—А–і–ґ—Г—Ф (–∞–±–Њ –Ј–Љ—Ц–љ—О—Ф).
// –ѓ–Ї—Й–Њ –Њ–±—А–∞–љ–Њ —А–∞—Е—Г–љ–Њ–Ї вАФ —Б—В–≤–Њ—А—О—Ф—В—М—Б—П –Њ–њ–µ—А–∞—Ж—Ц—П ¬Ђ–≤–Є—В—А–∞—В–∞¬ї –љ–∞ —Б—Г–Љ—Г –њ–ї–∞—В–µ–ґ—Г.
function openLoanPayment(l, bank) {
  const monthly = loanMonthly(l);
  const out = loanOutstanding(l);
  const pay = round2(Math.min(monthly, out));
  // —А–∞—Е—Г–љ–Ї–Є —В—Ц—Ф—Ч –ґ –≤–∞–ї—О—В–Є вАФ —Б–њ–µ—А—И—Г
  const accs = [...state.accounts].sort((a,b) => (b.currency_code===bank.currency) - (a.currency_code===bank.currency));
  const expCats = state.categories.filter(c => c.kind === 'EXPENSE');
  const defCat = expCats.find(c => /–Ї—А–µ–і–Є—В/i.test(c.name));

  const body = el(`<div>
    <div class="preview">
      <div class="pl"><span class="muted">–Я–ї–∞—В—Ц–ґ –Ј–∞ –Љ—Ц—Б—П—Ж—М (–∞–≤—В–Њ)</span><b style="color:var(--amber)">${money(pay,bank.currency)}</b></div>
      <div class="pl"><span class="muted">–Я–Њ—В–Њ—З–љ–Є–є –Ј–∞–ї–Є—И–Њ–Ї</span><b>${money(out,bank.currency)}</b></div>
      <div class="pl"><span class="muted">–Ч–∞–ї–Є—И–Њ–Ї –њ—Ц—Б–ї—П –њ–ї–∞—В–µ–ґ—Г</span><b id="pp-after">вАФ</b></div>
    </div>
    <div><label class="lab">–°—Г–Љ–∞ –њ–ї–∞—В–µ–ґ—Г (${curSym(bank.currency)})</label><input id="pp-amt" inputmode="decimal" value="${pay}"></div>
    <div><label class="lab">–°–њ–Є—Б–∞—В–Є –Ј —А–∞—Е—Г–љ–Ї—Г (—П–Ї ¬Ђ–≤–Є—В—А–∞—В—Г¬ї)</label><select id="pp-acc">
      <option value="">вАФ –љ–µ —Б—В–≤–Њ—А—О–≤–∞—В–Є –Њ–њ–µ—А–∞—Ж—Ц—О вАФ</option>
      ${accs.map(a=>`<option value="${a.id}">${esc(a.name)} (${curSym(a.currency_code)})</option>`).join('')}
    </select></div>
    <div class="row">
      <div style="flex:1"><label class="lab">–Ъ–∞—В–µ–≥–Њ—А—Ц—П</label><select id="pp-cat"><option value="">–С–µ–Ј –Ї–∞—В–µ–≥–Њ—А—Ц—Ч</option>${expCats.map(c=>`<option value="${c.id}">${c.icon?c.icon+' ':''}${esc(c.name)}</option>`).join('')}</select></div>
      <div style="flex:1"><label class="lab">–Ф–∞—В–∞</label><input id="pp-date" type="date" value="${todayISO()}"></div>
    </div>
    <div class="muted small">–ѓ–Ї—Й–Њ –Њ–±—А–∞–љ–Њ —А–∞—Е—Г–љ–Њ–Ї вАФ —Б—В–≤–Њ—А–Є—В—М—Б—П –Њ–њ–µ—А–∞—Ж—Ц—П ¬Ђ–≤–Є—В—А–∞—В–∞¬ї –љ–∞ —Б—Г–Љ—Г –њ–ї–∞—В–µ–ґ—Г.</div>
    <div id="pp-close-note" class="small hidden" style="color:var(--green)">–Я—Ц—Б–ї—П —Ж—М–Њ–≥–Њ –њ–ї–∞—В–µ–ґ—Г –Ї—А–µ–і–Є—В –±—Г–і–µ –Ј–∞–Ї—А–Є—В–Њ.</div>
    <div id="pp-curwarn" class="small hidden" style="color:var(--amber)"></div>
    <button class="btn ghost sm" id="pp-full" style="margin-top:6px">–Ч–∞–Ї—А–Є—В–Є –Ї—А–µ–і–Є—В –њ–Њ–≤–љ—Ц—Б—В—О</button>
  </div>`);
  const $$ = (s) => $(s, body);
  // –Ј–∞ –Ј–∞–Љ–Њ–≤—З—Г–≤–∞–љ–љ—П–Љ вАФ –Њ—Б–љ–Њ–≤–љ–Є–є —А–∞—Е—Г–љ–Њ–Ї –±–∞–љ–Ї—Г; —Ц–љ–∞–Ї—И–µ –њ–µ—А—И–Є–є —А–∞—Е—Г–љ–Њ–Ї —В—Ц—Ф—Ч –ґ –≤–∞–ї—О—В–Є
  const primaryOk = bank.primary_account_id && state.accounts.some(a => a.id === bank.primary_account_id);
  if (primaryOk) $$('#pp-acc').value = String(bank.primary_account_id);
  else if (accs.length && accs[0].currency_code === bank.currency) $$('#pp-acc').value = String(accs[0].id);
  if (defCat) $$('#pp-cat').value = String(defCat.id);

  function upd() {
    let amt = Math.max(0, Math.min(round2(num($$('#pp-amt').value)), out));
    $$('#pp-after').textContent = money(round2(out - amt), bank.currency);
    $$('#pp-close-note').classList.toggle('hidden', round2(out - amt) > 0.005);
    const acc = $$('#pp-acc').value ? state.accounts.find(a=>a.id===parseInt($$('#pp-acc').value)) : null;
    const warn = $$('#pp-curwarn');
    if (acc && acc.currency_code !== bank.currency) {
      warn.textContent = `–£–≤–∞–≥–∞: –≤–∞–ї—О—В–∞ —А–∞—Е—Г–љ–Ї—Г (${curSym(acc.currency_code)}) –≤—Ц–і—А—Ц–Ј–љ—П—Ф—В—М—Б—П –≤—Ц–і ${curSym(bank.currency)}; —Б—Г–Љ—Г —Б–њ–Є—И–µ—В—М—Б—П —П–Ї —Ф.`;
      warn.classList.remove('hidden');
    } else warn.classList.add('hidden');
  }
  body.addEventListener('input', upd); body.addEventListener('change', upd); upd();

  function apply(amount, close) {
    amount = Math.min(round2(amount), loanOutstanding(l));
    if (amount <= 0) return;
    l.paid = round2(Math.min(l.principal, (l.paid || 0) + amount));
    if (l.due_date && loanActive(l)) l.due_date = addMonthsISO(l.due_date, 1);   // –љ–∞—Б—В—Г–њ–љ–µ —Б–њ–Є—Б–∞–љ–љ—П вАФ –Ј–∞ –Љ—Ц—Б—П—Ж—М
    const accId = $$('#pp-acc').value ? parseInt($$('#pp-acc').value) : null;
    if (accId) {
      const catId = $$('#pp-cat').value ? parseInt($$('#pp-cat').value) : null;
      state.transactions.push({
        id: nextId('tx'), ord: nextOrd(), kind: 'EXPENSE',
        date: $$('#pp-date').value || todayISO(),
        note: '–Я–ї–∞—В—Ц–ґ –Ј–∞ –Ї—А–µ–і–Є—В–Њ–Љ ¬Ђ' + (l.name || '–Ъ—А–µ–і–Є—В') + '¬ї',
        account_id: accId, category_id: catId, amount, loan_id: l.id,
      });
    }
    save(); close(); render();
  }

  const close = openModal('–Я–ї–∞—В—Ц–ґ вАФ ' + (l.name || '–Ъ—А–µ–і–Є—В'), body, {
    saveLabel: '–Я—Ц–і—В–≤–µ—А–і–Є—В–Є –њ–ї–∞—В—Ц–ґ',
    onSave: (close) => apply(round2(num($$('#pp-amt').value)), close),
  });
  $$('#pp-full').onclick = () => {
    if (confirm(`–Ч–∞–Ї—А–Є—В–Є –Ї—А–µ–і–Є—В ¬Ђ${l.name || '–Ъ—А–µ–і–Є—В'}¬ї –њ–Њ–≤–љ—Ц—Б—В—О? –Ч–∞–ї–Є—И–Њ–Ї ${money(loanOutstanding(l), bank.currency)} –±—Г–і–µ –њ–Њ–≥–∞—И–µ–љ–Њ${$$('#pp-acc').value ? ' —Ц —Б—В–≤–Њ—А–µ–љ–Њ –Њ–њ–µ—А–∞—Ж—Ц—О ¬Ђ–≤–Є—В—А–∞—В–∞¬ї' : ''}.`)) {
      apply(loanOutstanding(l), close);
    }
  };
}

function openBankForm(existing) {
  const e = existing || { currency:'UAH', limit:0 };
  const linked = existing ? state.accounts.filter(a => a.bank_id === existing.id) : [];
  const body = el(`<div>
    <div><label class="lab">–Э–∞–Ј–≤–∞ –±–∞–љ–Ї—Г</label><input id="b-name" value="${esc(e.name||'')}" placeholder="–љ–∞–њ—А. –Я—А–Є–≤–∞—В–С–∞–љ–Ї"></div>
    <div class="row">
      <div style="flex:1"><label class="lab">–Т–∞–ї—О—В–∞</label><select id="b-cur">${CURRENCIES.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
      <div style="flex:1"><label class="lab">–Ъ—А–µ–і–Є—В–љ–Є–є –ї—Ц–Љ—Ц—В (–Љ–∞–Ї—Б–Є–Љ—Г–Љ)</label><input id="b-limit" inputmode="decimal" value="${e.limit ?? 0}"></div>
    </div>
    <div><label class="lab">–Ю—Б–љ–Њ–≤–љ–Є–є —А–∞—Е—Г–љ–Њ–Ї (–і–ї—П –њ–ї–∞—В–µ–ґ—Ц–≤ –Ј–∞ –Ї—А–µ–і–Є—В–∞–Љ–Є)</label><select id="b-primary">
      <option value="">вАФ –љ–µ –≤–Ї–∞–Ј–∞–љ–Њ вАФ</option>
      ${linked.map(a=>`<option value="${a.id}">${esc(a.name)} (${curSym(a.currency_code)})</option>`).join('')}
    </select>
    ${existing && linked.length === 0 ? `<div class="muted small" style="margin-top:4px">–Я—А–Є–≤ Љ—П–ґ—Ц—В—М —А–∞—Е—Г–љ–Ї–Є –і–Њ —Ж—М–Њ–≥–Њ –±–∞–љ–Ї—Г —Г –≤–Ї–ї–∞–і—Ж—Ц ¬Ђ–†–∞—Е—Г–љ–Ї–Є¬ї, —Й–Њ–± –Њ–±—А–∞—В–Є –Њ—Б–љ–Њ–≤–љ–Є–є.</div>` : ''}</div>
    <div class="err hidden" id="b-err"></div>
  </div>`);
  $('#b-cur', body).value = e.currency || 'UAH';
  $('#b-primary', body).value = e.primary_account_id ? String(e.primary_account_id) : '';
  openModal(existing?'–†–µ–і–∞–≥—Г–≤–∞—В–Є –±–∞–љ–Ї':'–Э–Њ–≤–Є–є –±–∞–љ–Ї', body, { onSave: (close) => {
    const name = $('#b-name', body).value.trim();
    const err = $('#b-err', body);
    if (!name) { err.textContent = '–Т–≤–µ–і—Ц—В—М –љ–∞–Ј–≤—Г'; err.classList.remove('hidden'); return; }
    const rec = { name, currency: $('#b-cur',body).value, limit: round2(num($('#b-limit',body).value)),
      primary_account_id: $('#b-primary',body).value ? parseInt($('#b-primary',body).value) : null };
    if (existing) Object.assign(existing, rec);
    else { rec.id = nextId('bank'); state.banks.push(rec); }
    save(); close(); render();
  }});
}

function openLoanForm(existing, presetBankId) {
  if (state.banks.length === 0) { alert('–°–њ–µ—А—И—Г –і–Њ–і–∞–є—В–µ –±–∞–љ–Ї.'); return; }
  const e = existing || { bank_id: presetBankId ?? state.banks[0].id, months:12, has_interest:false, rate:0, paid:0, due_date: todayISO() };
  const body = el(`<div>
    <div><label class="lab">–С–∞–љ–Ї</label><select id="l-bank">${state.banks.map(b=>`<option value="${b.id}">${esc(b.name)} (${curSym(b.currency)})</option>`).join('')}</select></div>
    <div><label class="lab">–Ю–њ–Є—Б</label><input id="l-name" value="${esc(e.name||'')}" placeholder="–љ–∞–њ—А. –†–Њ–Ј—Б—В—А–Њ—З–Ї–∞ –љ–∞ —Е–Њ–ї–Њ–і–Є–ї—М–љ–Є–Ї"></div>
    <div class="row">
      <div style="flex:1"><label class="lab">–°—Г–Љ–∞ –Ї—А–µ–і–Є—В—Г</label><input id="l-amt" inputmode="decimal" value="${e.principal ?? ''}"></div>
      <div style="flex:1"><label class="lab">–Ъ—Ц–ї—М–Ї—Ц—Б—В—М –Љ—Ц—Б—П—Ж—Ц–≤</label><input id="l-months" inputmode="numeric" value="${e.months ?? 12}"></div>
    </div>
    <div class="row">
      <div style="flex:1"><label class="lab">–Т—Ц–і—Б–Њ—В–Ї–Є</label><select id="l-hasint"><option value="0">–С–µ–Ј –≤—Ц–і—Б–Њ—В–Ї—Ц–≤</option><option value="1">–Ч –≤—Ц–і—Б–Њ—В–Ї–∞–Љ–Є</option></select></div>
      <div style="flex:1" id="l-ratewrap"><label class="lab">–°—В–∞–≤–Ї–∞, % —А—Ц—З–љ–Є—Е</label><input id="l-rate" inputmode="decimal" value="${e.rate ?? 0}"></div>
    </div>
    <div class="row">
      <div style="flex:1"><label class="lab">–Ф–∞—В–∞ —Б–њ–Є—Б–∞–љ–љ—П</label><input id="l-due" type="date" value="${e.due_date || todayISO()}"></div>
      <div style="flex:1"><label class="lab">–Т–ґ–µ –≤–Є–њ–ї–∞—З–µ–љ–Њ</label><input id="l-paid" inputmode="decimal" value="${e.paid ?? 0}"></div>
    </div>
    <div class="muted small" style="margin-top:-4px">–¶–µ –њ–Њ—З–∞—В–Ї–Њ–≤–µ –Ј–љ–∞—З–µ–љ–љ—П. –Я–Њ–і–∞–ї—М—И—Ц –њ–ї–∞—В–µ–ґ—Ц –≤–љ–Њ—Б—М—В–µ –Ї–љ–Њ–њ–Ї–Њ—О ¬Ђ–Я–ї–∞—В—Ц–ґ¬ї вАФ —В–Њ–і—Ц —Б—В–≤–Њ—А—О—Ф—В—М—Б—П –Њ–њ–µ—А–∞—Ж—Ц—П –є –Њ–љ–Њ–≤–ї—О—Ф—В—М—Б—П –±–∞–ї–∞–љ—Б.</div>
    <div class="preview">
      <div class="pl"><span class="muted">–Я–ї–∞—В—Ц–ґ –Ј–∞ –Љ—Ц—Б—П—Ж—М</span><b style="color:var(--amber)" id="l-monthly">вАФ</b></div>
      <div class="pl"><span class="muted">–Ч–∞–ї–Є—И–Њ–Ї –±–Њ—А–≥—Г</span><b id="l-out">вАФ</b></div>
    </div>
    <div class="err hidden" id="l-err"></div>
  </div>`);
  const $$ = (s) => $(s, body);
  $$('#l-bank').value = e.bank_id;
  $$('#l-hasint').value = e.has_interest ? '1' : '0';
  function upd() {
    const hasInt = $$('#l-hasint').value === '1';
    $$('#l-ratewrap').style.display = hasInt ? '' : 'none';
    const bank = bankById(parseInt($$('#l-bank').value));
    const cur = bank ? bank.currency : 'UAH';
    const tmp = { principal: num($$('#l-amt').value), months: parseInt($$('#l-months').value)||1,
      has_interest: hasInt, rate: num($$('#l-rate').value), paid: num($$('#l-paid').value) };
    $$('#l-monthly').textContent = money(loanMonthly(tmp), cur) + '/–Љ—Ц—Б';
    $$('#l-out').textContent = money(loanOutstanding(tmp), cur);
  }
  body.addEventListener('input', upd); body.addEventListener('change', upd); upd();

  openModal(existing?'–†–µ–і–∞–≥—Г–≤–∞—В–Є –Ї—А–µ–і–Є—В':'–Э–Њ–≤–Є–є –Ї—А–µ–і–Є—В', body, { onSave: (close) => {
    const err = $$('#l-err'); const show = (m) => { err.textContent = m; err.classList.remove('hidden'); };
    const principal = round2(num($$('#l-amt').value));
    const months = parseInt($$('#l-months').value);
    if (principal <= 0) return show('–Т–≤–µ–і—Ц—В—М —Б—Г–Љ—Г –Ї—А–µ–і–Є—В—Г');
    if (!months || months < 1) return show('–Т–≤–µ–і—Ц—В—М –Ї—Ц–ї—М–Ї—Ц—Б—В—М –Љ—Ц—Б—П—Ж—Ц–≤');
    const hasInt = $$('#l-hasint').value === '1';
    const rec = {
      bank_id: parseInt($$('#l-bank').value), name: $$('#l-name').value.trim() || null,
      principal, months, has_interest: hasInt, rate: hasInt ? num($$('#l-rate').value) : 0,
      due_date: $$('#l-due').value || null, paid: round2(Math.max(0, num($$('#l-paid').value))),
    };
    if (existing) Object.assign(existing, rec);
    else { rec.id = nextId('loan'); state.loans.push(rec); }
    save(); close(); render();
  }});
}

//==================== –°—В–∞—А—В ====================
navigate(hashView() || 'dashboard');   // –≤—Ц–і–Ї—А–Є–≤–∞—Ф–Љ–Њ –≤–Ї–ї–∞–і–Ї—Г –Ј URL (–Ј–±–µ—А—Ц–≥–∞—Ф—В—М—Б—П –њ—А–Є F5)
ensureRatesFresh();
ensureDailySnapshot();   // —В–Њ—З–Ї–∞ –≤—Ц–і–љ–Њ–≤–ї–µ–љ–љ—П –љ–∞ —Б—М–Њ–≥–Њ–і–љ—Ц
maybeAutoBackup();       // –Њ–њ—Ж—Ц–є–љ–µ –∞–≤—В–Њ–Ј–∞–≤–∞–љ—В–∞–ґ–µ–љ–љ—П –±–µ–Ї–∞–њ—Г
</script>
</body>
</html>
