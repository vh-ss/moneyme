<!doctype html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MoneyMe вАФ –Њ–±–ї—Ц–Ї —Д—Ц–љ–∞–љ—Б—Ц–≤</title>
<style>
  :root {
    --bg: #f1f5f9; --card: #fff; --ink: #1e293b; --muted: #64748b; --line: #e2e8f0;
    --ink2: #0f172a; --green: #16a34a; --red: #dc2626; --amber: #d97706; --accent: #0f172a;
    --hover: #f1f5f9; --chip: #e2e8f0; --chiphover: #cbd5e1; --accenthover: #334155;
    --input: #fff; --inputline: #cbd5e1; --headbg: rgba(255,255,255,.85);
    --softline: #f1f5f9; --dangerbg: #fee2e2; --tip: #eff6ff;
  }
  html[data-theme="dark"] {
    --bg: #0b1220; --card: #131c2e; --ink: #e5e9f0; --muted: #94a3b8; --line: #273043;
    --ink2: #f1f5f9; --green: #34d399; --red: #f87171; --amber: #fbbf24; --accent: #6366f1;
    --hover: #1e2a3f; --chip: #1e2a3f; --chiphover: #273043; --accenthover: #4f46e5;
    --input: #0f1726; --inputline: #334155; --headbg: rgba(13,20,34,.88);
    --softline: #1b2436; --dangerbg: #3b1d1d; --tip: #16233b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: 'Segoe UI', system-ui, Roboto, sans-serif; font-size: 15px;
  }
  button { font-family: inherit; cursor: pointer; }
  .wrap { max-width: 920px; margin: 0 auto; padding: 0 16px 60px; }

  header {
    position: sticky; top: 0; z-index: 30; background: var(--headbg);
    backdrop-filter: blur(8px); border-bottom: 1px solid var(--line);
  }
  .nav { max-width: 1180px; margin: 0 auto; display: flex; align-items: center; gap: 3px;
    padding: 10px 16px; overflow-x: auto; }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 18px; margin-right: 14px; white-space: nowrap; }
  .brand .logo { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 9px; background: var(--accent); color: #fff; }
  .nav a { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 10px; color: var(--muted); text-decoration: none; font-weight: 500; white-space: nowrap; font-size: 14px; }
  .nav a.active { background: var(--accent); color: #fff; }
  .nav a:hover:not(.active) { background: var(--hover); }
  .nav a .ni { font-size: 15px; line-height: 1; }
  .navlang { margin-left: auto; border: 1px solid var(--line); background: transparent; color: var(--muted);
    border-radius: 8px; padding: 5px 9px; font-weight: 700; font-size: 12px; cursor: pointer; white-space: nowrap; flex: 0 0 auto; }
  .navlang:hover { background: var(--hover); }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  h1 { font-size: 22px; margin: 22px 0 14px; }
  h2 { font-size: 16px; margin: 0; }
  .muted { color: var(--muted); }
  .small { font-size: 13px; }
  .row { display: flex; gap: 12px; }
  .grid { display: grid; gap: 12px; }
  .tabnum { font-variant-numeric: tabular-nums; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    border: 0; border-radius: 11px; padding: 9px 15px; font-size: 14px; font-weight: 600; background: var(--chip); color: var(--ink); }
  .btn:hover { background: var(--chiphover); }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accenthover); }
  .btn.ghost { background: transparent; color: var(--muted); }
  .btn.ghost:hover { background: var(--hover); }
  .btn.danger { background: transparent; color: var(--red); }
  .btn.danger:hover { background: var(--dangerbg); }
  .btn.sm { padding: 5px 9px; font-size: 13px; border-radius: 8px; }

  label.lab { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin: 0 0 4px; }
  input, select { width: 100%; border: 1px solid var(--inputline); border-radius: 11px; padding: 9px 11px; font-size: 14px; font-family: inherit; outline: none; background: var(--input); color: var(--ink); }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  input[type=date]::-webkit-calendar-picker-indicator { filter: var(--cal-filter, none); }
  html[data-theme="dark"] { --cal-filter: invert(1) brightness(1.4); }

  .quick { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
  .quick button { display: flex; align-items: center; justify-content: center; gap: 12px; border: 0; border-radius: 18px; padding: 18px; font-size: 16px; font-weight: 700; }
  .quick .exp { background: #fef2f2; color: var(--red); } .quick .exp:hover { background: #fee2e2; }
  .quick .inc { background: #f0fdf4; color: var(--green); } .quick .inc:hover { background: #dcfce7; }
  html[data-theme="dark"] .quick .exp { background: #3b1d1d; } html[data-theme="dark"] .quick .exp:hover { background: #4a2424; }
  html[data-theme="dark"] .quick .inc { background: #16301f; } html[data-theme="dark"] .quick .inc:hover { background: #1c3d28; }
  .quick.sm button { padding: 12px; font-size: 15px; border-radius: 14px; }
  .quick.sm .dot { width: 30px; height: 30px; font-size: 21px; }
  .quick .dot { width: 40px; height: 40px; border-radius: 999px; display: grid; place-items: center; color: #fff; font-size: 26px; line-height: 1; }
  .quick .exp .dot { background: var(--red); } .quick .inc .dot { background: var(--green); }

  .accgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  /* –Ј–∞–≥–Њ–ї–Њ–≤–Њ–Ї —Б–µ–Ї—Ж—Ц—Ч –Ј –њ—Ц–і–Ї–∞–Ј–Ї–Њ—О –њ—А–∞–≤–Њ—А—Г—З */
  .sechead { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 8px; }
  .sechead h2 { margin: 0; }
  .sechead .hint { text-align: right; }
  .acc { border-top: 4px solid #999; padding: 14px; border-radius: 16px; background: var(--card); border: 1px solid var(--line); cursor: grab; user-select: none; touch-action: none; }
  .acc:active { cursor: grabbing; }
  .acc.dragover { box-shadow: 0 0 0 2px var(--accent); }
  .acc.dragging { opacity: .4; }
  .acc .top { display: flex; justify-content: space-between; align-items: center; }
  .acc .name { font-weight: 600; font-size: 14px; }
  .acc .type { font-size: 10px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
  .acc .bal { margin-top: 10px; font-size: 22px; font-weight: 800; }

  .txrow { display: flex; align-items: center; gap: 12px; padding: 10px 4px; border-bottom: 1px solid var(--softline); }
  .txrow:last-child { border-bottom: 0; }
  .txicon { width: 36px; height: 36px; border-radius: 999px; display: grid; place-items: center; font-size: 15px; flex: 0 0 auto; }
  .txmain { flex: 1; min-width: 0; }
  .txtitle { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txsub { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txamt { font-weight: 700; font-size: 14px; }

  .pill { display: inline-flex; background: var(--chip); border-radius: 11px; padding: 3px; gap: 3px; }
  .pill button { border: 0; background: transparent; padding: 6px 14px; border-radius: 9px; font-weight: 600; font-size: 14px; color: var(--muted); }
  .pill button.on { background: var(--card); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.08); }

  .sumcards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 12px; }
  .sumcard { padding: 14px; }
  .sumcard .k { font-size: 12px; color: var(--muted); }
  .sumcard .v { font-size: 20px; font-weight: 800; margin-top: 3px; }

  .draggable { cursor: grab; }
  .draggable:active { cursor: grabbing; }
  .dragging { opacity: .4; }
  .card.dragover { box-shadow: 0 0 0 2px var(--accent); }
  .txrow.dragover { background: var(--tip); border-radius: 8px; }
  .grip { color: var(--inputline); font-size: 18px; cursor: grab; flex: 0 0 auto; padding: 2px 2px; }
  .draghandle { touch-action: none; cursor: grab; }
  .draghandle:active { cursor: grabbing; }
  .bar { height: 7px; background: var(--chip); border-radius: 999px; overflow: hidden; }
  .bar > i { display: block; height: 100%; background: var(--accent); }
  .curchip { border: 1px solid var(--line); background: var(--card); color: var(--muted); border-radius: 999px; padding: 3px 11px; font-size: 12px; font-weight: 600; }
  .curchip:hover { background: var(--hover); }
  .curchip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .notice { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; border-radius: 12px; padding: 10px 12px; font-size: 13px; }
  html[data-theme="dark"] .notice { background: #2a230d; border-color: #5b4a13; color: #fcd34d; }
  .ctxmenu { position: fixed; z-index: 60; min-width: 190px; background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,.28); padding: 6px; }
  .ctxmenu .ci { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border-radius: 9px;
    font-size: 14px; cursor: pointer; }
  .ctxmenu .ci:hover { background: var(--hover); }
  .ctxmenu .ci .cdot { width: 22px; height: 22px; border-radius: 999px; display: grid; place-items: center;
    color: #fff; font-weight: 700; font-size: 15px; line-height: 1; flex: 0 0 auto; }
  .ctxmenu .chead { padding: 6px 11px 4px; font-size: 12px; color: var(--muted); font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ctxmenu .sep { height: 1px; background: var(--line); margin: 4px 6px; }

  .swatches { display: flex; flex-wrap: wrap; gap: 8px; }
  .swatch { width: 28px; height: 28px; border-radius: 999px; border: 0; }
  .swatch.sel { box-shadow: 0 0 0 2px var(--card), 0 0 0 4px var(--accent); }

  /* modal */
  .overlay { position: fixed; inset: 0; background: rgba(15,23,42,.45); display: grid; place-items: center; padding: 16px; z-index: 50; }
  .modal { width: 100%; max-width: 430px; max-height: 90vh; overflow-y: auto; padding: 20px; }
  .modal .mhead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .modal .mhead h2 { font-size: 18px; }
  .modal .x { border: 0; background: transparent; font-size: 22px; color: var(--muted); line-height: 1; }
  .modal .mbody > * + * { margin-top: 12px; }
  .mfoot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  .preview { border: 1px solid var(--line); border-radius: 12px; padding: 12px; font-size: 14px; }
  .preview .pl { display: flex; justify-content: space-between; }
  .preview .pl + .pl { margin-top: 4px; }
  .err { color: var(--red); font-size: 13px; }
  .empty { text-align: center; color: var(--muted); padding: 28px 0; }
  .legend { list-style: none; margin: 0; padding: 0; font-size: 14px; }
  .legend li { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
  .legend .ld { width: 12px; height: 12px; border-radius: 999px; flex: 0 0 auto; }
  .legend .ln { flex: 1; }
  .ln { min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hidden { display: none; }

  /* —В–Њ—Б—В–Є (—Б–Ї–∞—Б—Г–≤–∞–љ–љ—П) */
  #toasts { position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%); z-index: 80;
    display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
  .toast { pointer-events: auto; display: flex; align-items: center; gap: 14px; background: var(--ink2);
    color: #fff; border-radius: 12px; padding: 10px 14px; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,.25);
    animation: toastIn .18s ease; max-width: 92vw; }
  html[data-theme="dark"] .toast { background: #25324a; }
  .toast button { border: 0; background: transparent; color: #7dd3fc; font-weight: 700; cursor: pointer; font-size: 14px; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* –Љ—Ц–љ—Ц –њ—А–Њ–≥—А–µ—Б-–±–∞—А –±—О–і–ґ–µ—В—Г (–Ї–Њ–ї—М–Њ—А–Њ–≤–Є–є) */
  .pbar { height: 8px; background: var(--chip); border-radius: 999px; overflow: hidden; }
  .pbar > i { display: block; height: 100%; border-radius: 999px; }

  /* –≤–Є–±—Ц—А –µ–Љ–Њ–і–Ј—Ц */
  .emojigrid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; max-height: 150px;
    overflow-y: auto; border: 1px solid var(--line); border-radius: 10px; padding: 6px; background: var(--input); }
  .emojigrid button { border: 0; background: transparent; font-size: 20px; padding: 4px 0; border-radius: 8px; cursor: pointer; line-height: 1.2; }
  .emojigrid button:hover { background: var(--hover); }
  .emojigrid button.sel { background: var(--accent); }

  /* –Љ–µ–љ—О –±–µ–Ј –њ—А–Њ–Ї—А—Г—В–Ї–Є: —Й–Њ–є–љ–Њ –±—А–∞–Ї—Г—Ф –Љ—Ц—Б—Ж—П вАФ –ї–Є—И–µ —Ц–Ї–Њ–љ–Ї–Є */
  @media (max-width: 1140px) {
    .nav a .nt { display: none; }
    .brand .bt { display: none; }
    .nav a { padding: 7px 10px; }
    .nav a .ni { font-size: 18px; }
  }

  /* –∞–і–∞–њ—В–Є–≤ –њ—Ц–і —В–µ–ї–µ—Д–Њ–љ */
  @media (max-width: 560px) {
    body { font-size: 14px; }
    .wrap { padding: 0 10px 70px; }
    .nav { padding: 8px 6px; gap: 1px; }
    .brand { font-size: 16px; margin-right: 4px; }
    .brand .bt { display: none; }
    .nav a { padding: 6px 7px; font-size: 13px; }
    .nav a .nt { display: none; }
    .nav a .ni { font-size: 17px; }
    h1 { font-size: 20px; margin: 16px 0 12px; }
    .card { border-radius: 14px; }
    .acc .bal { font-size: 19px; }
    .row.wrapsm { flex-wrap: wrap; }
    .sechead { flex-direction: column; align-items: flex-start; gap: 2px; }
    .sechead .hint { text-align: left; font-size: 11px; }
    .modal { max-width: 100%; padding: 16px; border-radius: 16px; }
    .overlay { padding: 8px; align-items: flex-end; }
    .accgrid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
  }
</style>
</head>
<body>
<header>
  <div class="nav">
    <div class="brand"><span class="logo">вВі</span><span class="bt">MoneyMe</span></div>
    <a data-view="dashboard"><span class="ni">рЯП†</span><span class="nt">–Ю–≥–ї—П–і</span></a>
    <a data-view="transactions"><span class="ni">рЯІЊ</span><span class="nt">–Ю–њ–µ—А–∞—Ж—Ц—Ч</span></a>
    <a data-view="analytics"><span class="ni">рЯУК</span><span class="nt">–Р–љ–∞–ї—Ц—В–Є–Ї–∞</span></a>
    <a data-view="accounts"><span class="ni">рЯТ≥</span><span class="nt">–†–∞—Е—Г–љ–Ї–Є</span></a>
    <a data-view="credits"><span class="ni">рЯП¶</span><span class="nt">–Ъ—А–µ–і–Є—В–Є</span></a>
    <a data-view="goals"><span class="ni">рЯОѓ</span><span class="nt">–¶—Ц–ї—Ц</span></a>
    <a data-view="recurring"><span class="ni">рЯФБ</span><span class="nt">–†–µ–≥—Г–ї—П—А–љ—Ц</span></a>
    <a data-view="categories"><span class="ni">рЯПЈпЄП</span><span class="nt">–Ъ–∞—В–µ–≥–Њ—А—Ц—Ч</span></a>
    <a data-view="settings"><span class="ni">вЪЩпЄП</span><span class="nt">–Э–∞–ї–∞—И—В—Г–≤–∞–љ–љ—П</span></a>
    <button class="navlang" id="langbtn" title="–Ь–Њ–≤–∞ / Language">EN</button>
  </div>
</header>
<div class="wrap" id="app"></div>
<div id="modal-root"></div>
<div id="toasts"></div>

<script>
//==================== –°—В–∞–љ —Ц –Ј–±–µ—А–µ–ґ–µ–љ–љ—П ====================
const STORE_KEY = 'moneyme.v1';
const SCHEMA_VERSION = 2;
const PALETTE = ['#3b82f6','#22c55e','#f97316','#8b5cf6','#ef4444','#ec4899','#14b8a6','#eab308','#0ea5e9','#64748b'];
const CURRENCIES = ['UAH','USD','EUR','PLN','GBP'];
const CUR_SYMBOL = { UAH:'вВі', USD:'$', EUR:'вВђ', PLN:'z≈В', GBP:'¬£' };
function curSym(cur){ return CUR_SYMBOL[cur] || cur; }
const TYPE_LABEL = { CASH:'–У–Њ—В—Ц–≤–Ї–∞', CARD:'–Ъ–∞—А—В–Ї–∞', BANK:'–С–∞–љ–Ї. —А–∞—Е—Г–љ–Њ–Ї' };

let state = load();
normalize();

// –У–∞—А–∞–љ—В—Г—Ф–Љ–Њ –љ–∞—П–≤–љ—Ц—Б—В—М —Г—Б—Ц—Е –њ–Њ–ї—Ц–≤ (–Љ—Ц–≥—А–∞—Ж—Ц—П —Б—В–∞—А–Є—Е –і–∞–љ–Є—Е –і–Њ –њ–Њ—В–Њ—З–љ–Њ—Ч —Б—Е–µ–Љ–Є).
function normalize() {
  let changed = false;
  (state.transactions || []).forEach(t => { if (typeof t.ord !== 'number') { t.ord = t.id; changed = true; } });
  if (!state.banks) { state.banks = []; changed = true; }
  if (!state.loans) { state.loans = []; changed = true; }
  if (!state.recurring) { state.recurring = []; changed = true; }   // —А–µ–≥—Г–ї—П—А–љ—Ц –њ–ї–∞—В–µ–ґ—Ц
  if (!state.goals) { state.goals = []; changed = true; }           // —Ж—Ц–ї—Ц –љ–∞–Ї–Њ–њ–Є—З–µ–љ–љ—П
  if (!state.seq) { state.seq = { acc:1, cat:1, tx:1, bank:1, loan:1, rec:1, goal:1 }; changed = true; }
  ['acc','cat','tx','bank','loan','rec','goal'].forEach(k => { if (state.seq[k] == null) { state.seq[k] = 1; changed = true; } });
  (state.categories || []).forEach(c => {
    if (c.budget === undefined && c.kind === 'EXPENSE') { c.budget = 0; changed = true; }
    if (c.kind === 'EXPENSE' && !c.budget_period) { c.budget_period = 'monthly'; changed = true; }
  });
  if (state.version !== SCHEMA_VERSION) { state.version = SCHEMA_VERSION; changed = true; }
  if (changed) save();
}
function nextOrd() { return state.transactions.reduce((m, t) => Math.max(m, t.ord || 0), 0) + 1; }

//==================== –Ґ–µ–Љ–∞ ====================
let theme = localStorage.getItem('moneyme.theme') || 'light';
function applyTheme() { document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light'); }
function toggleTheme() { theme = theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('moneyme.theme', theme); applyTheme(); render(); }
applyTheme();

//==================== –Ь–Њ–≤–∞ (UK / EN) ====================
let lang = localStorage.getItem('moneyme.lang') || 'uk';
function setLang(l){ lang = (l === 'en') ? 'en' : 'uk'; localStorage.setItem('moneyme.lang', lang); render(); }
// –Я–µ—А–µ–Ї–ї–∞–і —Г–ґ–µ –≤—Ц–і—А–µ–љ–і–µ—А–µ–љ–Њ–≥–Њ DOM: UK (–і–ґ–µ—А–µ–ї–Њ) -> EN –Ј–∞ —Б–ї–Њ–≤–љ–Є–Ї–Њ–Љ.

function tStr(s){ // –њ–µ—А–µ–Ї–ї–∞–і —А—П–і–Ї–∞ (—В–Њ—З–љ–Є–є –Ј–±—Ц–≥ –∞–±–Њ –њ—Ц–і—А—П–і–Ї–Њ–≤—Ц –Ј–∞–Љ—Ц–љ–Є)

// –Ъ—Г—А—Б: —Б–Ї—Ц–ї—М–Ї–Є UAH –Ј–∞ 1 –Њ–і–Є–љ–Є—Ж—О –≤–∞–ї—О—В–Є (UAH = 1). null, —П–Ї—Й–Њ –Ї—Г—А—Б—Г –љ–µ–Љ–∞—Ф.
function rateFor(cur) {
  if (cur === 'UAH') return 1;
  const r = ratesCache.rates ? ratesCache.rates[cur] : null;
  return (typeof r === 'number' && r > 0) ? r : null;
}
function toUAH(amount, cur) { const r = rateFor(cur); return r == null ? null : amount * r; }

// –Ю—А—Ц—Ф–љ—В–∞—Ж—Ц—П –Ї—А–Њ—Б-–Ї—Г—А—Б—Г –і–ї—П –Ј—А—Г—З–љ–Њ–≥–Њ –≤–≤–Њ–і—Г: ¬Ђ1 strong = X weak¬ї. –У—А–љ –Ј–∞–≤–ґ–і–Є weak (—В–Њ–±—В–Њ ¬ЂX –≥—А–љ –Ј–∞ 1 –≤–∞–ї—О—В—Г¬ї).
function rateOrientation(F, T) {
  if (F === 'UAH' && T !== 'UAH') return { strong: T, weak: F };
  if (T === 'UAH' && F !== 'UAH') return { strong: F, weak: T };
  const rF = rateFor(F), rT = rateFor(T);
  if (rF != null && rT != null) return rF >= rT ? { strong: F, weak: T } : { strong: T, weak: F };
  return { strong: T, weak: F };
}
// –Ъ—Г—А—Б –Ј–∞ –Ј–∞–Љ–Њ–≤—З—Г–≤–∞–љ–љ—П–Љ (X = —Б–Ї—Ц–ї—М–Ї–Є weak –Ј–∞ 1 strong) –Ј –і–∞–љ–Є—Е –Э–С–£; null, —П–Ї—Й–Њ –љ–µ–≤—Ц–і–Њ–Љ–Њ.
function defaultCrossX(F, T) {
  const { strong, weak } = rateOrientation(F, T);
  const rs = rateFor(strong), rw = rateFor(weak);
  if (rs != null && rw != null && rw > 0) return Math.round(rs / rw * 10000) / 10000;
  return null;
}
// –Я–µ—А–µ—В–≤–Њ—А–µ–љ–љ—П –≤–≤–µ–і–µ–љ–Њ–≥–Њ X —Г –Љ–љ–Њ–ґ–љ–Є–Ї: toAmount = amount(F) * mult (—А–µ–Ј—Г–ї—М—В–∞—В —Г T).
function xToMultiplier(F, T, X) {
  if (!(X > 0)) return 1;
  const { strong } = rateOrientation(F, T);
  return F === strong ? X : 1 / X;
}
// –Ч–≤–Њ—А–Њ—В–љ–µ: –Ј –Љ–љ–Њ–ґ–љ–Є–Ї–∞ –Њ—В—А–Є–Љ–∞—В–Є X (–і–ї—П —А–µ–і–∞–≥—Г–≤–∞–љ–љ—П –њ–µ—А–µ–Ї–∞–Ј—Г).
function multiplierToX(F, T, mult) {
  const { strong } = rateOrientation(F, T);
  if (!(mult > 0)) return defaultCrossX(F, T) || 1;
  const x = F === strong ? mult : 1 / mult;
  return Math.round(x * 10000) / 10000;
}

    localStorage.setItem(RATES_KEY, JSON.stringify(ratesCache));
  } catch (e) {

//==================== –Я–µ—А–µ—В—П–≥—Г–≤–∞–љ–љ—П –і–ї—П –Ј–Љ—Ц–љ–Є –њ–Њ—А—П–і–Ї—Г ====================
// –†–Њ–±–Є—В—М –µ–ї–µ–Љ–µ–љ—В draggable; –њ—А–Є –Ї–Є–і–∞–љ–љ—Ц –љ–∞ —Ц–љ—И–Є–є —В–∞–Ї–Њ–≥–Њ –ґ —В–Є–њ—Г –≤–Є–Ї–ї–Є–Ї–∞—Ф onReorder(srcId, dstId).
// –Я–µ—А–µ–≤–њ–Њ—А—П–і–Ї—Г–≤–∞–љ–љ—П —З–µ—А–µ–Ј Pointer Events (–Љ–Є—И–∞ + —В–∞—З). –Ґ—П–≥–љ–µ–Љ–Њ –Ј–∞ —А—Г—З–Ї—Г (.grip), —П–Ї—Й–Њ —Ф.
function makeReorderable(node, type, id, onReorder, handle) {
  node.dataset.rtype = type; node.dataset.rid = String(id);
  const h = handle || node.querySelector('.grip') || node;
  h.classList.add('draghandle');
  let sx=0, sy=0, dragging=false, ghost=null, target=null;
  const TH = 7;
  h.addEventListener('pointerdown', e => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    sx = e.clientX; sy = e.clientY; dragging = false; target = null;
    document.addEventListener('pointermove', move, { passive:false });
    document.addEventListener('pointerup', up);
    document.addEventListener('pointercancel', up);
  });
  function move(e){
    if (!dragging) {
      if (Math.hypot(e.clientX - sx, e.clientY - sy) < TH) return;
      dragging = true; node.classList.add('dragging');
      ghost = node.cloneNode(true);
      Object.assign(ghost.style, { position:'fixed', left:'0', top:'0', margin:'0', pointerEvents:'none', opacity:'.92',
        width: node.offsetWidth+'px', zIndex:'70', boxShadow:'0 12px 28px rgba(0,0,0,.28)' });
      document.body.appendChild(ghost);
    }
    e.preventDefault();
    ghost.style.transform = `translate(${e.clientX - 22}px, ${e.clientY - 16}px)`;
    ghost.style.visibility = 'hidden';
    const under = document.elementFromPoint(e.clientX, e.clientY);
    ghost.style.visibility = '';
    const t = under && under.closest ? under.closest('[data-rtype="' + type + '"]') : null;
    if (target && target !== t) target.classList.remove('dragover');
    target = (t && t !== node) ? t : null;
    if (target) target.classList.add('dragover');
  }
  function up(){
    document.removeEventListener('pointermove', move);
    document.removeEventListener('pointerup', up);
    document.removeEventListener('pointercancel', up);
    node.classList.remove('dragging');
    if (ghost) { ghost.remove(); ghost = null; }
    if (dragging && target) { target.classList.remove('dragover'); const dst = parseInt(target.dataset.rid); if (dst && dst !== id) onReorder(id, dst); }
    target = null;
  }
}

function reorderTx(srcId, dstId) {
  if (srcId === dstId) return;
  const all = [...state.transactions].sort((a,b)=>(b.ord||0)-(a.ord||0));
  const src = all.find(t=>t.id===srcId), dst = all.find(t=>t.id===dstId);
  if (!src || !dst) return;
  const arr = all.filter(t=>t.id!==srcId);
  arr.splice(arr.indexOf(dst), 0, src);          // –њ–µ—А–µ—В—П–≥–љ—Г—В–∞ –Њ–њ–µ—А–∞—Ж—Ц—П —Б—В–∞—Ф –Њ–і—А–∞–Ј—Г –љ–∞–і —Ж—Ц–ї—М–Њ–≤–Њ—О
  arr.forEach((t,i)=> t.ord = arr.length - i);    // –≤–µ—А—Е = –љ–∞–є–±—Ц–ї—М—И–Є–є ord
  save(); render();
}

function reorderCategory(srcId, dstId) {

function deleteTx(tx) {
  deleteWithUndo(tx.kind === 'TRANSFER' ? '–Я–µ—А–µ–Ї–∞–Ј –≤–Є–і–∞–ї–µ–љ–Њ' : '–Ю–њ–µ—А–∞—Ж—Ц—О –≤–Є–і–∞–ї–µ–љ–Њ', () => {
    if (tx.loan_id) {

      const r = state.recurring.find(x => x.id === tx.recurring_id);
      if (r && r.next_date) r.next_date = prevRecurDate(r.next_date, r.freq);

function accountBalance(id) {

function categorySpent(catId, from, to){

}

function budgetRange(c){ return c.budget_period === 'yearly' ? { from: yearStartISO(), to: todayISO(), label: '—А—Ц–Ї' } : { from: monthStartISO(), to: todayISO(), label: '–Љ—Ц—Б.' }; }

function prevMonthRange(){ const n=new Date(); const d=new Date(n.getFullYear(), n.getMonth()-1, 1); const y=d.getFullYear(), m=d.getMonth(); return { from: ymd(y,m+1,1), to: ymd(y,m+1,new Date(y,m+1,0).getDate()) }; }
// –Э–µ–≤–Є—В—А–∞—З–µ–љ–Є–є –Ј–∞–ї–Є—И–Њ–Ї –Љ–Є–љ—Г–ї–Њ–≥–Њ –Љ—Ц—Б—П—Ж—П (–і–ї—П –Ї–∞—В–µ–≥–Њ—А—Ц–є –Ј rollover).
function budgetRollover(c){ if (!(c.budget>0) || c.budget_period==='yearly' || !c.rollover) return 0; const pr=prevMonthRange(); return round2(Math.max(0, c.budget - categorySpent(c.id, pr.from, pr.to))); }
// –Х—Д–µ–Ї—В–Є–≤–љ–Є–є –ї—Ц–Љ—Ц—В = –±—О–і–ґ–µ—В + –њ–µ—А–µ–љ–µ—Б–µ–љ–µ.
function effectiveBudget(c){ return round2((c.budget||0) + budgetRollover(c)); }
// –Ъ–∞—А—В–Ї–∞ ¬Ђ–С—О–і–ґ–µ—В–Є¬ї: –Ї–∞—В–µ–≥–Њ—А—Ц—Ч –≤–Є—В—А–∞—В –Ј –ї—Ц–Љ—Ц—В–Њ–Љ; –Ї–Њ–ґ–љ–∞ вАФ —Г —Б–≤–Њ—Ф–Љ—Г —Ж–Є–Ї–ї—Ц (–Љ—Ц—Б—П—Ж—М/—А—Ц–Ї).
function budgetsCard(opts){
  const title = (opts&&opts.title) || '–С—О–і–ґ–µ—В–Є';
  const cats = state.categories.filter(c => c.kind==='EXPENSE' && (c.budget||0) > 0);
  if (!cats.length) return null;
  const rows = cats.map(c => { const r = budgetRange(c); const eb = effectiveBudget(c); return { c, eb, roll: budgetRollover(c), spent: categorySpent(c.id, r.from, r.to), label: r.label }; })
    .sort((a,b)=> (b.spent/b.eb) - (a.spent/a.eb));
  const card = el(`<section class="card" style="padding:14px 16px"><h2 style="margin-bottom:8px">${esc(title)}</h2><div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:7px 18px"></div></section>`);
  const grid = card.lastElementChild;
  rows.forEach(({c, eb, roll, spent, label}) => {

    const tip = `${c.name} / ${label}: ${money(spent)} –Ј ${money(eb)} (${real}%)` + (roll>0?` ¬Ј –њ–µ—А–µ–љ–µ—Б–µ–љ–Њ ${money(roll)}`:'');
    grid.appendChild(el(`<div title="${esc(tip)}" style="display:flex;align-items:center;gap:8px;font-size:13px">

    </div>`));
  });

function bankById(id){ return state.banks.find(b => b.id === id); }

function loanMonthly(l) {
  const P = l.principal || 0, n = Math.max(1, l.months || 1);
  if (!l.has_interest || !l.rate) return round2(P / n);
  const i = (l.rate / 100) / 12;
  if (i <= 0) return round2(P / n);
  const f = Math.pow(1 + i, n);
  return round2(P * (i * f) / (f - 1));
}
function loanOutstanding(l){ return round2(Math.max(0, (l.principal || 0) - (l.paid || 0))); }
function loanActive(l){ return loanOutstanding(l) > 0.005; }
function bankOutstanding(bankId){ return round2(state.loans.filter(l=>l.bank_id===bankId).reduce((s,l)=>s+loanOutstanding(l),0)); }
function bankAvailable(bank){ return round2((bank.limit || 0) - bankOutstanding(bank.id)); }
function bankMonthlyBurden(bankId){ return round2(state.loans.filter(l=>l.bank_id===bankId && loanActive(l)).reduce((s,l)=>s+loanMonthly(l),0)); }
// –І–Є –≤–љ–µ—Б–µ–љ–Њ –њ–ї–∞—В—Ц–ґ –њ–Њ –Ї—А–µ–і–Є—В—Г –≤ –њ–Њ—В–Њ—З–љ–Њ–Љ—Г —Ж–Є–Ї–ї—Ц (–Ј–∞ ~–Љ—Ц—Б—П—Ж—М –і–Њ –і–∞—В–Є —Б–њ–Є—Б–∞–љ–љ—П).
function loanPaidThisCycle(l){
  if (!l.due_date) return false;
  const cycleStart = addMonthsISO(l.due_date, -1);
  return state.transactions.some(t => t.loan_id === l.id && t.kind === 'EXPENSE' && t.date >= cycleStart && t.date <= todayISO());
}
// –Ъ—А–µ–і–Є—В ¬Ђ–Њ—З—Ц–Ї—Г—Ф –њ–ї–∞—В—Ц–ґ¬ї: –∞–Ї—В–Є–≤–љ–Є–є, —В–µ—А–Љ—Ц–љ —Г –Љ–µ–ґ–∞—Е 3 –і–љ—Ц–≤/–њ—А–Њ—Б—В—А–Њ—З–µ–љ–Њ, —Ц –њ–ї–∞—В—Ц–ґ —Ж—М–Њ–≥–Њ —Ж–Є–Ї–ї—Г —Й–µ –љ–µ –≤–љ–µ—Б–µ–љ–Њ.
function loanPending(l){
  return loanActive(l) && !!l.due_date && l.due_date <= addDaysISO(todayISO(), 3) && !loanPaidThisCycle(l);
}
// –°–Ї—Ц–ї—М–Ї–Є –њ–ї–∞—В–µ–ґ—Ц–≤ –ї–Є—И–Є–ї–Њ—Б—М –њ—А–Є –њ–Њ—В–Њ—З–љ–Њ–Љ—Г –њ–ї–∞—В–µ–ґ—Ц M, –Ј–∞–ї–Є—И–Ї—Г O —Ц –Љ—Ц—Б—П—З–љ—Ц–є —Б—В–∞–≤—Ж—Ц i.
function remainingMonths(O, M, i){
  if (O <= 0 || M <= 0) return 0;
  if (!(i > 0)) { const n = O / M; const r = Math.round(n); return Math.abs(n-r) < 0.1 ? r : Math.ceil(n); }
  if (M <= O * i) return Infinity;   // –њ–ї–∞—В—Ц–ґ –љ–µ –њ–Њ–Ї—А–Є–≤–∞—Ф –љ–∞–≤—Ц—В—М –≤—Ц–і—Б–Њ—В–Ї–Є
  const n = -Math.log(1 - i*O/M) / Math.log(1+i);
  const r = Math.round(n);
  return Math.abs(n - r) < 0.1 ? r : Math.ceil(n);   // –њ—А–Є–ї—Ц–њ–ї—О—Ф–Љ–Њ –і–Њ —Ж—Ц–ї–Њ–≥–Њ (–љ—Ц–≤–µ–ї—О—Ф–Љ–Њ –Њ–Ї—А—Г–≥–ї–µ–љ–љ—П –њ–ї–∞—В–µ–ґ—Г)
}
function loanMonthlyRate(l){ return (l.has_interest && l.rate > 0) ? (l.rate/100/12) : 0; }

// –Ъ–∞–ї—М–Ї—Г–ї—П—В–Њ—А –і–Њ—Б—В—А–Њ–Ї–Њ–≤–Њ–≥–Њ –њ–Њ–≥–∞—И–µ–љ–љ—П –Ї—А–µ–і–Є—В—Г.
function openPayoff(l, bank){
  const cur = bank.currency, M = loanMonthly(l), O = loanOutstanding(l), i = loanMonthlyRate(l);
  const nRem = remainingMonths(O, M, i);
  const totalRem = nRem === Infinity ? Infinity : round2(M * nRem);
  const interestRem = totalRem === Infinity ? Infinity : round2(Math.max(0, totalRem - O));
  const fmtN = v => v === Infinity ? 'вИЮ' : v;
  const body = el(`<div>
    <div class="preview">
      <div class="pl"><span class="muted">–Ч–∞–ї–Є—И–Њ–Ї –±–Њ—А–≥—Г</span><b class="tabnum">${money(O,cur)}</b></div>
      <div class="pl"><span class="muted">–Я–ї–∞—В–µ–ґ—Ц–≤ –ї–Є—И–Є–ї–Њ—Б—М</span><b class="tabnum">${fmtN(nRem)}</b></div>
      <div class="pl"><span class="muted">–©–µ —Б–њ–ї–∞—В–Є—В–µ –Ј–∞ –≥—А–∞—Д—Ц–Ї–Њ–Љ</span><b class="tabnum">${interestRem===Infinity?'вИЮ':money(totalRem,cur)}</b></div>
      <div class="pl"><span class="muted">–Ј –љ–Є—Е –≤—Ц–і—Б–Њ—В–Ї–Є</span><b class="tabnum" style="color:var(--amber)">${interestRem===Infinity?'вИЮ':money(interestRem,cur)}</b></div>
    </div>
    <div class="small" style="margin-top:8px;color:var(--green)">–ѓ–Ї—Й–Њ –њ–Њ–≥–∞—Б–Є—В–Є –Ј–∞—А–∞–Ј —Г–≤–µ—Б—М –Ј–∞–ї–Є—И–Њ–Ї вАФ –Ј–µ–Ї–Њ–љ–Њ–Љ–Є—В–µ вЙИ ${interestRem===Infinity?'вИЮ':money(interestRem,cur)} –≤—Ц–і—Б–Њ—В–Ї—Ц–≤.</div>
    <div style="margin-top:10px"><label class="lab">–Р–±–Њ —А–∞–Ј–Њ–≤–Є–є –і–Њ–і–∞—В–Ї–Њ–≤–Є–є –њ–ї–∞—В—Ц–ґ (${curSym(cur)})</label><input id="po-extra" inputmode="decimal" placeholder="0.00"></div>
    <div class="preview" id="po-result" style="display:none">
      <div class="pl"><span class="muted">–Э–Њ–≤–Є–є –Ј–∞–ї–Є—И–Њ–Ї</span><b class="tabnum" id="po-newo">вАФ</b></div>
      <div class="pl"><span class="muted">–Ґ–µ—А–Љ—Ц–љ —Б–Ї–Њ—А–Њ—В–Є—В—М—Б—П –љ–∞</span><b class="tabnum" id="po-saved">вАФ</b></div>
      <div class="pl"><span class="muted">–Х–Ї–Њ–љ–Њ–Љ—Ц—П –≤—Ц–і—Б–Њ—В–Ї—Ц–≤</span><b class="tabnum" id="po-isave" style="color:var(--green)">вАФ</b></div>
    </div>

  const $$ = s => $(s, body);

    if (X <= 0) { res.style.display = 'none'; return; }
    const newO = round2(Math.max(0, O - X));
    const nRem2 = remainingMonths(newO, M, i);
    const totalRem2 = nRem2 === Infinity ? Infinity : round2(M * nRem2);
    const interestRem2 = totalRem2 === Infinity ? Infinity : round2(Math.max(0, totalRem2 - newO));
    const monthsSaved = (nRem===Infinity||nRem2===Infinity) ? 'вИЮ' : Math.max(0, nRem - nRem2);
    const isave = (interestRem===Infinity||interestRem2===Infinity) ? 'вИЮ' : money(round2(Math.max(0, interestRem - interestRem2)), cur);

}

//==================== –Э–∞–≤—Ц–≥–∞—Ж—Ц—П (—З–µ—А–µ–Ј —Е–µ—И URL вАФ –Ј–±–µ—А—Ц–≥–∞—Ф—В—М—Б—П –њ—А–Є –њ–µ—А–µ–Ј–∞–≤–∞–љ—В–∞–ґ–µ–љ–љ—Ц) ====================
const views = {};
let currentView = 'dashboard';
function hashView(){ const v = decodeURIComponent((location.hash || '').replace(/^#/, '')); return views[v] ? v : null; }
function navigate(v){
  if (!views[v]) v = 'dashboard';
  const changed = v !== currentView;
  currentView = v;
  if (('#' + v) !== location.hash) location.hash = v;   // –Ј–∞–њ–∞–Љ Љ—П—В–Њ–≤—Г—Ф–Љ–Њ –≤–Ї–ї–∞–і–Ї—Г –≤ URL
  document.querySelectorAll('.nav a').forEach(a => a.classList.toggle('active', a.dataset.view === v));
  render();
  if (changed) window.scrollTo(0, 0);   // –њ—А–Є –Ј–Љ—Ц–љ—Ц –≤–Ї–ї–∞–і–Ї–Є вАФ –љ–∞ –њ–Њ—З–∞—В–Њ–Ї
}
// –Я–µ—А–µ–Љ–∞–ї—М–Њ–≤—Г—Ф –њ–Њ—В–Њ—З–љ—Г –≤–Ї–ї–∞–і–Ї—Г, –Ј–±–µ—А—Ц–≥–∞—О—З–Є –њ–Њ–Ј–Є—Ж—Ц—О –њ—А–Њ–Ї—А—Г—В–Ї–Є (—Й–Њ–± –Ј–Љ—Ц–љ–Є –Њ–љ–Њ–≤–ї—О–≤–∞–ї–Є—Б—М ¬Ђ–љ–∞ –Љ—Ц—Б—Ж—Ц¬ї).
function render(){ const y = window.scrollY; const app = $('#app'); app.innerHTML = ''; views[currentView](app); applyLang(); window.scrollTo(0, y); }

window.addEventListener('hashchange', () => { const v = hashView(); if (v && v !== currentView) navigate(v); });
document.querySelectorAll('.nav a').forEach(a => a.addEventListener('click', e => { e.preventDefault(); navigate(a.dataset.view); }));

// –°–≤–∞–є–њ–Є –≤–ї—Ц–≤–Њ/–≤–њ—А–∞–≤–Њ вАФ –њ–µ—А–µ—Е—Ц–і –Љ—Ц–ґ –≤–Ї–ї–∞–і–Ї–∞–Љ–Є (—В–∞—З).
const VIEW_ORDER = ['dashboard','transactions','analytics','accounts','credits','goals','recurring','categories','settings'];
function swipeNavigate(dir){
  const i = VIEW_ORDER.indexOf(currentView), ni = i + dir;
  if (i < 0 || ni < 0 || ni >= VIEW_ORDER.length) return;
  navigate(VIEW_ORDER[ni]);
}
(function setupSwipe(){
  let sx=0, sy=0, on=false;
  document.addEventListener('touchstart', e => {
    on = false;
    if (e.touches.length !== 1) return;
    if (document.querySelector('.overlay') || document.querySelector('.ctxmenu')) return;  // –љ–µ —Б–≤–∞–є–њ–∞—В–Є –њ—А–Є –≤—Ц–і–Ї—А–Є—В–Њ–Љ—Г –і—Ц–∞–ї–Њ–Ј—Ц/–Љ–µ–љ—О
    const x = e.touches[0].clientX;
    if (x < 24 || x > window.innerWidth - 24) return;   // –ї–Є—И–∞—Ф–Љ–Њ –Ї—А–∞–є–Њ–≤—Ц —Б–≤–∞–є–њ–Є –±—А–∞—Г–Ј–µ—А—Г (–љ–∞–Ј–∞–і/–≤–њ–µ—А–µ–і)
    const t = e.target;
    if (t.closest && t.closest('input,select,textarea,.nav,.emojigrid,.acc,.draghandle,svg,.modal,.pbar,.bar')) return;
    sx = x; sy = e.touches[0].clientY; on = true;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (!on) return; on = false;
    const dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy) * 1.8) swipeNavigate(dx < 0 ? 1 : -1);
  }, { passive: true });
})();

function openModal(title, bodyNode, { onSave, saveLabel='–Ч–±–µ—А–µ–≥—В–Є', wide=false } = {}) {
  const root = $('#modal-root');
  const overlay = el(`<div class="overlay"></div>`);
  const modal = el(`<div class="card modal"></div>`);
  const head = el(`<div class="mhead"><h2>${esc(title)}</h2><button class="x" aria-label="–Ч–∞–Ї—А–Є—В–Є">√Ч</button></div>`);
  const body = el(`<div class="mbody"></div>`);
  body.appendChild(bodyNode);
  modal.appendChild(head); modal.appendChild(body);
  if (onSave) {
    const foot = el(`<div class="mfoot"></div>`);
    const cancel = el(`<button class="btn ghost">–°–Ї–∞—Б—Г–≤–∞—В–Є</button>`);
    const ok = el(`<button class="btn primary">${esc(saveLabel)}</button>`);
    cancel.onclick = close; ok.onclick = () => onSave(close);
    foot.appendChild(cancel); foot.appendChild(ok); modal.appendChild(foot);
  }
  overlay.appendChild(modal); root.appendChild(overlay);
  translateTree(modal);
  function close(){ overlay.remove(); }
  overlay.addEventListener('mousedown', e => { if (e.target === overlay) close(); });
  head.querySelector('.x').onclick = close;
  document.addEventListener('keydown', function onKey(e){ if(e.key==='Escape'){ close(); document.removeEventListener('keydown', onKey);} });
  const firstInput = modal.querySelector('input, select');
  if (firstInput) firstInput.focus();
  return close;
}

// –Ъ–Њ–љ—В–µ–Ї—Б—В–љ–µ –Љ–µ–љ—О –±—Ц–ї—П –Ї—Г—А—Б–Њ—А—Г. items: [{label, icon, color, onClick} | {sep:true}], title вАФ –љ–µ–Њ–±–Њ–≤ Љ—П–Ј–Ї–Њ–≤–Є–є –Ј–∞–≥–Њ–ї–Њ–≤–Њ–Ї.
function openContextMenu(x, y, items, title) {
  document.querySelectorAll('.ctxmenu').forEach(m => m.remove());
  const menu = el(`<div class="ctxmenu"></div>`);
  if (title) menu.appendChild(el(`<div class="chead">${esc(title)}</div>`));
  items.forEach(it => {
    if (it.sep) { menu.appendChild(el(`<div class="sep"></div>`)); return; }
    const row = el(`<div class="ci">${it.icon?`<span class="cdot" style="background:${it.color||'#64748b'}">${it.icon}</span>`:''}<span>${esc(it.label)}</span></div>`);
    row.onclick = () => { close(); it.onClick(); };
    menu.appendChild(row);
  });
  document.body.appendChild(menu);
  translateTree(menu);
  // —В—А–Є–Љ–∞—Ф–Љ–Њ –Љ–µ–љ—О –≤ –Љ–µ–ґ–∞—Е –≤—Ц–Ї–љ–∞
  const r = menu.getBoundingClientRect();
  const px = Math.min(x, window.innerWidth - r.width - 8);
  const py = Math.min(y, window.innerHeight - r.height - 8);
  menu.style.left = Math.max(8, px) + 'px';
  menu.style.top = Math.max(8, py) + 'px';
  function close(){ menu.remove(); document.removeEventListener('mousedown', onDown, true); document.removeEventListener('keydown', onKey, true); }
  function onDown(e){ if (!menu.contains(e.target)) close(); }
  function onKey(e){ if (e.key === 'Escape') close(); }
  setTimeout(() => { document.addEventListener('mousedown', onDown, true); document.addEventListener('keydown', onKey, true); }, 0);
}

// –Я–µ—А–µ—В—П–≥—Г–≤–∞–љ–љ—П –Ї–∞—А—В–Ї–Є —А–∞—Е—Г–љ–Ї—Г —З–µ—А–µ–Ј Pointer Events (–њ—А–∞—Ж—О—Ф —Ц –Љ–Є—И–µ—О, —Ц –њ–∞–ї—М—Ж–µ–Љ).
// –Ґ–∞–њ –±–µ–Ј –њ–µ—А–µ–Љ—Ц—Й–µ–љ–љ—П –≤—Ц–і–Ї—А–Є–≤–∞—Ф –Љ–µ–љ—О –і—Ц–є. Drop –љ–∞ —Ц–љ—И—Г –Ї–∞—А—В–Ї—Г вАФ –і—Ц–∞–ї–Њ–≥ –њ–µ—А–µ–Ї–∞–Ј—Г.
function enableCardDrag(node, a){
  let sx=0, sy=0, dragging=false, ghost=null, target=null;
  const TH = 8;
  node.addEventListener('pointerdown', e => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    sx = e.clientX; sy = e.clientY; dragging = false; target = null;
    document.addEventListener('pointermove', move, { passive:false });
    document.addEventListener('pointerup', up);
    document.addEventListener('pointercancel', up);
  });
  function move(e){
    const dx = e.clientX - sx, dy = e.clientY - sy;
    if (!dragging) {
      if (Math.hypot(dx, dy) < TH) return;
      dragging = true; node.classList.add('dragging');
      ghost = node.cloneNode(true);
      Object.assign(ghost.style, { position:'fixed', left:'0', top:'0', margin:'0', pointerEvents:'none', opacity:'.92',
        width: node.offsetWidth+'px', zIndex:'70', boxShadow:'0 12px 28px rgba(0,0,0,.28)' });
      document.body.appendChild(ghost);
    }
    e.preventDefault();
    ghost.style.transform = `translate(${e.clientX - node.offsetWidth/2}px, ${e.clientY - 22}px)`;
    ghost.style.visibility = 'hidden';
    const under = document.elementFromPoint(e.clientX, e.clientY);
    ghost.style.visibility = '';
    const t = under && under.closest ? under.closest('.acc') : null;
    if (target && target !== t) target.classList.remove('dragover');
    target = (t && t !== node) ? t : null;
    if (target) target.classList.add('dragover');
  }
  function up(e){
    document.removeEventListener('pointermove', move);
    document.removeEventListener('pointerup', up);
    document.removeEventListener('pointercancel', up);
    node.classList.remove('dragging');
    if (ghost) { ghost.remove(); ghost = null; }
    if (dragging) {
      if (target) { target.classList.remove('dragover'); const toId = parseInt(target.dataset.acc); if (toId && toId !== a.id) openTransferDialog(a.id, toId); }
    } else {
      accountActionMenu(a, e.clientX || sx, e.clientY || sy);   // —В–∞–њ вЖТ –Љ–µ–љ—О
    }
    target = null;
  }
}

    <div><label class="lab">–Ґ–µ–≥–Є (—З–µ—А–µ–Ј –Ї–Њ–Љ—Г)</label><input id="f-tags" value="${esc((e.tags||[]).join(', '))}" placeholder="–љ–∞–њ—А. –≤—Ц–і–њ—Г—Б—В–Ї–∞, —А–Њ–±–Њ—В–∞"></div>
    ${(kind==='EXPENSE' && !existing) ? `
    <label class="row" style="align-items:center;gap:8px;font-size:13px;cursor:pointer;margin-top:2px"><input type="checkbox" id="f-rfon" style="width:auto"> –І–∞—Б—В–Є–љ—Г –њ–Њ–≤–µ—А–љ—Г–ї–Є –Љ–µ–љ—Ц (–Њ–њ–ї–∞—В–Є–≤ –Ј–∞ –Ї–Њ–≥–Њ—Б—М)</label>
    <div class="hidden" id="f-rfbox">
      <div class="row">
        <div style="flex:1"><label class="lab">–°—Г–Љ–∞ –њ–Њ–≤–µ—А–љ–µ–љ–љ—П</label><input id="f-rfamt" inputmode="decimal" placeholder="0.00"></div>
        <div style="flex:1"><label class="lab">–Ъ—Г–і–Є –њ–Њ–≤–µ—А–љ—Г–ї–Є</label><select id="f-rfacc"></select></div>
      </div>
      <div class="muted small" id="f-rfhint" style="margin-top:6px"></div>
    </div>` : ''}
    <div class="err hidden" id="f-err"></div>
  </div>`);
  const rfon = $('#f-rfon', body);
  if (rfon) {
    const fillRfAcc = () => {
      const exAcc = state.accounts.find(a => a.id === parseInt($('#f-acc', body).value));
      const cur = exAcc ? exAcc.currency_code : 'UAH';
      const opts = state.accounts.filter(a => a.currency_code === cur);
      const prev = $('#f-rfacc', body).value;
      $('#f-rfacc', body).innerHTML = opts.map(a => `<option value="${a.id}">${esc(a.name)} (${curSym(a.currency_code)})</option>`).join('');
      $('#f-rfacc', body).value = (opts.some(a => String(a.id) === prev) ? prev : String(exAcc ? exAcc.id : (opts[0] ? opts[0].id : '')));
    };
    const updHint = () => {
      const exAcc = state.accounts.find(a => a.id === parseInt($('#f-acc', body).value));
      const cur = exAcc ? exAcc.currency_code : 'UAH';
      const full = num($('#f-amt', body).value), rf = num($('#f-rfamt', body).value);
      const share = round2(full - rf);
      const sameAcc = $('#f-rfacc', body).value === $('#f-acc', body).value;
      $('#f-rfhint', body).innerHTML = (rf > 0 && full > 0)
        ? `–Т–∞—И–∞ —З–∞—Б—В–Ї–∞ (–≤–Є—В—А–∞—В–∞): <b>${money(share, cur)}</b>${share < 0 ? ' вЫФ' : ''}${sameAcc ? '' : ` ¬Ј –њ–Њ–≤–µ—А–љ–µ–љ–љ—П –Њ—Д–Њ—А–Љ–Є—В—М—Б—П –њ–µ—А–µ–Ї–∞–Ј–Њ–Љ ${money(rf, cur)}`}`
        : '–Т–Є—В—А–∞—В–∞ –Ј–∞–њ–Є—И–µ—В—М—Б—П –љ–∞ –≤–∞—И—Г —З–∞—Б—В–Ї—Г, –∞ –њ–Њ–≤–µ—А–љ–µ–љ–љ—П вАФ –њ–µ—А–µ–Ї–∞–Ј–Њ–Љ –љ–∞ –Њ–±—А–∞–љ–Є–є —А–∞—Е—Г–љ–Њ–Ї.';
    };
    rfon.onchange = () => { const on = rfon.checked; $('#f-rfbox', body).classList.toggle('hidden', !on); if (on) { fillRfAcc(); updHint(); } };
    $('#f-acc', body).addEventListener('change', () => { if (rfon.checked) { fillRfAcc(); updHint(); } });
    ['f-amt','f-rfamt'].forEach(id => $('#'+id, body).addEventListener('input', () => { if (rfon.checked) updHint(); }));
    $('#f-rfacc', body).addEventListener('change', updHint);
  }
  openModal((existing?'–†–µ–і–∞–≥—Г–≤–∞—В–Є ':'') + (isInc?'–љ–∞–і—Е–Њ–і–ґ–µ–љ–љ—П':'–≤–Є—В—А–∞—В—Г'), body, {
    saveLabel: '–Ч–±–µ—А–µ–≥—В–Є',
    onSave: (close) => {
      const amt = num($('#f-amt', body).value);
      const err = $('#f-err', body);
      if (amt <= 0) { err.textContent = '–Т–≤–µ–і—Ц—В—М —Б—Г–Љ—Г –±—Ц–ї—М—И–µ 0'; err.classList.remove('hidden'); return; }
      const exAccId = parseInt($('#f-acc', body).value);
      // –њ–Њ–≤–µ—А–љ–µ–љ–љ—П —З–∞—Б—В–Є–љ–Є –Ї–Њ—И—В—Ц–≤: –≤–Є—В—А–∞—В–∞ = –≤–∞—И–∞ —З–∞—Б—В–Ї–∞, —А–µ—И—В–∞ вАФ –њ–µ—А–µ–Ї–∞–Ј –љ–∞ —А–∞—Е—Г–љ–Њ–Ї –њ–Њ–≤–µ—А–љ–µ–љ–љ—П
      const rf = $('#f-rfon', body);
      let refund = 0, refundAccId = exAccId;
      if (rf && rf.checked) {
        refund = round2(num($('#f-rfamt', body).value));
        refundAccId = parseInt($('#f-rfacc', body).value);
        if (refund > 0 && refund >= amt) { err.textContent = '–Я–Њ–≤–µ—А–љ–µ–љ–љ—П –Љ–∞—Ф –±—Г—В–Є –Љ–µ–љ—И–Є–Љ –Ј–∞ —Б—Г–Љ—Г –≤–Є—В—А–∞—В–Є'; err.classList.remove('hidden'); return; }
      }
      const rec = {
        kind, amount: round2(refund > 0 ? amt - refund : amt),
        account_id: exAccId,
        category_id: $('#f-cat', body).value ? parseInt($('#f-cat', body).value) : null,
        date: $('#f-date', body).value || todayISO(),
        note: $('#f-note', body).value.trim() || null,
        tags: parseTags($('#f-tags', body).value),
      };
      if (existing) {
        // —П–Ї—Й–Њ —Ж–µ –њ–ї–∞—В—Ц–ґ –Ј–∞ –Ї—А–µ–і–Є—В–Њ–Љ вАФ —Б–Є–љ—Е—А–Њ–љ—Ц–Ј—Г—Ф–Љ–Њ –≤–Є–њ–ї–∞—З–µ–љ–µ –љ–∞ —А—Ц–Ј–љ–Є—Ж—О —Б—Г–Љ–Є
        if (existing.loan_id) {
          const loan = state.loans.find(l => l.id === existing.loan_id);
          if (loan) {
            const delta = round2(rec.amount - (existing.amount || 0));
            loan.paid = round2(Math.min(loan.principal, Math.max(0, (loan.paid || 0) + delta)));
          }
        }
        Object.assign(existing, rec);
      }
      else {
        rec.id = nextId('tx'); rec.ord = nextOrd(); state.transactions.push(rec);
        // –њ–Њ–≤–µ—А–љ—Г—В—Г —З–∞—Б—В–Є–љ—Г –њ—А–Њ–≤–Њ–і–Є–Љ–Њ –њ–µ—А–µ–Ї–∞–Ј–Њ–Љ –Ј —А–∞—Е—Г–љ–Ї—Г –≤–Є—В—А–∞—В–Є –љ–∞ —А–∞—Е—Г–љ–Њ–Ї –њ–Њ–≤–µ—А–љ–µ–љ–љ—П (—П–Ї—Й–Њ —Ц–љ—И–Є–є)
        if (refund > 0 && refundAccId && refundAccId !== exAccId) {
          const catName = rec.category_id ? (categoryById(rec.category_id)?.name || '') : '';
          state.transactions.push({
            id: nextId('tx'), ord: nextOrd(), kind: 'TRANSFER', date: rec.date,
            note: '–Я–Њ–≤–µ—А–љ–µ–љ–љ—П' + (rec.note ? ': ' + rec.note : (catName ? ': ' + catName : '')),
            account_id: exAccId, to_account_id: refundAccId,
            amount: refund, to_amount: refund, exchange_rate: 1,
            fee_type: 'NONE', fee_value: 0, fee_amount: 0,
          });
        }
      }
      save(); close(); render();
    }
  });
}

//==================== –Ф—Ц–∞–ї–Њ–≥ –њ–µ—А–µ–Ї–∞–Ј—Г ====================
function openTransferDialog(fromId, toId) {
  const from = state.accounts.find(a=>a.id===fromId);
  const to = state.accounts.find(a=>a.id===toId);
  if (!from || !to) return;
  const cross = from.currency_code !== to.currency_code;
  const F = from.currency_code, T = to.currency_code;
  const ori = cross ? rateOrientation(F, T) : null;
  const body = el(`<div>
    <div class="preview" style="display:flex;justify-content:space-between;align-items:center;background:#f8fafc">
      <b>${esc(from.name)}</b><span class="muted">вЖТ</span><b>${esc(to.name)}</b>
    </div>
    <div><label class="lab">–°—Г–Љ–∞ (${curSym(from.currency_code)})</label><input id="t-amt" inputmode="decimal" placeholder="0.00" style="font-size:22px;font-weight:700"></div>
    <div class="row">
      <div style="flex:1"><label class="lab">–Ъ–Њ–Љ—Ц—Б—Ц—П</label>
        <select id="t-feetype"><option value="NONE">–С–µ–Ј –Ї–Њ–Љ—Ц—Б—Ц—Ч</option><option value="PERCENT">–Т—Ц–і—Б–Њ—В–Њ–Ї %</option><option value="FIXED">–§—Ц–Ї—Б–Њ–≤–∞–љ–∞</option></select></div>
      <div style="flex:1"><label class="lab" id="t-feelab">–°—Г–Љ–∞ –Ї–Њ–Љ—Ц—Б—Ц—Ч</label>
        <div style="display:flex;gap:6px">
          <input id="t-feeval" inputmode="decimal" placeholder="0" disabled style="flex:1">
          <select id="t-feecur" class="hidden" style="width:84px">${cross?`<option value="${F}">${curSym(F)}</option><option value="${T}">${curSym(T)}</option>`:''}</select>
        </div></div>
    </div>
    <div class="row ${cross?'':'hidden'}">
      <div style="flex:1"><label class="lab">${cross?`–Ъ—Г—А—Б: 1 ${curSym(ori.strong)} = X ${curSym(ori.weak)}`:'–Ъ—Г—А—Б'}</label><input id="t-rate" inputmode="decimal" placeholder="–љ–∞–њ—А. 41.5"></div>
      <div style="flex:1"><label class="lab">–°—Г–Љ–∞ (${cross?curSym(T):''}) вАФ –Ј–∞—А–∞—Е—Г—Ф—В—М—Б—П</label><input id="t-toamt" inputmode="decimal" placeholder="0.00"></div>
    </div>
    <div class="muted small ${cross?'':'hidden'}" id="t-ratehint" style="margin-top:-4px"></div>
    <div class="row">
      <div style="flex:1"><label class="lab">–Ф–∞—В–∞</label><input id="t-date" type="date" value="${todayISO()}"></div>
      <div style="flex:1"><label class="lab">–Э–Њ—В–∞—В–Ї–∞</label><input id="t-note" placeholder="вАФ"></div>
    </div>
    <div class="preview">
      <div class="pl"><span class="muted">–°–њ–Є—И–µ—В—М—Б—П –Ј ¬Ђ${esc(from.name)}¬ї</span><b style="color:var(--red)" id="t-debit">вАФ</b></div>
      <div class="pl"><span class="muted">–Ч–∞—А–∞—Е—Г—Ф—В—М—Б—П –љ–∞ ¬Ђ${esc(to.name)}¬ї</span><b style="color:var(--green)" id="t-credit">вАФ</b></div>
      <div class="pl"><span class="muted">–Ъ–Њ–Љ—Ц—Б—Ц—П</span><b style="color:var(--amber)" id="t-fee">вАФ</b></div>
    </div>
    <div class="err hidden" id="t-err"></div>
  </div>`);

  const feeType = $('#t-feetype', body), feeVal = $('#t-feeval', body), feeLab = $('#t-feelab', body), feeCurEl = $('#t-feecur', body);
  const amtEl = $('#t-amt', body), rateEl = $('#t-rate', body), toEl = $('#t-toamt', body);

  const feeCurNow = () => (cross && feeType.value === 'FIXED') ? feeCurEl.value : F;
  function curMult(){ const A = num(amtEl.value), B = cross ? num(toEl.value) : A; return (cross && A > 0 && B > 0) ? B / A : 1; }
  function paint(){
    const A = num(amtEl.value);
    const fc = feeCurNow();
    const fee = feeSourceAmount(feeType.value, num(feeVal.value), fc, F, A, curMult());
    const B = cross ? num(toEl.value) : A;
    $('#t-debit', body).textContent = 'вИТ' + money(round2(A + fee), F);
    $('#t-credit', body).textContent = '+' + money(round2(B), T);
    // –Ї–Њ–Љ—Ц—Б—Ц—О –њ–Њ–Ї–∞–Ј—Г—Ф–Љ–Њ —Г –≤–≤–µ–і–µ–љ—Ц–є –≤–∞–ї—О—В—Ц (–∞ —П–Ї—Й–Њ –≤–Њ–љ–∞ —Ц–љ—И–∞ вАФ —Й–µ –є –µ–Ї–≤—Ц–≤–∞–ї–µ–љ—В —Г –і–ґ–µ—А–µ–ї—Ц)
    $('#t-fee', body).textContent = (feeType.value === 'FIXED' && fc !== F)
      ? `${money(round2(num(feeVal.value)), fc)} вЙИ ${money(fee, F)}`
      : money(fee, F);
  }
  function fromRate(){ // –Ј–Љ—Ц–љ–Є–ї–∞—Б—М —Б—Г–Љ–∞/–Ї—Г—А—Б вЖТ –њ–µ—А–µ—А–∞—Е—Г–≤–∞—В–Є —Б—Г–Љ—Г –њ—А–Є–Ј–љ–∞—З–µ–љ–љ—П
    if (cross) { const A = num(amtEl.value), m = xToMultiplier(F, T, num(rateEl.value)); toEl.value = (A > 0 && m > 0) ? String(round2(A * m)) : ''; }
    paint();
  }
  function fromTo(){ // –Ј–Љ—Ц–љ–Є–ї–∞—Б—М —Б—Г–Љ–∞ –њ—А–Є–Ј–љ–∞—З–µ–љ–љ—П вЖТ –њ–µ—А–µ—А–∞—Е—Г–≤–∞—В–Є –Ї—Г—А—Б
    if (cross) { const A = num(amtEl.value), B = num(toEl.value); if (A > 0 && B > 0) rateEl.value = String(multiplierToX(F, T, B / A)); }
    paint();
  }
  feeType.onchange = () => {
    feeVal.disabled = feeType.value === 'NONE';
    feeLab.textContent = feeType.value === 'PERCENT' ? '–Т—Ц–і—Б–Њ—В–Њ–Ї, %' : '–°—Г–Љ–∞ –Ї–Њ–Љ—Ц—Б—Ц—Ч';
    if (feeType.value === 'NONE') feeVal.value = '';
    feeCurEl.classList.toggle('hidden', !(cross && feeType.value === 'FIXED'));
    paint();
  };
  amtEl.addEventListener('input', fromRate);
  rateEl.addEventListener('input', fromRate);
  toEl.addEventListener('input', fromTo);
  feeVal.addEventListener('input', paint);
  feeCurEl.addEventListener('change', paint);
  if (cross) {
    const defX = defaultCrossX(F, T);
    if (defX != null) { rateEl.value = String(defX); $('#t-ratehint', body).textContent = `–Ъ—Г—А—Б –Э–С–£${ratesCache.date ? ' –љ–∞ ' + fmtDate(ratesCache.date) : ''} вАФ –Ј–Љ—Ц–љ—Ц—В—М –Ї—Г—А—Б –∞–±–Њ —Б—Г–Љ—Г –љ–Є–ґ—З–µ.`; }
  }
  fromRate();

  openModal('–Я–µ—А–µ–Ї–∞–Ј –Љ—Ц–ґ —А–∞—Е—Г–љ–Ї–∞–Љ–Є', body, {
    saveLabel: '–Я–µ—А–µ–Ї–∞–Ј–∞—В–Є',
    onSave: (close) => {
      const amt = num(amtEl.value);
      const err = $('#t-err', body);
      if (amt <= 0) { err.textContent='–Т–≤–µ–і—Ц—В—М —Б—Г–Љ—Г –±—Ц–ї—М—И–µ 0'; err.classList.remove('hidden'); return; }
      let toAmount, mult;
      if (cross) {
        toAmount = round2(num(toEl.value));
        if (toAmount <= 0) { err.textContent='–Т–Ї–∞–ґ—Ц—В—М –Ї—Г—А—Б –∞–±–Њ —Б—Г–Љ—Г –≤ –≤–∞–ї—О—В—Ц –њ—А–Є–Ј–љ–∞—З–µ–љ–љ—П'; err.classList.remove('hidden'); return; }
        mult = toAmount / amt;
      } else { toAmount = round2(amt); mult = 1; }
      const fc = feeCurNow();
      const fee = feeSourceAmount(feeType.value, num(feeVal.value), fc, F, amt, mult);
      state.transactions.push({
        id: nextId('tx'), ord: nextOrd(), kind:'TRANSFER', date: $('#t-date', body).value || todayISO(),
        note: $('#t-note', body).value.trim() || null,
        account_id: from.id, to_account_id: to.id,
        amount: round2(amt), to_amount: toAmount,
        exchange_rate: mult, fee_type: feeType.value, fee_value: num(feeVal.value), fee_currency: fc, fee_amount: fee,
      });
      save(); close(); render();
    }
  });
}

      <div style="flex:1"><label class="lab">–Э–Њ—В–∞—В–Ї–∞</label><input id="e-note" value="${esc(tx.note||'')}" placeholder="вАФ"></div>

    meta();

  { // –њ–Њ—З–∞—В–Ї–Њ–≤—Ц –Ј–љ–∞—З–µ–љ–љ—П –Ї—Г—А—Б—Г –є —Б—Г–Љ–Є –њ—А–Є–Ј–љ–∞—З–µ–љ–љ—П –Ј—Ц –Ј–±–µ—А–µ–ґ–µ–љ–Њ–≥–Њ –њ–µ—А–µ–Ї–∞–Ј—Г

      const amt = num($$('#e-amt').value);
      if (amt <= 0) return show('–Т–≤–µ–і—Ц—В—М —Б—Г–Љ—Г –±—Ц–ї—М—И–µ 0');
      const ft = $$('#e-feetype').value;

      let toAmount, mult;
      if (cross) {

        mult = toAmount / amt;
      } else { toAmount = round2(amt); mult = 1; }
      const fc = feeCurNow();
      const fee = feeSourceAmount(ft, num($$('#e-feeval').value), fc, from.currency_code, amt, mult);
      Object.assign(tx, {
        account_id: from.id, to_account_id: to.id,
        amount: round2(amt), to_amount: toAmount,
        exchange_rate: mult,
        fee_type: ft, fee_value: num($$('#e-feeval').value), fee_currency: fc, fee_amount: fee,
        date: $$('#e-date').value || todayISO(), note: $$('#e-note').value.trim() || null,
      });
      save(); close(); render();
    }
  });
}

function txRow(t, { onEdit, onDelete, onDup } = {}) {
  const isT = t.kind === 'TRANSFER', isInc = t.kind === 'INCOME';
  const cat = t.category_id ? categoryById(t.category_id) : null;
  const icon = isT ? 'вЗД' : isInc ? 'пЉЛ' : (cat?.icon || 'пЉН');
  const color = isT ? '#0ea5e9' : isInc ? 'var(--green)' : (cat?.color || 'var(--red)');
  const cur = accountCur(t.account_id);
  const title = isT ? `${accountName(t.account_id)} вЖТ ${accountName(t.to_account_id)}` : (cat?.name || '–С–µ–Ј –Ї–∞—В–µ–≥–Њ—А—Ц—Ч');
  let sub;
  if (isT) {
    const T = accountCur(t.to_account_id);
    const cross = cur !== T && t.to_amount != null;
    const parts = [];
    if (cross) {
      const ori = rateOrientation(cur, T);
      const mult = (t.exchange_rate && t.exchange_rate > 0) ? t.exchange_rate : (t.amount ? t.to_amount / t.amount : 1);
      const X = +multiplierToX(cur, T, mult).toFixed(4);
      parts.push(`1 ${curSym(ori.strong)} = ${X} ${curSym(ori.weak)}`);
      parts.push(`вЖТ ${money(t.to_amount, T)}`);
    } else {
      parts.push('–Я–µ—А–µ–Ї–∞–Ј');
    }
    if (t.fee_amount > 0) parts.push(`–Ї–Њ–Љ—Ц—Б—Ц—П ${money(t.fee_amount, cur)}`);
    sub = parts.join(' ¬Ј ');
  } else {
    sub = accountName(t.account_id);
  }
  const amtHtml = isT
    ? `<span class="txamt muted">${money(t.amount,cur)}</span>`
    : `<span class="txamt" style="color:${isInc?'var(--green)':'var(--red)'}">${isInc?'+':'вИТ'}${money(t.amount,cur)}</span>`;
  const row = el(`<div class="txrow">
    <span class="txicon" style="background:${color}22;color:${color}">${icon}</span>
    <div class="txmain"><div class="txtitle">${esc(title)}</div>
      <div class="txsub">${fmtDate(t.date)} ¬Ј ${esc(sub)}${t.note?' ¬Ј '+esc(t.note):''}${(t.tags&&t.tags.length)?' ¬Ј '+t.tags.map(x=>'#'+esc(x)).join(' '):''}</div></div>
    <div style="text-align:right">${amtHtml}</div>
  </div>`);
  if (onDup) { const b = el(`<button class="btn ghost sm" title="–Ф—Г–±–ї—О–≤–∞—В–Є">вІЙ</button>`); b.onclick=()=>onDup(t); row.appendChild(b); }
  if (onEdit) { const b = el(`<button class="btn ghost sm">вЬО</button>`); b.onclick=()=>onEdit(t); row.appendChild(b); }
  if (onDelete) { const b = el(`<button class="btn danger sm">вЬХ</button>`); b.onclick=()=>onDelete(t); row.appendChild(b); }
  return row;
}

// –Ф—Г–±–ї—О–≤–∞—В–Є –Њ–њ–µ—А–∞—Ж—Ц—О: –≤—Ц–і–Ї—А–Є–≤–∞—Ф–Љ–Њ —Д–Њ—А–Љ—Г –Ј –њ—Ц–і—Б—В–∞–≤–ї–µ–љ–Є–Љ–Є –і–∞–љ–Є–Љ–Є (–Љ–Њ–ґ–љ–∞ –Ј–Љ—Ц–љ–Є—В–Є —Б—Г–Љ—Г), –і–∞—В–∞ вАФ —Б—М–Њ–≥–Њ–і–љ—Ц.
function duplicateTx(tx) {
  if (tx.kind === 'TRANSFER') {
    if (tx.account_id && tx.to_account_id && state.accounts.find(a=>a.id===tx.account_id) && state.accounts.find(a=>a.id===tx.to_account_id))
      openTransferDialog(tx.account_id, tx.to_account_id);
    return;
  }
  openEntryForm(tx.kind, null, null, { amount: tx.amount, account_id: tx.account_id, category_id: tx.category_id, note: tx.note, tags: tx.tags });
}

//==================== SVG-–і—Ц–∞–≥—А–∞–Љ–Є ====================
function pieSVG(data, size=170) {
  const total = data.reduce((s,d)=>s+d.total,0);
  if (total <= 0) return el(`<div class="empty">–Э–µ–Љ–∞—Ф –і–∞–љ–Є—Е</div>`);
  const r = size/2, ir = r*0.58, cx = r, cy = r;
  let ang = -Math.PI/2; let paths = '';
  if (data.length === 1) {
    paths = `<circle cx="${cx}" cy="${cy}" r="${(r+ir)/2}" fill="none" stroke="${data[0].color}" stroke-width="${r-ir}"/>`;
  } else {
    for (const d of data) {
      const frac = d.total/total; const a2 = ang + frac*2*Math.PI;
      const large = frac > 0.5 ? 1 : 0;
      const x1=cx+r*Math.cos(ang), y1=cy+r*Math.sin(ang), x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
      const xi2=cx+ir*Math.cos(a2), yi2=cy+ir*Math.sin(a2), xi1=cx+ir*Math.cos(ang), yi1=cy+ir*Math.sin(ang);
      paths += `<path d="M${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2} L${xi2} ${yi2} A${ir} ${ir} 0 ${large} 0 ${xi1} ${yi1} Z" fill="${d.color}"/>`;
      ang = a2;
    }
  }
  return el(`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}</svg>`);
}

function barsSVG(months) {
  // –Ъ–Њ–Њ—А–і–Є–љ–∞—В–Є –њ–Њ –≥–Њ—А–Є–Ј–Њ–љ—В–∞–ї—Ц вАФ –≤ –Њ–і–Є–љ–Є—Ж—П—Е viewBox (0..100), —Й–Њ–± —Г—Б–µ –≤–Є—А—Ц–≤–љ—О–≤–∞–ї–Њ—Б—М –љ–µ–Ј–∞–ї–µ–ґ–љ–Њ –≤—Ц–і —И–Є—А–Є–љ–Є.
  const w = 100/Math.max(months.length,1);
  const max = Math.max(1, ...months.flatMap(m=>[m.income,m.expense,m.fees]));
  const H = 180;
  let bars = '';
  months.forEach((m,i) => {
    const bw = w*0.22, gap = w*0.06, base = i*w + w*0.12;
    const vals = [[m.income,'#16a34a'],[m.expense,'#ef4444'],[m.fees,'#f59e0b']];
    vals.forEach(([v,c],j) => {
      const h = (v/max)*(H-6);
      bars += `<rect x="${(base + j*(bw+gap)).toFixed(2)}" y="${(H-h).toFixed(2)}" width="${bw.toFixed(2)}" height="${h.toFixed(2)}" rx="0.6" fill="${c}"/>`;
    });
  });
  return el(`<svg width="100%" height="${H}" viewBox="0 0 100 ${H}" preserveAspectRatio="none" style="overflow:visible;display:block">${bars}</svg>`);
}

//==================== –Ф–∞—В–Є / –∞–љ–∞–ї—Ц—В–Є–Ї–∞: —Б–ї—Г–ґ–±–Њ–≤—Ц —Д—Г–љ–Ї—Ж—Ц—Ч ====================
function isoOf(d){ const tz = d.getTimezoneOffset()*60000; return new Date(d.getTime()-tz).toISOString().slice(0,10); }
function addMonthsISO(iso, n){ const [y,m,d] = iso.split('-').map(Number); return isoOf(new Date(y, m-1+n, d)); }
function addDaysISO(iso, n){ return isoOf(new Date(Date.parse(iso) + n*86400000)); }
function nextRecurDate(iso, freq){ return freq==='weekly' ? addDaysISO(iso, 7) : addMonthsISO(iso, 1); }
function prevRecurDate(iso, freq){ return freq==='weekly' ? addDaysISO(iso, -7) : addMonthsISO(iso, -1); }
const FREQ_LABEL = { monthly:'—Й–Њ–Љ—Ц—Б—П—Ж—П', weekly:'—Й–Њ—В–Є–ґ–љ—П' };
function ymd(y,m,d){ return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function presetRange(name){
  const now = new Date(), y = now.getFullYear(), m = now.getMonth();
  if (name==='month') return { from: ymd(y,m+1,1), to: todayISO() };
  if (name==='lastmonth'){ const pm = new Date(y,m-1,1); const ly=pm.getFullYear(), lmo=pm.getMonth(); return { from: ymd(ly,lmo+1,1), to: ymd(ly,lmo+1,new Date(ly,lmo+1,0).getDate()) }; }
  if (name==='year') return { from: ymd(y,1,1), to: todayISO() };
  if (name==='all') return { from:'', to: todayISO() };
  return { from: monthStartISO(), to: todayISO() };
}
function prevRange(from, to){
  if (!from || !to) return null;
  const f = Date.parse(from), t = Date.parse(to); const len = t - f;
  return { from: isoOf(new Date(f-len-86400000)), to: isoOf(new Date(f-86400000)) };
}
function pctDelta(cur, prev){ if (!prev) return null; return Math.round((cur-prev)/Math.abs(prev)*100); }
// –І–Є—Б—В—Ц –∞–Ї—В–Є–≤–Є (UAH-–µ–Ї–≤ –Ј–∞ –њ–Њ—В–Њ—З–љ–Є–Љ –Ї—Г—А—Б–Њ–Љ) —Б—В–∞–љ–Њ–Љ –љ–∞ –і–∞—В—Г.
function netWorthAt(dateISO){
  let total = 0;
  state.accounts.forEach(a => {
    let bal = a.initial_balance || 0;
    state.transactions.forEach(t => { if (t.date > dateISO) return;
      if (t.kind==='INCOME' && t.account_id===a.id) bal += t.amount;
      else if (t.kind==='EXPENSE' && t.account_id===a.id) bal -= t.amount;
      else if (t.kind==='TRANSFER'){ if(t.account_id===a.id) bal -= (t.amount+(t.fee_amount||0)); if(t.to_account_id===a.id) bal += (t.to_amount||0); } });
    const u = toUAH(bal, a.currency_code); total += (u==null ? bal : u);
  });
  return round2(total);
}
function lastMonthEnds(n){ const arr=[]; const now=new Date(); for(let i=n-1;i>=0;i--){ const d=new Date(now.getFullYear(), now.getMonth()-i+1, 0); arr.push({ iso: isoOf(d), label: ymd(d.getFullYear(), d.getMonth()+1, 1).slice(2,7) }); } return arr; }
function netWorthSVG(points){
  const H=130, W=100; const vals=points.map(p=>p.value);
  const min=Math.min(0,...vals), max=Math.max(1,...vals); const range=(max-min)||1;
  const x=i=> points.length<=1?W/2 : (i/(points.length-1))*W;
  const y=v=> H-6 - ((v-min)/range)*(H-12);
  const line = points.map((p,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(p.value).toFixed(1)}`).join(' ');
  const area = `M0 ${H-6} ` + points.map((p,i)=>`L${x(i).toFixed(1)} ${y(p.value).toFixed(1)}`).join(' ') + ` L${W} ${H-6} Z`;
  return el(`<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="overflow:visible;display:block">
    <path d="${area}" fill="var(--accent)" opacity="0.13"/>
    <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="1.1" vector-effect="non-scaling-stroke"/></svg>`);
}
// –†—П–і–Њ–Ї –њ—Ц–і–њ–Є—Б—Ц–≤ –њ—Ц–і –≥—А–∞—Д—Ц–Ї–Њ–Љ (–Ј–≤–Є—З–∞–є–љ–Є–є HTML вАФ –±–µ–Ј —Б–њ–Њ—В–≤–Њ—А–µ–љ–љ—П).
function chartLabels(labels){
  const n = labels.length, step = Math.max(1, Math.ceil(n/6));
  const shown = labels.map((l,i)=> (i%step===0 || i===n-1) ? l : '');

}

  </div>`);
  app.appendChild(sum);

  // –±—О–і–ґ–µ—В–Є (–Ї–Њ–ґ–љ–∞ –Ї–∞—В–µ–≥–Њ—А—Ц—П —Г —Б–≤–Њ—Ф–Љ—Г —Ж–Є–Ї–ї—Ц вАФ –Љ—Ц—Б—П—Ж—М/—А—Ц–Ї)
  const bcard = budgetsCard();

  const nwPoints = lastMonthEnds(12).map(m => ({ label: m.label, value: netWorthAt(m.iso) }));
  const nw = el(`<div class="card" style="padding:14px;margin-top:14px">
    <div class="row" style="justify-content:space-between;align-items:baseline"><h2>–І–Є—Б—В—Ц –∞–Ї—В–Є–≤–Є (вВі-–µ–Ї–≤)</h2>
      <b class="tabnum">${money(nwPoints[nwPoints.length-1].value)}</b></div>
    <div class="muted small" style="margin-top:2px">–њ—А–Є–±–ї–Є–Ј–љ–Њ, –Ј–∞ –њ–Њ—В–Њ—З–љ–Є–Љ –Ї—Г—А—Б–Њ–Љ –≤–∞–ї—О—В</div></div>`);
  nw.appendChild(netWorthSVG(nwPoints));
  nw.appendChild(chartLabels(nwPoints.map(p=>p.label)));
  app.appendChild(nw);

  // –Ј–∞ –Ї–∞—В–µ–≥–Њ—А—Ц—П–Љ–Є
  function catData(kind) {
    const map = {};
    state.transactions.forEach(t => { if(t.kind!==kind || !inR(t)) return;
      const c = t.category_id ? categoryById(t.category_id) : null;
      const key = c ? c.id : 0;

  [['–Т–Є—В—А–∞—В–Є –Ј–∞ —Б—В–∞—В—В—П–Љ–Є', catData('EXPENSE')], ['–Э–∞–і—Е–Њ–і–ґ–µ–љ–љ—П –Ј–∞ —Б—В–∞—В—В—П–Љ–Є', catData('INCOME')]].forEach(([title,data]) => {
    const total = data.reduce((s,d)=>s+d.total,0);
    const cardEl = el(`<div class="card" style="padding:14px"><h2 style="margin-bottom:10px">${title}</h2></div>`);
    if (data.length === 0) { cardEl.appendChild(el(`<div class="empty">–Э–µ–Љ–∞—Ф –і–∞–љ–Є—Е</div>`)); }
    else {
      const wrap = el(`<div class="row" style="align-items:center;flex-wrap:wrap"></div>`);
      const pieBox = el(`<div style="flex:0 0 auto"></div>`); pieBox.appendChild(pieSVG(data));
      const leg = el(`<ul class="legend" style="flex:1;min-width:150px"></ul>`);
      data.forEach(d => leg.appendChild(el(`<li><span class="ld" style="background:${d.color}"></span>
        <span class="ln">${d.icon?d.icon+' ':''}${esc(d.name)}</span>
        <b class="tabnum">${money(d.total)}</b>
        <span class="muted" style="width:38px;text-align:right">${total?Math.round(d.total/total*100):0}%</span></li>`)));
      wrap.appendChild(pieBox); wrap.appendChild(leg); cardEl.appendChild(wrap);
    }
    grid.appendChild(cardEl);
  });
  app.appendChild(grid);

  // –≤–Є—В—А–∞—В–Є –њ–Њ —А–∞—Е—Г–љ–Ї–∞—Е —Ц –њ–Њ –±–∞–љ–Ї–∞—Е
  function spendBy(keyFn) {
    const map = {};
    state.transactions.forEach(t => { if (t.kind!=='EXPENSE' || !inR(t)) return; const k = keyFn(t); if (k==null) return; map[k]=(map[k]||0)+txUAH(t); });
    return map;
  }
  const byAcc = spendBy(t => t.account_id);
  const accRows = Object.entries(byAcc).map(([id,v]) => ({ a: state.accounts.find(x=>x.id==id), total:v })).filter(x=>x.a).sort((a,b)=>b.total-a.total);
  const byBank = {};
  accRows.forEach(r => { const bid = r.a.bank_id || 0; byBank[bid] = (byBank[bid]||0) + r.total; });
  const bankRows = Object.entries(byBank).map(([bid,v]) => ({ name: bid=='0' ? '–С–µ–Ј –±–∞–љ–Ї—Г' : (bankById(parseInt(bid))?.name || 'вАФ'), color: '#64748b', total:v })).sort((a,b)=>b.total-a.total);

  const breakdown = el(`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-top:14px"></div>`);
  const mkList = (title, rows, colorOf) => {
    const total = rows.reduce((s,r)=>s+r.total,0);
    const card = el(`<div class="card" style="padding:14px"><h2 style="margin-bottom:10px">${title}</h2></div>`);
    if (!rows.length) { card.appendChild(el(`<div class="empty">–Э–µ–Љ–∞—Ф –і–∞–љ–Є—Е</div>`)); return card; }
    const ul = el(`<div></div>`);
    rows.forEach(r => { const c = colorOf(r); const pct = total?Math.round(r.total/total*100):0;
      ul.appendChild(el(`<div style="margin:8px 0">
        <div style="display:flex;justify-content:space-between;font-size:14px"><span class="ln">${esc(r.name||(r.a&&r.a.name)||'')}</span><b class="tabnum">${money(r.total)}</b></div>
        <div class="pbar" style="margin-top:4px"><i style="width:${pct}%;background:${c}"></i></div></div>`)); });
    card.appendChild(ul); return card;
  };
  breakdown.appendChild(mkList('–Т–Є—В—А–∞—В–Є –њ–Њ —А–∞—Е—Г–љ–Ї–∞—Е', accRows, r => r.a.color || 'var(--accent)'));
  breakdown.appendChild(mkList('–Т–Є—В—А–∞—В–Є –њ–Њ –±–∞–љ–Ї–∞—Е', bankRows, () => 'var(--accent)'));
  app.appendChild(breakdown);

  // –њ–Њ–Љ—Ц—Б—П—З–љ–∞ –і–Є–љ–∞–Љ—Ц–Ї–∞
  const mMap = {};
  state.transactions.forEach(t => { if(!inR(t))return; const m = t.date.slice(0,7);
    if(!mMap[m]) mMap[m] = { month:m, income:0, expense:0, fees:0 };
    if(t.kind==='INCOME')mMap[m].income+=txUAH(t); else if(t.kind==='EXPENSE')mMap[m].expense+=txUAH(t); else if(t.kind==='TRANSFER')mMap[m].fees+=feeUAH(t); });
  const months = Object.values(mMap).sort((a,b)=>a.month<b.month?-1:1);
  const dyn = el(`<div class="card" style="padding:14px;margin-top:14px"><h2 style="margin-bottom:10px">–Ф–Є–љ–∞–Љ—Ц–Ї–∞ –њ–Њ –Љ—Ц—Б—П—Ж—П—Е</h2></div>`);
  if (months.length === 0) dyn.appendChild(el(`<div class="empty">–Э–µ–Љ–∞—Ф –і–∞–љ–Є—Е –Ј–∞ –њ–µ—А—Ц–Њ–і</div>`));
  else {
    dyn.appendChild(barsSVG(months));
    dyn.appendChild(chartLabels(months.map(m=>m.month.slice(2))));
    dyn.appendChild(el(`<div class="row small muted" style="gap:16px;margin-top:8px">
      <span><span style="color:#16a34a">вЦ†</span> –Э–∞–і—Е–Њ–і–ґ–µ–љ–љ—П</span>
      <span><span style="color:#ef4444">вЦ†</span> –Т–Є—В—А–∞—В–Є</span>
      <span><span style="color:#f59e0b">вЦ†</span> –Ъ–Њ–Љ—Ц—Б—Ц—Ч</span></div>`));
  }
  app.appendChild(dyn);
};

//==================== –Т–Є–≥–ї—П–і: –†–∞—Е—Г–љ–Ї–Є ====================
let accBankFilter = '';   // '' = —Г—Б—Ц (–≥—А—Г–њ—Г–≤–∞—В–Є –њ–Њ –±–∞–љ–Ї–∞—Е); 'none' = –±–µ–Ј –±–∞–љ–Ї—Г; —Ц–љ–∞–Ї—И–µ id –±–∞–љ–Ї—Г
views.accounts = (app) => {
  const head = el(`<div class="row" style="justify-content:space-between;align-items:center"><h1 style="margin:0">–†–∞—Е—Г–љ–Ї–Є</h1></div>`);
  const add = el(`<button class="btn primary">+ –Ф–Њ–і–∞—В–Є —А–∞—Е—Г–љ–Њ–Ї</button>`);
  add.onclick = () => openAccountForm();
  head.appendChild(add); app.appendChild(head);

  // —Б–њ–Њ–≤—Ц—Й–µ–љ–љ—П –њ—А–Њ –±–∞–љ–Ї–Є –±–µ–Ј –ґ–Њ–і–љ–Њ–≥–Њ —А–∞—Е—Г–љ–Ї—Г
  const emptyBanks = state.banks.filter(b => !state.accounts.some(a => a.bank_id === b.id));
  if (emptyBanks.length) {
    app.appendChild(el(`<div class="notice" style="margin-top:10px">вЪ†пЄП ${emptyBanks.length === 1 ? '–С–∞–љ–Ї' : '–С–∞–љ–Ї–Є'} –±–µ–Ј –ґ–Њ–і–љ–Њ–≥–Њ –њ—А–Є–≤ Љ—П–Ј–∞–љ–Њ–≥–Њ —А–∞—Е—Г–љ–Ї—Г: <b>${emptyBanks.map(b=>esc(b.name)).join(', ')}</b>. –Ф–Њ–і–∞–є—В–µ —А–∞—Е—Г–љ–Њ–Ї —Ц –≤–Ї–∞–ґ—Ц—В—М –і–ї—П –љ—М–Њ–≥–Њ –±–∞–љ–Ї (–њ–Њ–ї–µ ¬Ђ–С–∞–љ–Ї¬ї —Г —Д–Њ—А–Љ—Ц —А–∞—Е—Г–љ–Ї—Г).</div>`));
  }

  // —Д—Ц–ї—М—В—А –њ–Њ –±–∞–љ–Ї—Г
  if (state.banks.length > 0) {
    const f = el(`<div style="max-width:280px;margin-top:10px"><label class="lab">–С–∞–љ–Ї</label><select id="acc-bf">
      <option value="">–£—Б—Ц (–њ–Њ –±–∞–љ–Ї–∞—Е)</option>
      ${state.banks.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('')}
      <option value="none">–С–µ–Ј –±–∞–љ–Ї—Г</option>
    </select></div>`);
    $('#acc-bf', f).value = accBankFilter;
    $('#acc-bf', f).onchange = (e) => { accBankFilter = e.target.value; render(); };
    app.appendChild(f);
  }
  app.appendChild(el(`<div class="muted small" style="margin-top:8px">–Я–µ—А–µ—В—П–≥—Г–є—В–µ –Ї–∞—А—В–Ї–Є, —Й–Њ–± –Ј–Љ—Ц–љ–Є—В–Є –њ–Њ—А—П–і–Њ–Ї (–Ј–∞—Б—В–Њ—Б—Г—Ф—В—М—Б—П —Ц –љ–∞ ¬Ђ–Ю–≥–ї—П–і—Ц¬ї).</div>`));

  function accCard(a) {
    const bnk = a.bank_id ? bankById(a.bank_id) : null;
    const c = el(`<div class="card" style="padding:14px;border-left:4px solid ${a.color};display:flex;align-items:flex-start;gap:8px${a.archived?';opacity:.6':''}">
      <span class="grip" title="–Я–µ—А–µ—В—П–≥–љ—Ц—В—М, —Й–Њ–± –Ј–Љ—Ц–љ–Є—В–Є –њ–Њ—А—П–і–Њ–Ї" style="margin-top:2px">в†њ</span>
      <div style="min-width:0;flex:1"><div style="font-weight:600">${a.icon?a.icon+' ':''}${esc(a.name)}${a.archived?' <span class="muted small">(–∞—А—Е—Ц–≤)</span>':''}</div>
      <div class="muted small">${TYPE_LABEL[a.type]} ¬Ј ${curSym(a.currency_code)}${bnk?' ¬Ј '+esc(bnk.name):''} ¬Ј —Б—В–∞—А—В: ${money(a.initial_balance,a.currency_code)}</div>
      <div class="tabnum" style="font-size:18px;font-weight:800;margin-top:4px">${money(accountBalance(a.id),a.currency_code)}</div></div>
      <div style="display:flex;flex-direction:column;gap:4px"></div></div>`);
    const actions = c.lastElementChild;
    const ed = el(`<button class="btn ghost sm">–Ч–Љ—Ц–љ–Є—В–Є</button>`); ed.onclick=()=>openAccountForm(a);
    const arch = el(`<button class="btn ghost sm">${a.archived?'–†–Њ–Ј–∞—А—Е—Ц–≤—Г–≤–∞—В–Є':'–Р—А—Е—Ц–≤—Г–≤–∞—В–Є'}</button>`);
    arch.onclick = () => { a.archived = a.archived ? 0 : 1; save(); render(); };
    const del = el(`<button class="btn danger sm">–Т–Є–і–∞–ї–Є—В–Є</button>`);
    del.onclick=()=>deleteWithUndo(`–†–∞—Е—Г–љ–Њ–Ї ¬Ђ${a.name}¬ї –≤–Є–і–∞–ї–µ–љ–Њ`, () => {
      // –њ–Њ–≤–µ—А—В–∞—Ф–Љ–Њ —Б—Г–Љ–Є –Ї—А–µ–і–Є—В—Ц–≤ –Ј–∞ –њ–ї–∞—В–µ–ґ–∞–Љ–Є, —Й–Њ –≤–Є–і–∞–ї—П—О—В—М—Б—П —А–∞–Ј–Њ–Љ –Ј —А–∞—Е—Г–љ–Ї–Њ–Љ
      state.transactions.forEach(t => {
        if ((t.account_id===a.id || t.to_account_id===a.id) && t.loan_id) {
          const loan = state.loans.find(l=>l.id===t.loan_id);
          if (loan) loan.paid = round2(Math.max(0, (loan.paid||0) - (t.amount||0)));
        }
      });
      state.accounts = state.accounts.filter(x=>x.id!==a.id);
      state.transactions = state.transactions.filter(t=>t.account_id!==a.id && t.to_account_id!==a.id);
      state.recurring = state.recurring.filter(r=>r.account_id!==a.id);            // —А–µ–≥—Г–ї—П—А–љ—Ц –±–µ–Ј —А–∞—Е—Г–љ–Ї—Г вАФ –≤–Є–і–∞–ї—П—Ф–Љ–Њ
      state.banks.forEach(b=>{ if(b.primary_account_id===a.id) b.primary_account_id=null; }); // —Б–Ї–Є–і–∞—Ф–Љ–Њ ¬Ђ–Њ—Б–љ–Њ–≤–љ–Є–є —А–∞—Е—Г–љ–Њ–Ї¬ї
    });
    actions.appendChild(ed); actions.appendChild(arch); actions.appendChild(del);
    makeReorderable(c, 'acc', a.id, reorderAccount);
    return c;
  }
  const gridOf = (list) => { const g = el(`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr));margin-top:8px"></div>`); list.forEach(a=>g.appendChild(accCard(a))); return g; };

  if (state.accounts.length === 0) { app.appendChild(el(`<div class="muted" style="margin-top:8px">–©–µ –љ–µ–Љ–∞—Ф —А–∞—Е—Г–љ–Ї—Ц–≤.</div>`)); return; }

  const active = a => !a.archived;
  if (accBankFilter === '') {
    const hasBanks = state.banks.length > 0;
    // –≥—А—Г–њ—Г–≤–∞–љ–љ—П –њ–Њ –±–∞–љ–Ї–∞—Е + —Б—Г–Љ–∞—А–љ–Є–є –±–∞–ї–∞–љ—Б –≥—А—Г–њ–Є –Ј–∞ –≤–∞–ї—О—В–∞–Љ–Є
    state.banks.forEach(b => {
      const list = state.accounts.filter(a => active(a) && a.bank_id === b.id);
      if (list.length === 0) return;
      const total = {}; list.forEach(a => total[a.currency_code]=(total[a.currency_code]||0)+accountBalance(a.id));
      const totStr = Object.entries(total).map(([c,v])=>money(v,c)).join(' ¬Ј ');
      app.appendChild(el(`<div class="row" style="justify-content:space-between;align-items:baseline;margin-top:16px"><h2 style="min-width:0">${esc(b.name)}</h2><span class="muted small tabnum">${totStr}</span></div>`));
      app.appendChild(gridOf(list));
    });
    const none = state.accounts.filter(a => active(a) && !a.bank_id);
    if (none.length) {
      if (hasBanks) app.appendChild(el(`<div class="row" style="margin-top:16px"><h2 class="muted">–С–µ–Ј –±–∞–љ–Ї—Г</h2></div>`));
      app.appendChild(gridOf(none));
    }
  } else {
    const list = (accBankFilter === 'none'
      ? state.accounts.filter(a => !a.bank_id)
      : state.accounts.filter(a => a.bank_id === parseInt(accBankFilter))).filter(active);
    if (list.length === 0) app.appendChild(el(`<div class="muted" style="margin-top:8px">–Э–µ–Љ–∞—Ф —А–∞—Е—Г–љ–Ї—Ц–≤ —Г —Ж—Ц–є –≥—А—Г–њ—Ц.</div>`));
    else app.appendChild(gridOf(list));
  }

  // –∞—А—Е—Ц–≤–љ—Ц —А–∞—Е—Г–љ–Ї–Є
  const archived = state.accounts.filter(a => a.archived);
  if (archived.length) {
    const t = el(`<div style="margin-top:18px"><button class="btn ghost sm" id="show-arch">${showArchived?'вЦЊ':'вЦЄ'} –Р—А—Е—Ц–≤–љ—Ц —А–∞—Е—Г–љ–Ї–Є (${archived.length})</button></div>`);
    $('#show-arch', t).onclick = () => { showArchived = !showArchived; render(); };
    app.appendChild(t);
    if (showArchived) app.appendChild(gridOf(archived));
  }
};

function moveCategory(cat, dir) {
  const same = state.categories.filter(c => c.kind === cat.kind);
  const idx = same.indexOf(cat);
  const target = same[idx + dir];
  if (!target) return;
  const i1 = state.categories.indexOf(cat), i2 = state.categories.indexOf(target);
  [state.categories[i1], state.categories[i2]] = [state.categories[i2], state.categories[i1]];
  save(); render();
}

function goalMonthsLeft(g){ if (!g.deadline) return null; const now=new Date(); const d=new Date(g.deadline); return Math.max(0, (d.getFullYear()-now.getFullYear())*12 + (d.getMonth()-now.getMonth())); }
function goalNeedPerMonth(g){ const ml=goalMonthsLeft(g); if (ml==null) return null; const rem=Math.max(0,(g.target||0)-(g.saved||0)); return ml>0 ? round2(rem/ml) : rem; }

function recalcSeq(data){
  const mx = (arr)=>arr.reduce((m,x)=>Math.max(m,x.id||0),0);
  return { acc: mx(data.accounts||[])+1, cat: mx(data.categories||[])+1, tx: mx(data.transactions||[])+1,
           bank: mx(data.banks||[])+1, loan: mx(data.loans||[])+1, rec: mx(data.recurring||[])+1, goal: mx(data.goals||[])+1 };
}
// –Я—А–Є–≤–µ—Б—В–Є –±—Г–і—М-—П–Ї–Є–є –±–µ–Ї–∞–њ (—Б—В–∞—А–Є–є v1 —З–Є –љ–Њ–≤–Є–є v2) –і–Њ –њ–Њ—В–Њ—З–љ–Њ—Ч —Б—Е–µ–Љ–Є.
function migrateBackup(raw){
  let d = (raw && raw.data && Array.isArray(raw.data.accounts)) ? raw.data : raw;
  d = JSON.parse(JSON.stringify(d || {}));
  d.accounts = d.accounts || []; d.categories = d.categories || []; d.transactions = d.transactions || [];
  d.banks = d.banks || []; d.loans = d.loans || []; d.recurring = d.recurring || []; d.goals = d.goals || [];
  const rs = recalcSeq(d);
  d.seq = d.seq || {};
  ['acc','cat','tx','bank','loan','rec','goal'].forEach(k => { if (d.seq[k] == null) d.seq[k] = rs[k]; });
  d.version = SCHEMA_VERSION;
  return d;
}
