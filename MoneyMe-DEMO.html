//==================== SVG-діаграми ====================
function pieSVG(data, size=170) {
  const total = data.reduce((s,d)=>s+d.total,0);
  if (total <= 0) return el(`<div class="empty">Немає даних</div>`);
  const r = size/2, ir = r*0.58, cx = r, cy = r;
  let ang = -Math.PI/2; let paths = '';
  if (data.length === 1) {
    paths = `<circle cx="${cx}" cy="${cy}" r="${(r+ir)/2}" fill="none" stroke="${data[0].color}" stroke-width="${r-ir}"/>`;
  } else {
    for (const d of data) {
      const frac = d.total/total; const a2 = ang + frac*2*Math.PI;
      const large = frac > 0.5 ? 1 : 0;
      const x1=cx+r*Math.cos(ang), y1=cy+r*Math.sin(ang), x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
      const xi2=cx+ir*Math.cos(a2), yi2=cy+ir*Math.sin(a2), xi1=cx+ir*Math.cos(ang), yi1=cy+ir*Math.sin(ang);
      paths += `<path d="M${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2} L${xi2} ${yi2} A${ir} ${ir} 0 ${large} 0 ${xi1} ${yi1} Z" fill="${d.color}"/>`;
      ang = a2;
    }
  }
  return el(`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}</svg>`);
}

function barsSVG(months) {
  // Координати по горизонталі — в одиницях viewBox (0..100), щоб усе вирівнювалось незалежно від ширини.
  const w = 100/Math.max(months.length,1);
  const max = Math.max(1, ...months.flatMap(m=>[m.income,m.expense,m.fees]));
  const H = 180;
  let bars = '';
  months.forEach((m,i) => {
    const bw = w*0.22, gap = w*0.06, base = i*w + w*0.12;
    const vals = [[m.income,'#16a34a'],[m.expense,'#ef4444'],[m.fees,'#f59e0b']];
    vals.forEach(([v,c],j) => {
      const h = (v/max)*(H-6);
      bars += `<rect x="${(base + j*(bw+gap)).toFixed(2)}" y="${(H-h).toFixed(2)}" width="${bw.toFixed(2)}" height="${h.toFixed(2)}" rx="0.6" fill="${c}"/>`;
    });
  });
  return el(`<svg width="100%" height="${H}" viewBox="0 0 100 ${H}" preserveAspectRatio="none" style="overflow:visible;display:block">${bars}</svg>`);
}

//==================== Дати / аналітика: службові функції ====================
function isoOf(d){ const tz = d.getTimezoneOffset()*60000; return new Date(d.getTime()-tz).toISOString().slice(0,10); }
function addMonthsISO(iso, n){ const [y,m,d] = iso.split('-').map(Number); return isoOf(new Date(y, m-1+n, d)); }
function addDaysISO(iso, n){ return isoOf(new Date(Date.parse(iso) + n*86400000)); }
function nextRecurDate(iso, freq){ return freq==='weekly' ? addDaysISO(iso, 7) : addMonthsISO(iso, 1); }
function prevRecurDate(iso, freq){ return freq==='weekly' ? addDaysISO(iso, -7) : addMonthsISO(iso, -1); }
const FREQ_LABEL = { monthly:'щомісяця', weekly:'щотижня' };
function ymd(y,m,d){ return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function presetRange(name){
  const now = new Date(), y = now.getFullYear(), m = now.getMonth();
  if (name==='month') return { from: ymd(y,m+1,1), to: todayISO() };
  if (name==='lastmonth'){ const pm = new Date(y,m-1,1); const ly=pm.getFullYear(), lmo=pm.getMonth(); return { from: ymd(ly,lmo+1,1), to: ymd(ly,lmo+1,new Date(ly,lmo+1,0).getDate()) }; }
  if (name==='year') return { from: ymd(y,1,1), to: todayISO() };
  if (name==='all') return { from:'', to: todayISO() };
  return { from: monthStartISO(), to: todayISO() };
}
function prevRange(from, to){
  if (!from || !to) return null;
  const f = Date.parse(from), t = Date.parse(to); const len = t - f;
  return { from: isoOf(new Date(f-len-86400000)), to: isoOf(new Date(f-86400000)) };
}
function pctDelta(cur, prev){ if (!prev) return null; return Math.round((cur-prev)/Math.abs(prev)*100); }
// Чисті активи (UAH-екв за поточним курсом) станом на дату.
function netWorthAt(dateISO){
  let total = 0;
  state.accounts.forEach(a => {
    let bal = a.initial_balance || 0;
    state.transactions.forEach(t => { if (t.date > dateISO) return;
      if (t.kind==='INCOME' && t.account_id===a.id) bal += t.amount;
      else if (t.kind==='EXPENSE' && t.account_id===a.id) bal -= t.amount;
      else if (t.kind==='TRANSFER'){ if(t.account_id===a.id) bal -= (t.amount+(t.fee_amount||0)); if(t.to_account_id===a.id) bal += (t.to_amount||0); } });
    const u = toUAH(bal, a.currency_code); total += (u==null ? bal : u);
  });
  return round2(total);
}
function lastMonthEnds(n){ const arr=[]; const now=new Date(); for(let i=n-1;i>=0;i--){ const d=new Date(now.getFullYear(), now.getMonth()-i+1, 0); arr.push({ iso: isoOf(d), label: ymd(d.getFullYear(), d.getMonth()+1, 1).slice(2,7) }); } return arr; }
function netWorthSVG(points){
  const H=130, W=100; const vals=points.map(p=>p.value);
  const min=Math.min(0,...vals), max=Math.max(1,...vals); const range=(max-min)||1;
  const x=i=> points.length<=1?W/2 : (i/(points.length-1))*W;
  const y=v=> H-6 - ((v-min)/range)*(H-12);
  const line = points.map((p,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(p.value).toFixed(1)}`).join(' ');
  const area = `M0 ${H-6} ` + points.map((p,i)=>`L${x(i).toFixed(1)} ${y(p.value).toFixed(1)}`).join(' ') + ` L${W} ${H-6} Z`;
  return el(`<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="overflow:visible;display:block">
    <path d="${area}" fill="var(--accent)" opacity="0.13"/>
    <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="1.1" vector-effect="non-scaling-stroke"/></svg>`);
}
// Рядок підписів під графіком (звичайний HTML — без спотворення).
function chartLabels(labels){
  const n = labels.length, step = Math.max(1, Math.ceil(n/6));
  const shown = labels.map((l,i)=> (i%step===0 || i===n-1) ? l : '');
  return el(`<div style="display:flex;justify-content:space-between;margin-top:4px">${shown.map(l=>`<span class="muted" style="font-size:11px;white-space:nowrap">${esc(l)}</span>`).join('')}</div>`);
}

  const deltaTag = (d, goodIfNeg) => d==null ? '' : `<div class="k" style="font-size:11px;color:${(goodIfNeg? d<=0 : d>=0)?'var(--green)':'var(--red)'}">${d>0?'+':''}${d}% vs попередній</div>`;

    <div class="card sumcard"><div class="k">Надходження</div><div class="v tabnum" style="color:var(--green)">${money(inc)}</div>${deltaTag(dInc,false)}</div>
    <div class="card sumcard"><div class="k">Витрати</div><div class="v tabnum" style="color:var(--red)">${money(exp)}</div>${deltaTag(dExp,true)}</div>
    <div class="card sumcard"><div class="k">Комісії</div><div class="v tabnum" style="color:var(--amber)">${money(fees)}</div></div>
    <div class="card sumcard"><div class="k">Чистий потік</div><div class="v tabnum" style="color:${net>=0?'var(--green)':'var(--red)'}">${money(net)}</div></div>
  </div>`);
  app.appendChild(sum);

  // бюджети (кожна категорія у своєму циклі — місяць/рік)
  const bcard = budgetsCard();
  if (bcard) { bcard.style.marginTop = '14px'; app.appendChild(bcard); }

  // графік чистих активів (останні 12 місяців)
  const nwPoints = lastMonthEnds(12).map(m => ({ label: m.label, value: netWorthAt(m.iso) }));
  const nw = el(`<div class="card" style="padding:14px;margin-top:14px">
    <div class="row" style="justify-content:space-between;align-items:baseline"><h2>Чисті активи (₴-екв)</h2>
      <b class="tabnum">${money(nwPoints[nwPoints.length-1].value)}</b></div>
    <div class="muted small" style="margin-top:2px">приблизно, за поточним курсом валют</div></div>`);
  nw.appendChild(netWorthSVG(nwPoints));
  nw.appendChild(chartLabels(nwPoints.map(p=>p.label)));
  app.appendChild(nw);

  // за категоріями
  function catData(kind) {
    const map = {};
    state.transactions.forEach(t => { if(t.kind!==kind || !inR(t)) return;
      const c = t.category_id ? categoryById(t.category_id) : null;
      const key = c ? c.id : 0;
      if (!map[key]) map[key] = { name: c?c.name:'Без категорії', color: c?c.color:'#94a3b8', icon: c?c.icon:'', total:0 };
      map[key].total += txUAH(t); });
    return Object.values(map).sort((a,b)=>b.total-a.total);
  }
  const grid = el(`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-top:14px"></div>`);
  [['Витрати за статтями', catData('EXPENSE')], ['Надходження за статтями', catData('INCOME')]].forEach(([title,data]) => {
    const total = data.reduce((s,d)=>s+d.total,0);
    const cardEl = el(`<div class="card" style="padding:14px"><h2 style="margin-bottom:10px">${title}</h2></div>`);
    if (data.length === 0) { cardEl.appendChild(el(`<div class="empty">Немає даних</div>`)); }
    else {
      const wrap = el(`<div class="row" style="align-items:center;flex-wrap:wrap"></div>`);
      const pieBox = el(`<div style="flex:0 0 auto"></div>`); pieBox.appendChild(pieSVG(data));
      const leg = el(`<ul class="legend" style="flex:1;min-width:150px"></ul>`);
      data.forEach(d => leg.appendChild(el(`<li><span class="ld" style="background:${d.color}"></span>
        <span class="ln">${d.icon?d.icon+' ':''}${esc(d.name)}</span>
        <b class="tabnum">${money(d.total)}</b>
        <span class="muted" style="width:38px;text-align:right">${total?Math.round(d.total/total*100):0}%</span></li>`)));
      wrap.appendChild(pieBox); wrap.appendChild(leg); cardEl.appendChild(wrap);
    }
    grid.appendChild(cardEl);
  });
  app.appendChild(grid);

  // витрати по рахунках і по банках
  function spendBy(keyFn) {
    const map = {};
    state.transactions.forEach(t => { if (t.kind!=='EXPENSE' || !inR(t)) return; const k = keyFn(t); if (k==null) return; map[k]=(map[k]||0)+txUAH(t); });
    return map;
  }
  const byAcc = spendBy(t => t.account_id);
  const accRows = Object.entries(byAcc).map(([id,v]) => ({ a: state.accounts.find(x=>x.id==id), total:v })).filter(x=>x.a).sort((a,b)=>b.total-a.total);
  const byBank = {};
  accRows.forEach(r => { const bid = r.a.bank_id || 0; byBank[bid] = (byBank[bid]||0) + r.total; });
  const bankRows = Object.entries(byBank).map(([bid,v]) => ({ name: bid=='0' ? 'Без банку' : (bankById(parseInt(bid))?.name || '—'), color: '#64748b', total:v })).sort((a,b)=>b.total-a.total);

  const breakdown = el(`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-top:14px"></div>`);
  const mkList = (title, rows, colorOf) => {
    const total = rows.reduce((s,r)=>s+r.total,0);
    const card = el(`<div class="card" style="padding:14px"><h2 style="margin-bottom:10px">${title}</h2></div>`);
    if (!rows.length) { card.appendChild(el(`<div class="empty">Немає даних</div>`)); return card; }
    const ul = el(`<div></div>`);
    rows.forEach(r => { const c = colorOf(r); const pct = total?Math.round(r.total/total*100):0;
      ul.appendChild(el(`<div style="margin:8px 0">
        <div style="display:flex;justify-content:space-between;font-size:14px"><span class="ln">${esc(r.name||(r.a&&r.a.name)||'')}</span><b class="tabnum">${money(r.total)}</b></div>
        <div class="pbar" style="margin-top:4px"><i style="width:${pct}%;background:${c}"></i></div></div>`)); });
    card.appendChild(ul); return card;
  };
  breakdown.appendChild(mkList('Витрати по рахунках', accRows, r => r.a.color || 'var(--accent)'));
  breakdown.appendChild(mkList('Витрати по банках', bankRows, () => 'var(--accent)'));
  app.appendChild(breakdown);

  // помісячна динаміка
  const mMap = {};
  state.transactions.forEach(t => { if(!inR(t))return; const m = t.date.slice(0,7);
    if(!mMap[m]) mMap[m] = { month:m, income:0, expense:0, fees:0 };
    if(t.kind==='INCOME')mMap[m].income+=txUAH(t); else if(t.kind==='EXPENSE')mMap[m].expense+=txUAH(t); else if(t.kind==='TRANSFER')mMap[m].fees+=feeUAH(t); });
  const months = Object.values(mMap).sort((a,b)=>a.month<b.month?-1:1);
  const dyn = el(`<div class="card" style="padding:14px;margin-top:14px"><h2 style="margin-bottom:10px">Динаміка по місяцях</h2></div>`);
  if (months.length === 0) dyn.appendChild(el(`<div class="empty">Немає даних за період</div>`));
  else {
    dyn.appendChild(barsSVG(months));
    dyn.appendChild(chartLabels(months.map(m=>m.month.slice(2))));
    dyn.appendChild(el(`<div class="row small muted" style="gap:16px;margin-top:8px">
      <span><span style="color:#16a34a">■</span> Надходження</span>
      <span><span style="color:#ef4444">■</span> Витрати</span>
      <span><span style="color:#f59e0b">■</span> Комісії</span></div>`));
  }
  app.appendChild(dyn);
};

//==================== Вигляд: Рахунки ====================
let accBankFilter = '';   // '' = усі (групувати по банках); 'none' = без банку; інакше id банку
views.accounts = (app) => {
  const head = el(`<div class="row" style="justify-content:space-between;align-items:center"><h1 style="margin:0">Рахунки</h1></div>`);
  const add = el(`<button class="btn primary">+ Додати рахунок</button>`);
  add.onclick = () => openAccountForm();
  head.appendChild(add); app.appendChild(head);

  // сповіщення про банки без жодного рахунку
  const emptyBanks = state.banks.filter(b => !state.accounts.some(a => a.bank_id === b.id));
  if (emptyBanks.length) {
    app.appendChild(el(`<div class="notice" style="margin-top:10px">⚠️ ${emptyBanks.length === 1 ? 'Банк' : 'Банки'} без жодного привʼязаного рахунку: <b>${emptyBanks.map(b=>esc(b.name)).join(', ')}</b>. Додайте рахунок і вкажіть для нього банк (поле «Банк» у формі рахунку).</div>`));
  }

  // фільтр по банку
  if (state.banks.length > 0) {
    const f = el(`<div style="max-width:280px;margin-top:10px"><label class="lab">Банк</label><select id="acc-bf">
      <option value="">Усі (по банках)</option>
      ${state.banks.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('')}
      <option value="none">Без банку</option>
    </select></div>`);
    $('#acc-bf', f).value = accBankFilter;
    $('#acc-bf', f).onchange = (e) => { accBankFilter = e.target.value; render(); };
    app.appendChild(f);
  }
  app.appendChild(el(`<div class="muted small" style="margin-top:8px">Перетягуйте картки, щоб змінити порядок (застосується і на «Огляді»).</div>`));

  function accCard(a) {
    const bnk = a.bank_id ? bankById(a.bank_id) : null;
    const c = el(`<div class="card" style="padding:14px;border-left:4px solid ${a.color};display:flex;align-items:flex-start;gap:8px${a.archived?';opacity:.6':''}">
      <span class="grip" title="Перетягніть, щоб змінити порядок" style="margin-top:2px">⠿</span>
      <div style="min-width:0;flex:1"><div style="font-weight:600">${a.icon?a.icon+' ':''}${esc(a.name)}${a.archived?' <span class="muted small">(архів)</span>':''}</div>
      <div class="muted small">${TYPE_LABEL[a.type]} · ${curSym(a.currency_code)}${bnk?' · '+esc(bnk.name):''} · старт: ${money(a.initial_balance,a.currency_code)}</div>
      <div class="tabnum" style="font-size:18px;font-weight:800;margin-top:4px">${money(accountBalance(a.id),a.currency_code)}</div></div>
      <div style="display:flex;flex-direction:column;gap:4px"></div></div>`);
    const actions = c.lastElementChild;
    const ed = el(`<button class="btn ghost sm">Змінити</button>`); ed.onclick=()=>openAccountForm(a);
    const arch = el(`<button class="btn ghost sm">${a.archived?'Розархівувати':'Архівувати'}</button>`);
    arch.onclick = () => { a.archived = a.archived ? 0 : 1; save(); render(); };
    const del = el(`<button class="btn danger sm">Видалити</button>`);
    del.onclick = () => {
      const txN = state.transactions.filter(t => t.account_id===a.id || t.to_account_id===a.id).length;
      const recN = state.recurring.filter(r => r.account_id===a.id).length;
      const goalN = state.goals.filter(g => (g.account_ids||[]).includes(a.id)).length;
      const primary = state.banks.find(b => b.primary_account_id===a.id);
      const parts = [];
      if (txN) parts.push(`${txN} операцій`);
      if (recN) parts.push(`${recN} регулярних платежів`);
      if (goalN) parts.push(`${goalN} цілей (рахунок підвʼязаний)`);
      if (primary) parts.push(`основний рахунок банку «${primary.name}»`);
      if (!blockDeleteIfUsed(`Рахунок «${a.name}»`, parts, 'Зазвичай тут краще «Архівувати» — рахунок зникне зі списків, а операції збережуться. Щоб саме видалити, спершу приберіть привʼязки.')) return;
      deleteWithUndo(`Рахунок «${a.name}» видалено`, () => {
        // повертаємо суми кредитів за платежами, що видаляються разом з рахунком
        state.transactions.forEach(t => {
          if ((t.account_id===a.id || t.to_account_id===a.id) && t.loan_id) {
            const loan = state.loans.find(l=>l.id===t.loan_id);
            if (loan) loan.paid = round2(Math.max(0, (loan.paid||0) - (t.amount||0)));
          }
        });
        state.accounts = state.accounts.filter(x=>x.id!==a.id);
        state.transactions = state.transactions.filter(t=>t.account_id!==a.id && t.to_account_id!==a.id);
        state.recurring = state.recurring.filter(r=>r.account_id!==a.id);            // регулярні без рахунку — видаляємо
        state.goals.forEach(g => { if (g.account_ids) g.account_ids = g.account_ids.filter(id => id !== a.id); }); // відвʼязуємо від цілей
        state.banks.forEach(b=>{ if(b.primary_account_id===a.id) b.primary_account_id=null; }); // скидаємо «основний рахунок»
      });
    };
    actions.appendChild(ed); actions.appendChild(arch); actions.appendChild(del);
    makeReorderable(c, 'acc', a.id, reorderAccount);
    return c;
  }
  const gridOf = (list) => { const g = el(`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr));margin-top:8px"></div>`); list.forEach(a=>g.appendChild(accCard(a))); return g; };

  if (state.accounts.length === 0) { app.appendChild(el(`<div class="muted" style="margin-top:8px">Ще немає рахунків.</div>`)); return; }

  const active = a => !a.archived;
  if (accBankFilter === '') {
    const hasBanks = state.banks.length > 0;
    // групування по банках + сумарний баланс групи за валютами
    state.banks.forEach(b => {
      const list = state.accounts.filter(a => active(a) && a.bank_id === b.id);
      if (list.length === 0) return;
      const total = {}; list.forEach(a => total[a.currency_code]=(total[a.currency_code]||0)+accountBalance(a.id));
      const totStr = Object.entries(total).map(([c,v])=>money(v,c)).join(' · ');
      app.appendChild(el(`<div class="row" style="justify-content:space-between;align-items:baseline;margin-top:16px"><h2 style="min-width:0">${esc(b.name)}</h2><span class="muted small tabnum">${totStr}</span></div>`));
      app.appendChild(gridOf(list));
    });
    const none = state.accounts.filter(a => active(a) && !a.bank_id);
    if (none.length) {
      if (hasBanks) app.appendChild(el(`<div class="row" style="margin-top:16px"><h2 class="muted">Без банку</h2></div>`));
      app.appendChild(gridOf(none));
    }
  } else {
    const list = (accBankFilter === 'none'
      ? state.accounts.filter(a => !a.bank_id)
      : state.accounts.filter(a => a.bank_id === parseInt(accBankFilter))).filter(active);
    if (list.length === 0) app.appendChild(el(`<div class="muted" style="margin-top:8px">Немає рахунків у цій групі.</div>`));
    else app.appendChild(gridOf(list));
  }

  // архівні рахунки
  const archived = state.accounts.filter(a => a.archived);
  if (archived.length) {
    const t = el(`<div style="margin-top:18px"><button class="btn ghost sm" id="show-arch">${showArchived?'▾':'▸'} Архівні рахунки (${archived.length})</button></div>`);
    $('#show-arch', t).onclick = () => { showArchived = !showArchived; render(); };
    app.appendChild(t);
    if (showArchived) app.appendChild(gridOf(archived));
  }
};
let showArchived = false;

  let color = e.color;
  const body = el(`<div>
    <div><label class="lab">Назва</label><input id="a-name" value="${esc(e.name||'')}" placeholder="напр. Monobank"></div>
    <div class="row">
      <div style="flex:1"><label class="lab">Тип</label><select id="a-type">
        <option value="CASH">Готівка</option><option value="CARD">Картка</option><option value="BANK">Банк. рахунок</option></select></div>
      <div style="flex:1"><label class="lab">Валюта</label><select id="a-cur">${CURRENCIES.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
    </div>
    <div><label class="lab">Іконка</label>

      <div id="a-emoji" style="margin-top:6px"></div></div>
    <div><label class="lab">Банк (необовʼязково)</label><select id="a-bank"><option value="">— без банку —</option>${state.banks.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('')}</select></div>
    <div><label class="lab">Стартовий залишок</label><input id="a-init" inputmode="decimal" value="${e.initial_balance ?? 0}"></div>
    <div><label class="lab">Колір</label><div id="a-color"></div></div>
    <div class="err hidden" id="a-err"></div>
  </div>`);
  $('#a-type', body).value = e.type; $('#a-cur', body).value = e.currency_code;
  $('#a-bank', body).value = e.bank_id ? String(e.bank_id) : '';
  $('#a-emoji', body).appendChild(emojiPicker($('#a-icon', body)));
  $('#a-color', body).appendChild(swatchPicker(color, c => color = c));
  openModal(existing?'Редагувати рахунок':'Новий рахунок', body, {
    onSave: (close) => {
      const name = $('#a-name', body).value.trim();
      const err = $('#a-err', body);
      if (!name) { err.textContent='Введіть назву'; err.classList.remove('hidden'); return; }
      const rec = { name, type:$('#a-type',body).value, currency_code:$('#a-cur',body).value,
        bank_id: $('#a-bank',body).value ? parseInt($('#a-bank',body).value) : null,
        icon: $('#a-icon',body).value.trim() || null,
        initial_balance: round2(num($('#a-init',body).value)), color };
      if (existing) Object.assign(existing, rec);
      else { rec.id = nextId('acc'); state.accounts.push(rec); }
      save(); close(); render();
    }
  });
}

// Видалення категорії: якщо по ній є операції — питаємо, куди їх перенести (інша категорія або «Без категорії»).
function deleteCategory(c){
  const used = state.transactions.filter(t => t.category_id === c.id).length;
  const usedRec = state.recurring.filter(r => r.category_id === c.id).length;
  if (used === 0 && usedRec === 0) {
    deleteWithUndo(`Категорію «${c.name}» видалено`, () => { state.categories = state.categories.filter(x => x.id !== c.id); });
    return;
  }
  const others = state.categories.filter(x => x.id !== c.id && x.kind === c.kind);
  const body = el(`<div>
    <p class="muted small">Категорію «${esc(c.name)}» використовують <b>${used}</b> операцій${usedRec?` і ${usedRec} регулярних`:''}.<br>Оберіть, куди перенести їх перед видаленням.</p>
    <div><label class="lab">Перенести в категорію</label>
      <select id="dc-cat"><option value="">— Без категорії —</option>${others.map(x=>`<option value="${x.id}">${x.icon?x.icon+' ':''}${esc(x.name)}</option>`).join('')}</select></div>
  </div>`);
  openModal(`Видалити «${c.name}»`, body, { saveLabel: 'Перенести й видалити', onSave: (close) => {
    const target = $('#dc-cat', body).value ? parseInt($('#dc-cat', body).value) : null;
    deleteWithUndo(`Категорію «${c.name}» видалено (${used} операцій перенесено)`, () => {
      state.transactions.forEach(t => { if (t.category_id === c.id) t.category_id = target; });
      state.recurring.forEach(r => { if (r.category_id === c.id) r.category_id = target; });
      state.categories = state.categories.filter(x => x.id !== c.id);
    });
    close();
  }});
}

let catKind = 'EXPENSE';
views.categories = (app) => {

    <button data-k="EXPENSE">Витрати</button><button data-k="INCOME">Надходження</button></div>`);
  pill.querySelectorAll('button').forEach(b => { b.classList.toggle('on', b.dataset.k===catKind);
    b.onclick=()=>{ catKind=b.dataset.k; render(); }; });
  app.appendChild(pill);

  app.appendChild(el(`<div class="muted small" style="margin-top:10px">Перетягуйте за ручку ⠿ або кнопками ↑ / ↓, щоб змінити порядок — він застосується і у списках вибору категорії.</div>`));
  const grid = el(`<div class="grid" style="grid-template-columns:1fr;max-width:520px;margin-top:8px"></div>`);

  if (list.length === 0) grid.appendChild(el(`<div class="muted">Категорій немає.</div>`));
  const mFrom = monthStartISO(), mTo = todayISO();
  list.forEach((c, i) => {
    const hasB = c.kind === 'EXPENSE' && (c.budget || 0) > 0;
    const r = hasB ? budgetRange(c) : null;
    const eb = hasB ? effectiveBudget(c) : 0;
    const roll = hasB ? budgetRollover(c) : 0;
    const spent = hasB ? categorySpent(c.id, r.from, r.to) : 0;
    const pct = hasB ? Math.min(100, Math.round(spent / eb * 100)) : 0;
    const over = hasB && spent > eb;
    const barColor = over ? 'var(--red)' : (spent >= eb * 0.8 ? 'var(--amber)' : 'var(--green)');
    const node = el(`<div class="card" style="padding:9px 11px;display:flex;align-items:center;gap:8px">
      <span class="grip" title="Перетягніть, щоб змінити порядок">⠿</span>
      <span class="txicon" style="background:${c.color}22;color:${c.color}">${c.icon||'•'}</span>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600">${esc(c.name)}${hasB?` <span class="muted small">/ ${r.label}${roll>0?' ↻':''}</span>`:''}</div>
        ${hasB?`<div style="display:flex;align-items:center;gap:8px;margin-top:5px">

        </div>`:''}
      </div></div>`);
    makeReorderable(node, 'cat', c.id, reorderCategory);
    const up = el(`<button class="btn ghost sm" title="Перемістити вище">↑</button>`);
    const down = el(`<button class="btn ghost sm" title="Перемістити нижче">↓</button>`);
    if (i === 0) { up.disabled = true; up.style.opacity = .3; }
    if (i === list.length - 1) { down.disabled = true; down.style.opacity = .3; }
    up.onclick = () => moveCategory(c, -1);
    down.onclick = () => moveCategory(c, 1);
    const ops = el(`<button class="btn ghost sm" title="Операції цієї категорії">🧾</button>`); ops.onclick=()=>showTxFor({ category: c.id });
    const ed = el(`<button class="btn ghost sm">✎</button>`); ed.onclick=()=>openCategoryForm(c);
    const del = el(`<button class="btn danger sm">✕</button>`);
    del.onclick = () => deleteCategory(c);
    node.appendChild(up); node.appendChild(down); node.appendChild(ops); node.appendChild(ed); node.appendChild(del);
    grid.appendChild(node);
  });
  app.appendChild(grid);
};

// Переміщення категорії в межах свого типу (міняємо місцями із сусідньою у спільному масиві).
function moveCategory(cat, dir) {
  const same = state.categories.filter(c => c.kind === cat.kind);
  const idx = same.indexOf(cat);
  const target = same[idx + dir];
  if (!target) return;
  const i1 = state.categories.indexOf(cat), i2 = state.categories.indexOf(target);
  [state.categories[i1], state.categories[i2]] = [state.categories[i2], state.categories[i1]];
  save(); render();
}

//==================== Цілі накопичення ====================
function goalMonthsLeft(g){ if (!g.deadline) return null; const now=new Date(); const d=new Date(g.deadline); return Math.max(0, (d.getFullYear()-now.getFullYear())*12 + (d.getMonth()-now.getMonth())); }
function goalNeedPerMonth(g){ const ml=goalMonthsLeft(g); if (ml==null) return null; const rem=Math.max(0,(g.target||0)-goalSaved(g)); return ml>0 ? round2(rem/ml) : rem; }
// Конвертація суми між валютами через гривню (за поточним курсом). null, якщо курсу немає.
function convertCur(amount, from, to){ if (from === to) return amount; const u = toUAH(amount, from); if (u == null) return null; const r = rateFor(to); if (r == null) return null; return u / r; }
// Ціль із підвʼязаними реальними рахунками (накопичено = їхній сумарний баланс).
function goalLinked(g){ return !!(g.account_ids && g.account_ids.length); }
function goalAccounts(g){ return (g.account_ids||[]).map(id => state.accounts.find(a => a.id === id)).filter(Boolean); }
// Накопичено: для звʼязаної цілі — сумарний баланс рахунків у валюті цілі; інакше ручне g.saved.
function goalSaved(g){
  if (!goalLinked(g)) return round2(g.saved || 0);
  let sum = 0;
  goalAccounts(g).forEach(a => { const v = convertCur(accountBalance(a.id), a.currency_code, g.currency); if (v != null) sum += v; });
  return round2(sum);
}

function openGoalContribute(g, sign){
  const body = el(`<div><label class="lab">Сума (${curSym(g.currency)})</label><input id="g-amt" inputmode="decimal" placeholder="0.00" style="font-size:22px;font-weight:700"></div>`);

    const a = round2(num($('#g-amt', body).value)); if (a <= 0) return;
    g.saved = round2(Math.max(0, (g.saved||0) + sign*a));
    save(); close(); render();
  }});
}
// Поповнити звʼязану ціль: переказ з обраного рахунка-джерела на підвʼязаний рахунок цілі.
// Куди — підвʼязані рахунки цілі; Звідки — усі інші рахунки з балансом > 0.
function goalTopUp(g){
  const toList = goalAccounts(g).filter(a => !a.archived);
  if (!toList.length) return;
  const fromList = state.accounts.filter(a => !a.archived && accountBalance(a.id) > 0 && !(g.account_ids||[]).includes(a.id));
  if (!fromList.length) { alert('Немає рахунків з додатним балансом для поповнення.'); return; }
  openTransferDialog(fromList[0].id, toList[0].id, { fromList, toList, title: 'Поповнити «' + (g.name||'Ціль') + '»', saveLabel: 'Поповнити' });
}

// Зводить записи бірж активу до унікальних {name, amount} (однойменні підсумовуються; конвертує старий рядковий формат).
function mergeExchanges(exs){
  const m = new Map();
  (exs || []).forEach(x => { const nm = (typeof x === 'string' ? x : x.name || '').trim(); if (!nm) return; const amt = typeof x === 'object' ? (x.amount || 0) : 0; m.set(nm, (m.get(nm) || 0) + amt); });
  return [...m].map(([name, amount]) => ({ name, amount }));
}
function exchangeUsageCount(name){ return (state.crypto || []).filter(h => (h.exchanges || []).some(x => (typeof x === 'string' ? x : x.name) === name)).length; }
function renameExchange(oldName, after){
  const input = prompt('Нова назва біржі / гаманця:', oldName);
  if (input == null) return;
  const name = input.trim();
  if (!name || name === oldName) return;
  (state.crypto || []).forEach(h => {
    if (!h.exchanges || !h.exchanges.length) return;
    const mapped = h.exchanges.map(x => { const nm = typeof x === 'string' ? x : x.name; const amt = typeof x === 'object' ? (x.amount || 0) : 0; return { name: nm === oldName ? name : nm, amount: amt }; });
    h.exchanges = mergeExchanges(mapped);
  });
  save(); showToast(`Біржу перейменовано на «${name}»`, null, null, 2500); if (after) after(); render();
}
function deleteExchange(name, after){
  const cnt = exchangeUsageCount(name);
  if (!confirm(`Видалити біржу «${name}» з ${cnt} актив(ів)?\nКількість монет в активах збережеться — зникне лише прив'язка до цієї біржі.`)) return;
  (state.crypto || []).forEach(h => {
    if (!h.exchanges) return;
    h.exchanges = mergeExchanges(h.exchanges.filter(x => (typeof x === 'string' ? x : x.name) !== name));
  });
  save(); showToast(`Біржу «${name}» видалено`, null, null, 2500); if (after) after(); render();
}

// Сумарна вартість (USD) по біржах / гаманцях, відсортовано за спаданням.
function cryptoExchangeTotals(){
  const t = {};
  (state.crypto || []).forEach(h => {
    const unit = cryptoUnitUsd(h);
    const exs = (h.exchanges || []).filter(x => typeof x === 'object' && x.amount > 0);
    if (exs.length) exs.forEach(x => { const nm = (x.name || '').trim() || 'Без назви'; t[nm] = (t[nm] || 0) + (unit != null ? x.amount * unit : 0); });
    else t['Без біржі'] = (t['Без біржі'] || 0) + cryptoValueUsd(h);
  });
  return Object.keys(t).map(nm => ({ name: nm, total: round2(t[nm]) })).sort((a, b) => b.total - a.total);
}

// Перегляд портфеля, згрупований за біржами / гаманцями.
function renderCryptoByExchange(app, totalUsd){
  const byEx = {};
  (state.crypto || []).forEach(h => {
    const unit = cryptoUnitUsd(h);
    const exs = (h.exchanges || []).filter(x => typeof x === 'object' && x.amount > 0);
    if (exs.length) {
      exs.forEach(x => { const nm = (x.name || '').trim() || 'Без назви'; (byEx[nm] = byEx[nm] || []).push({ h, amount: x.amount, val: unit != null ? round2(x.amount * unit) : 0, unit }); });
    } else {
      (byEx['Без біржі'] = byEx['Без біржі'] || []).push({ h, amount: h.amount, val: cryptoValueUsd(h), unit });
    }
  });
  const groups = Object.keys(byEx)
    .map(nm => ({ nm, items: byEx[nm].sort((a, b) => b.val - a.val), total: round2(byEx[nm].reduce((s, i) => s + i.val, 0)) }))
    .sort((a, b) => b.total - a.total);
  if (!groups.length) { app.appendChild(el(`<div class="muted" style="margin-top:12px">Активів немає.</div>`)); return; }
  groups.forEach(g => {
    const pct = totalUsd > 0 ? Math.round(g.total / totalUsd * 100) : 0;
    const card = el(`<section class="card" style="padding:10px 14px;margin-top:12px">
      <div class="row" style="justify-content:space-between;align-items:baseline;gap:10px">
        <h2 style="margin:0;font-size:16px">${esc(g.nm)}</h2>
        <div style="text-align:right;flex:0 0 auto"><b class="tabnum">${money(g.total,'USD')}</b> <span class="muted small">${pct}%</span></div>
      </div></section>`);
    g.items.forEach(it => {
      const img = cryptoImg(it.h);
      const icon = img
        ? `<img src="${esc(img)}" alt="" style="width:22px;height:22px;border-radius:50%;flex:0 0 auto" loading="lazy">`
        : `<span class="crsym">${esc((it.h.symbol||'?').slice(0,3))}</span>`;
      const r = el(`<div class="txrow" style="gap:10px${it.h.color?`;border-left:3px solid ${it.h.color};padding-left:9px;border-radius:8px;background:${it.h.color}14`:''}">
        ${icon}
        <div style="flex:1;min-width:0"><div style="font-weight:600">${esc(it.h.symbol)}</div>
          <div class="muted small tabnum">${fmtAmt(it.amount)}${it.unit!=null?' × '+money(it.unit,'USD'):''}</div>${it.h.note?`<div class="muted small" style="margin-top:2px;white-space:pre-wrap">${esc(it.h.note)}</div>`:''}</div>

      </div>`);
      card.appendChild(r);
    });
    app.appendChild(card);
  });
}

//==================== Регулярні платежі ====================
function dueRecurring(){ const t = todayISO(); return state.recurring.filter(r => r.active !== false && r.next_date && r.next_date <= t); }
function recordRecurring(r){
  // операцію датуємо днем запису (а прострочену — її запланованою датою), щоб вона була видима «зараз»
  const txDate = (r.next_date && r.next_date <= todayISO()) ? r.next_date : todayISO();
  state.transactions.push({ id: nextId('tx'), ord: nextOrd(), kind: r.kind, date: txDate,
    note: r.note || r.name || null, account_id: r.account_id, category_id: r.category_id || null,
    amount: round2(r.amount), recurring_id: r.id });
  r.next_date = nextRecurDate(r.next_date || txDate, r.freq);
  save(); render();
  showToast('Операцію створено', null, null, 2500);
}

function recalcSeq(data){
  const mx = (arr)=>arr.reduce((m,x)=>Math.max(m,x.id||0),0);
  return { acc: mx(data.accounts||[])+1, cat: mx(data.categories||[])+1, tx: mx(data.transactions||[])+1,
           bank: mx(data.banks||[])+1, loan: mx(data.loans||[])+1, rec: mx(data.recurring||[])+1, goal: mx(data.goals||[])+1 };
}
// Привести будь-який бекап (старий v1 чи новий v2) до поточної схеми.
function migrateBackup(raw){
  let d = (raw && raw.data && Array.isArray(raw.data.accounts)) ? raw.data : raw;
  d = JSON.parse(JSON.stringify(d || {}));
  d.accounts = d.accounts || []; d.categories = d.categories || []; d.transactions = d.transactions || [];
  d.banks = d.banks || []; d.loans = d.loans || []; d.recurring = d.recurring || []; d.goals = d.goals || [];
  const rs = recalcSeq(d);
  d.seq = d.seq || {};
  ['acc','cat','tx','bank','loan','rec','goal'].forEach(k => { if (d.seq[k] == null) d.seq[k] = rs[k]; });
  d.version = SCHEMA_VERSION;
  return d;
}

        state.banks = state.banks.filter(x=>x.id!==bank.id);
        state.loans = state.loans.filter(l=>l.bank_id!==bank.id);
        state.accounts.forEach(a => { if (a.bank_id === bank.id) a.bank_id = null; });
      });
    };
    acts.appendChild(addLoan); acts.appendChild(edB); acts.appendChild(delB);

    const box = $('.loansbox', card);
    const loans = state.loans.filter(l => l.bank_id === bank.id);
    if (loans.length === 0) box.appendChild(el(`<div class="muted small">Кредитів немає.</div>`));
    loans.forEach(l => box.appendChild(loanRow(l, bank)));
    makeReorderable(card, 'bank', bank.id, reorderBank);
    app.appendChild(card);
  });
};

function loanRow(l, bank) {
  const monthly = loanMonthly(l), out = loanOutstanding(l);
  const paidPct = l.principal > 0 ? Math.min(100, Math.round((l.paid||0) / l.principal * 100)) : 0;
  const closed = !loanActive(l);
  const interest = l.has_interest ? `${l.rate||0}% річних` : 'без відсотків';
  const node = el(`<div class="card" style="padding:12px;margin-top:8px;${closed?'opacity:.6':''}">
    <div class="row" style="justify-content:space-between;align-items:flex-start;gap:8px">
      <div style="min-width:0">
        <div style="font-weight:600">${esc(l.name||'Кредит')}${closed?' <span class="muted small">(закрито)</span>':''}</div>
        <div class="muted small">${money(l.principal,bank.currency)} · ${l.months} міс · ${interest}${l.due_date?' · списання '+fmtDate(l.due_date):''}</div>
      </div>
      <div style="text-align:right;flex:0 0 auto">
        <div class="tabnum" style="font-weight:700;color:var(--amber)">${money(monthly,bank.currency)}/міс</div>
        <div class="muted small">залишок ${money(out,bank.currency)}</div>
      </div>
    </div>
    <div class="bar" style="margin-top:8px"><i style="width:${paidPct}%;background:var(--green)"></i></div>
    <div class="row" style="justify-content:space-between;align-items:center;margin-top:6px">
      <span class="muted small">Виплачено ${money(l.paid||0,bank.currency)} з ${money(l.principal,bank.currency)} (${paidPct}%)</span>
      <span class="loanacts" style="display:flex;gap:6px"></span>
    </div>
  </div>`);
  const acts = $('.loanacts', node);
  if (!closed) {
    const pay = el(`<button class="btn sm" title="Внести платіж за місяць">Платіж</button>`);
    pay.onclick = () => openLoanPayment(l, bank);
    acts.appendChild(pay);
    if (l.has_interest && l.rate > 0) { const po = el(`<button class="btn ghost sm" title="Калькулятор дострокового погашення">Достроково</button>`); po.onclick = () => openPayoff(l, bank); acts.appendChild(po); }
  }
  const ed = el(`<button class="btn ghost sm">✎</button>`); ed.onclick = () => openLoanForm(l);
  const del = el(`<button class="btn danger sm">✕</button>`);
  del.onclick = () => {
    const payN = state.transactions.filter(t => t.loan_id===l.id).length;
    const parts = [];
    if (payN) parts.push(`${payN} операцій-платежів`);
    if (!blockDeleteIfUsed(`Кредит «${l.name||'Кредит'}»`, parts, 'Спершу видаліть ці операції-платежі.')) return;
    deleteWithUndo('Кредит видалено', () => { state.loans = state.loans.filter(x=>x.id!==l.id); state.transactions.forEach(t=>{ if(t.loan_id===l.id) t.loan_id=null; }); });
  };
  acts.appendChild(ed); acts.appendChild(del);
  return node;
}

// Внесення платежу: сума за місяць рахується автоматично, користувач підтверджує (або змінює).
// Якщо обрано рахунок — створюється операція «витрата» на суму платежу.
function openLoanPayment(l, bank) {
  const monthly = loanMonthly(l);
  const out = loanOutstanding(l);
  const pay = round2(Math.min(monthly, out));
  // рахунки тієї ж валюти — спершу
  const accs = [...state.accounts].sort((a,b) => (b.currency_code===bank.currency) - (a.currency_code===bank.currency));
  const expCats = state.categories.filter(c => c.kind === 'EXPENSE');
  const defCat = expCats.find(c => /кредит/i.test(c.name));

  const body = el(`<div>
    <div class="preview">
      <div class="pl"><span class="muted">Платіж за місяць (авто)</span><b style="color:var(--amber)">${money(pay,bank.currency)}</b></div>
      <div class="pl"><span class="muted">Поточний залишок</span><b>${money(out,bank.currency)}</b></div>
      <div class="pl"><span class="muted">Залишок після платежу</span><b id="pp-after">—</b></div>
    </div>
    <div><label class="lab">Сума платежу (${curSym(bank.currency)})</label><input id="pp-amt" inputmode="decimal" value="${pay}"></div>
    <div><label class="lab">Списати з рахунку (як «витрату»)</label><select id="pp-acc">
      <option value="">— не створювати операцію —</option>
      ${accs.map(a=>`<option value="${a.id}">${esc(a.name)} (${curSym(a.currency_code)})</option>`).join('')}
    </select></div>
    <div class="row">
      <div style="flex:1"><label class="lab">Категорія</label><select id="pp-cat"><option value="">Без категорії</option>${expCats.map(c=>`<option value="${c.id}">${c.icon?c.icon+' ':''}${esc(c.name)}</option>`).join('')}</select></div>
      <div style="flex:1"><label class="lab">Дата</label><input id="pp-date" type="date" value="${todayISO()}"></div>
    </div>
    <div class="muted small">Якщо обрано рахунок — створиться операція «витрата» на суму платежу.</div>
    <div id="pp-close-note" class="small hidden" style="color:var(--green)">Після цього платежу кредит буде закрито.</div>
    <div id="pp-curwarn" class="small hidden" style="color:var(--amber)"></div>
    <button class="btn ghost sm" id="pp-full" style="margin-top:6px">Закрити кредит повністю</button>
  </div>`);
  const $$ = (s) => $(s, body);
  // за замовчуванням — основний рахунок банку; інакше перший рахунок тієї ж валюти
  const primaryOk = bank.primary_account_id && state.accounts.some(a => a.id === bank.primary_account_id);
  if (primaryOk) $$('#pp-acc').value = String(bank.primary_account_id);
  else if (accs.length && accs[0].currency_code === bank.currency) $$('#pp-acc').value = String(accs[0].id);
  if (defCat) $$('#pp-cat').value = String(defCat.id);

  function upd() {
    let amt = Math.max(0, Math.min(round2(num($$('#pp-amt').value)), out));
    $$('#pp-after').textContent = money(round2(out - amt), bank.currency);
    $$('#pp-close-note').classList.toggle('hidden', round2(out - amt) > 0.005);
    const acc = $$('#pp-acc').value ? state.accounts.find(a=>a.id===parseInt($$('#pp-acc').value)) : null;
    const warn = $$('#pp-curwarn');
    if (acc && acc.currency_code !== bank.currency) {
      warn.textContent = `Увага: валюта рахунку (${curSym(acc.currency_code)}) відрізняється від ${curSym(bank.currency)}; суму спишеться як є.`;
      warn.classList.remove('hidden');
    } else warn.classList.add('hidden');
  }
  body.addEventListener('input', upd); body.addEventListener('change', upd); upd();

  function apply(amount, close) {
    amount = Math.min(round2(amount), loanOutstanding(l));
    if (amount <= 0) return;
    l.paid = round2(Math.min(l.principal, (l.paid || 0) + amount));
    if (l.due_date && loanActive(l)) l.due_date = addMonthsISO(l.due_date, 1);   // наступне списання — за місяць
    const accId = $$('#pp-acc').value ? parseInt($$('#pp-acc').value) : null;
    if (accId) {
      const catId = $$('#pp-cat').value ? parseInt($$('#pp-cat').value) : null;
      state.transactions.push({
        id: nextId('tx'), ord: nextOrd(), kind: 'EXPENSE',
        date: $$('#pp-date').value || todayISO(),
        note: 'Платіж за кредитом «' + (l.name || 'Кредит') + '»',
        account_id: accId, category_id: catId, amount, loan_id: l.id,
      });
    }
    save(); close(); render();
  }

  const close = openModal('Платіж — ' + (l.name || 'Кредит'), body, {
    saveLabel: 'Підтвердити платіж',
    onSave: (close) => apply(round2(num($$('#pp-amt').value)), close),
  });
  $$('#pp-full').onclick = () => {
    if (confirm(`Закрити кредит «${l.name || 'Кредит'}» повністю? Залишок ${money(loanOutstanding(l), bank.currency)} буде погашено${$$('#pp-acc').value ? ' і створено операцію «витрата»' : ''}.`)) {
      apply(loanOutstanding(l), close);
    }
  };
}

//==================== Синхронізація з Google Drive ====================
// Дані застосунку — це state у localStorage. У Drive тримаємо ОДИН JSON у прихованій
// папці застосунку (appDataFolder) — вона невидима у звичайному Drive і доступна лише
// цьому застосунку. Працює тільки з https-хостингу (file:// не дозволяє OAuth Google).
// Офлайн: усі зміни одразу в localStorage; коли є мережа+з'єднання — вивантажуються у Drive.
const DRIVE_FILE_NAME = 'moneyme-data.json';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/userinfo.email';
const GIS_SRC = 'https://accounts.google.com/gsi/client';
// Google OAuth Client ID застосунку. Це НЕ секрет (захищений прив'язкою до Authorized
// JavaScript origins у Google Console), тож вшитий у код — користувачі лише входять через Google.
const GOOGLE_CLIENT_ID = '934338930225-arnhi5r45ptk1japnogvjqguob4q5mnv.apps.googleusercontent.com';

function clientId(){ return (GOOGLE_CLIENT_ID || localStorage.getItem('moneyme.demo.sync.clientId') || '').trim(); }
function syncAvailable(){ return location.protocol.indexOf('http') === 0 && !!clientId(); }
function syncConfigured(){ return !!clientId(); }
function setSyncStatus(s, detail){ Sync.status = s; Sync.detail = detail || ''; if (currentView === 'settings') render(); }

// Черга вивантаження після локальної зміни (викликається із save()).
function cloudOnLocalChange(){
  if (!Sync.on || !syncAvailable()) return;
  Sync.pending = true;
  clearTimeout(Sync.pushTimer);
  Sync.pushTimer = setTimeout(cloudPush, 2500);
}

function loadGIS(){
  if (window.google && google.accounts && google.accounts.oauth2) return Promise.resolve();
  if (Sync.gisLoading) return Sync.gisLoading;
  Sync.gisLoading = new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = GIS_SRC; s.async = true; s.defer = true;
    s.onload = res; s.onerror = () => rej(new Error('Не вдалося завантажити Google Identity (немає мережі?)'));
    document.head.appendChild(s);
  });
  return Sync.gisLoading;
}
const TOKEN_KEY = 'moneyme.demo.sync.token';
// Токен зберігаємо (≈1 год) і перевикористовуємо між перезавантаженнями — щоб не просити
// вхід щоразу (особливо на телефоні, де браузер «вивантажує» сторінку у фоні).
function getCachedToken(){
  if (Sync.token && Sync.token.exp - Date.now() > 60000) return Sync.token.access_token;
  try { const t = JSON.parse(localStorage.getItem(TOKEN_KEY) || 'null'); if (t && t.exp - Date.now() > 60000) { Sync.token = t; return t.access_token; } } catch (e) {}
  return null;
}
function saveToken(resp){
  Sync.token = { access_token: resp.access_token, exp: Date.now() + ((resp.expires_in || 3300) * 1000) };
  try { localStorage.setItem(TOKEN_KEY, JSON.stringify(Sync.token)); } catch (e) {}
}
function ensureTokenClient(){
  if (Sync.tokenClient) return;
  Sync.tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId(), scope: DRIVE_SCOPE,
    callback: (resp) => {
      if (resp && resp.access_token) { saveToken(resp); if (Sync._tokRes) { Sync._tokRes(Sync.token.access_token); Sync._tokRes = Sync._tokRej = null; } }
      else if (Sync._tokRej) { Sync._tokRej(new Error('Доступ не надано')); Sync._tokRes = Sync._tokRej = null; }
    },
    error_callback: (err) => { if (Sync._tokRej) { Sync._tokRej(new Error((err && err.type) || 'Помилка входу')); Sync._tokRes = Sync._tokRej = null; } },
  });
}
// Запит нового токена через вікно Google. prompt:'' — ТИХО для збереженого акаунта (через hint —
// без вибору акаунта); 'consent' — з вибором акаунта (для «Підключити»).
function acquireToken(prompt){
  return loadGIS().then(() => { ensureTokenClient(); return new Promise((res, rej) => {
    Sync._tokRes = res; Sync._tokRej = rej;
    const cfg = { prompt: prompt || '' };
    if (!prompt) { const hint = localStorage.getItem('moneyme.demo.sync.account'); if (hint) cfg.hint = hint; }   // тихе оновлення того ж акаунта
    try { Sync.tokenClient.requestAccessToken(cfg); }
    catch (e) { Sync._tokRes = Sync._tokRej = null; rej(e); }
  }); });
}
// interactive=false → лише наявний токен (НЕ відкриваємо вікно у фоні). true → тихе оновлення (з hint).
function getToken(interactive){
  const c = getCachedToken(); if (c) return Promise.resolve(c);
  if (!interactive) return Promise.reject(new Error('Потрібен вхід'));
  return acquireToken('');
}
// Email підключеного акаунта (для login_hint, щоб тихе оновлення не питало вибір акаунта).
async function fetchAccountEmail(){
  try { const tok = getCachedToken(); if (!tok) return null;
    const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: 'Bearer ' + tok } });
    if (r.ok) { const j = await r.json(); return j.email || null; }
  } catch (e) {}
  return null;
}
async function driveFetch(url, opts){
  const tok = await getToken(false);
  const o = Object.assign({}, opts); o.headers = Object.assign({}, o.headers, { Authorization: 'Bearer ' + tok });
  let r = await fetch(url, o);
  if (r.status === 401) { Sync.token = null; localStorage.removeItem(TOKEN_KEY); const t2 = await getToken(true); o.headers.Authorization = 'Bearer ' + t2; r = await fetch(url, o); }   // протух — тихо оновлюємо
  return r;
}
async function driveFindFile(){
  const q = encodeURIComponent("name='" + DRIVE_FILE_NAME + "'");
  const r = await driveFetch('https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,modifiedTime)&q=' + q);
  if (!r.ok) throw new Error('Drive list ' + r.status);
  const j = await r.json();
  return (j.files && j.files[0]) ? j.files[0].id : null;
}
async function driveDownload(id){
  const r = await driveFetch('https://www.googleapis.com/drive/v3/files/' + id + '?alt=media');
  if (!r.ok) throw new Error('Drive get ' + r.status);
  return r.json();
}
async function driveUpload(id, payload){
  const body = JSON.stringify(payload);
  if (id) {
    const r = await driveFetch('https://www.googleapis.com/upload/drive/v3/files/' + id + '?uploadType=media',
      { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body });
    if (!r.ok) throw new Error('Drive update ' + r.status);
    return id;
  }
  const boundary = 'mm' + Math.random().toString(16).slice(2);
  const meta = { name: DRIVE_FILE_NAME, parents: ['appDataFolder'] };
  const multipart = '--' + boundary + '\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n' + JSON.stringify(meta) +
    '\r\n--' + boundary + '\r\nContent-Type: application/json\r\n\r\n' + body + '\r\n--' + boundary + '--';
  const r = await driveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
    { method: 'POST', headers: { 'Content-Type': 'multipart/related; boundary=' + boundary }, body: multipart });
  if (!r.ok) throw new Error('Drive create ' + r.status);
  return (await r.json()).id;
}
function cloudPayload(){ return { app: 'MoneyMe', version: SCHEMA_VERSION, updatedAt: state.updatedAt || new Date().toISOString(), data: state }; }
function markSynced(at){ Sync.base = at || state.updatedAt || null; Sync.last = new Date().toISOString(); Sync.pending = false;
  localStorage.setItem('moneyme.demo.sync.base', Sync.base || ''); localStorage.setItem('moneyme.demo.sync.last', Sync.last);
  // якщо акаунт ще не запамʼятовано (старе підключення) — підхопимо його для тихого оновлення надалі
  if (!localStorage.getItem('moneyme.demo.sync.account')) fetchAccountEmail().then(e => { if (e) localStorage.setItem('moneyme.demo.sync.account', e); }); }
// Зберегти знімок поточного стану в точки відновлення (щоб нічого не втратити при конфлікті).
function cloudBackupSnapshot(label){ try { const h = restorePoints(); h.push({ date: todayISO(), at: new Date().toISOString(), label: label || '', data: JSON.parse(JSON.stringify(state)) }); localStorage.setItem('moneyme.demo.history', JSON.stringify(h.slice(-7))); } catch (e) {} }
function adoptRemote(remote){
  const incoming = (remote && remote.data) ? remote : { data: remote };
  Sync.applying = true;
  state = migrateBackup(incoming);
  normalize();
  persist();
  Sync.applying = false;
  render();
}

// Повна реконсиляція: тягнемо віддалене, порівнюємо мітки часу, приймаємо новіше.
async function cloudSync(interactive){
  if (!syncAvailable()) { setSyncStatus('off'); return; }
  if (!navigator.onLine) { setSyncStatus('offline'); return; }
  if (!interactive && !getCachedToken()) { setSyncStatus(Sync.on ? 'idle' : 'off'); return; }   // фон без токена — без вікна входу
  try {
    setSyncStatus('syncing');
    await getToken(!!interactive);
    if (!Sync.fileId) Sync.fileId = await driveFindFile();
    let remote = null;
    if (Sync.fileId) { try { remote = await driveDownload(Sync.fileId); } catch (e) { Sync.fileId = await driveFindFile(); if (Sync.fileId) remote = await driveDownload(Sync.fileId); } }
    const localUpd = state.updatedAt || '';
    const remoteUpd = (remote && remote.updatedAt) || '';
    if (remote && remoteUpd && remoteUpd > localUpd) {
      if (localUpd && localUpd !== Sync.base) cloudBackupSnapshot('Локальна версія перед синхронізацією');
      adoptRemote(remote);
      markSynced(state.updatedAt);
    } else {
      Sync.fileId = await driveUpload(Sync.fileId, cloudPayload());
      markSynced(state.updatedAt);
    }
    setSyncStatus('idle');
  } catch (e) { setSyncStatus('error', e.message || String(e)); }
}
// Вивантаження локальних змін; якщо інший пристрій випередив — повна реконсиляція.
async function cloudPush(){
  if (!Sync.on || !syncAvailable()) return;
  if (!navigator.onLine) { setSyncStatus('offline'); return; }
  if (!getCachedToken()) { setSyncStatus('idle'); return; }   // нема токена — відкладаємо (зміни лишаються в черзі), без вікна
  try {
    setSyncStatus('syncing');
    await getToken(false);
    if (!Sync.fileId) Sync.fileId = await driveFindFile();
    let remote = null;
    if (Sync.fileId) { try { remote = await driveDownload(Sync.fileId); } catch (e) {} }
    if (remote && remote.updatedAt && Sync.base && remote.updatedAt > Sync.base && remote.updatedAt > (state.updatedAt || '')) {
      return cloudSync(false);   // на сервері новіше — зливаємо коректно
    }
    Sync.fileId = await driveUpload(Sync.fileId, cloudPayload());
    markSynced(state.updatedAt);
    setSyncStatus('idle');
  } catch (e) { setSyncStatus('error', e.message || String(e)); }
}
// Підключення акаунта з ізоляцією даних: дані кожного Google-акаунта — окремі.
// На спільному пристрої локальні дані НЕ заливаються в чужий акаунт без підтвердження.
async function cloudConnect(){
  if (!syncConfigured()) { alert('Спершу вставте Google Client ID у Налаштуваннях.'); return; }
  if (location.protocol.indexOf('http') !== 0) { alert('Синхронізація працює лише з https-хостингу (GitHub Pages), не з локального файлу.'); return; }
  try {
    setSyncStatus('connecting');
    Sync.token = null; localStorage.removeItem(TOKEN_KEY); localStorage.removeItem('moneyme.demo.sync.account');   // свіжий вхід — можна обрати акаунт
    await acquireToken('consent');
    const email = await fetchAccountEmail();   // запамʼятовуємо акаунт → подальші оновлення тихі (без вибору)
    if (email) localStorage.setItem('moneyme.demo.sync.account', email);
    Sync.fileId = await driveFindFile();
    let remote = Sync.fileId ? await driveDownload(Sync.fileId) : null;
    const remoteHasData = !!(remote && remote.updatedAt);
    const localHasData = !!(((state.accounts||[]).length) || ((state.transactions||[]).length));
    const everConnected = localStorage.getItem('moneyme.demo.sync.everConnected') === '1';
    let pushLocal = false;
    if (remoteHasData) {
      // на цьому акаунті вже є дані → ЗАВЖДИ підтягуємо їх (локальні з пристрою НЕ заливаємо)
      adoptRemote(remote);
    } else if (!everConnected && localHasData) {
      // ПЕРШЕ підключення на цьому пристрої, акаунт порожній, локально є дані → налаштування власника
      const up = confirm('Перше підключення синхронізації. Акаунт порожній.\n\nOK — завантажити поточні дані з цього пристрою у ваш акаунт.\nСкасувати — почати з чистого.');
      if (!up) { state = seed(); normalize(); persist(); render(); }
      pushLocal = true;
    } else {
      // зміна акаунта на порожній → беремо «чисто» з сервера, локальне НЕ заливаємо (щоб дані не перетікали)
      if (localHasData) { state = seed(); normalize(); persist(); render(); }
      pushLocal = true;
    }
    if (pushLocal) Sync.fileId = await driveUpload(Sync.fileId, cloudPayload());
    markSynced(state.updatedAt);
    localStorage.setItem('moneyme.demo.sync.everConnected', '1');
    Sync.on = true; localStorage.setItem('moneyme.demo.sync.on', '1');
    setSyncStatus('idle');
  } catch (e) { setSyncStatus('error', e.message || String(e)); }
}
function cloudDisconnect(){
  const wipe = confirm('Відключити Google Drive.\n\nOK — також очистити дані MoneyMe на цьому пристрої (зручно на спільному пристрої; у Drive вони лишаться).\nСкасувати — лишити дані локально для офлайн-роботи.');
  if (Sync.token && window.google && google.accounts) { try { google.accounts.oauth2.revoke(Sync.token.access_token, function(){}); } catch (e) {} }
  Sync.on = false; Sync.token = null; Sync.fileId = null;
  localStorage.removeItem('moneyme.demo.sync.on');
  localStorage.removeItem('moneyme.demo.sync.base');
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem('moneyme.demo.sync.account');
  if (wipe) { state = seed(); normalize(); persist(); }
  setSyncStatus('off');
}

//==================== Старт ====================
navigate(hashView() || 'dashboard');   // відкриваємо вкладку з URL (зберігається при F5)
ensureRatesFresh();
ensureCryptoFresh();   // ціни крипти (раз на день)
ensureDailySnapshot();   // точка відновлення на сьогодні
maybeAutoBackup();       // опційне автозавантаження бекапу

// PWA: реєстрація service worker + плашка «доступне оновлення» (лише на http/https)
function showUpdateBar(reg){
  if (document.getElementById('upd-bar')) return;
  const bar = el(`<div id="upd-bar" style="position:fixed;left:8px;right:8px;bottom:8px;z-index:10000;background:var(--ink2);color:#fff;padding:10px 14px;border-radius:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,.28)">
    <span class="small">Доступна нова версія MoneyMe</span>
    <span style="display:flex;gap:8px"><button class="btn primary sm" id="upd-now">Оновити</button><button class="btn sm" id="upd-later">Пізніше</button></span></div>`);
  document.body.appendChild(bar);
  $('#upd-now', bar).onclick = () => {
    bar.remove();
    if (reg.waiting) { navigator.serviceWorker.addEventListener('controllerchange', () => location.reload(), { once: true }); reg.waiting.postMessage('skipWaiting'); }
    else location.reload();
  };
  $('#upd-later', bar).onclick = () => bar.remove();
}
if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('sw.js');
      if (reg.waiting && navigator.serviceWorker.controller) showUpdateBar(reg);
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing; if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) showUpdateBar(reg);
        });
      });
      setInterval(() => reg.update().catch(() => {}), 60 * 60 * 1000);   // перевіряти оновлення раз на годину
    } catch (e) {}
  });
}
// Автосинхронізація при старті/поверненні в застосунок/появі мережі.
// Усі ці тригери — ФОНОВІ: cloudSync(false) синхронізує лише за наявності збереженого
// токена і НІКОЛИ не відкриває вікно входу Google. Вікно зʼявляється тільки коли користувач
// сам тисне «Підключити» чи «Синхронізувати зараз».
if (Sync.on && syncAvailable()) { setSyncStatus('idle'); cloudSync(false); }
else if (!navigator.onLine && Sync.on) { setSyncStatus('offline'); }
window.addEventListener('online', () => { if (Sync.on && syncAvailable()) cloudSync(false); });
window.addEventListener('offline', () => { if (Sync.on) setSyncStatus('offline'); });
document.addEventListener('visibilitychange', () => { if (!document.hidden && Sync.on && syncAvailable() && navigator.onLine) cloudSync(false); });
</script>
