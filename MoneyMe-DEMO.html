  function entryTotal(){ return splitOn.checked ? round2([...splitRows.querySelectorAll('.sp-amt')].reduce((s,i)=>s+(num(i.value)||0),0)) : num($('#f-amt', body).value); }
  function updTagSum(){
    const sumEl = $('#f-tagsum', body); if (!sumEl) return;
    const inps = [...tagBox.querySelectorAll('.tag-amt')];
    const cur = accountCur(parseInt($('#f-acc', body).value) || 0);
    const total = round2(entryTotal());
    if (!inps.some(i => i.value.trim() !== '')) { sumEl.innerHTML = `<span class="muted">Не заповнено — сума розділиться між тегами порівну.</span>`; return; }
    const sum = round2(inps.reduce((s, i) => s + (num(i.value) || 0), 0));
    const diff = round2(total - sum);
    if (Math.abs(diff) < 0.005) sumEl.innerHTML = `<span style="color:var(--green)">✓ Сума тегів = ${money(total, cur)}</span>`;
    else if (diff > 0) sumEl.innerHTML = `<span style="color:var(--amber)">Не розподілено ${money(diff, cur)} · сума тегів ${money(sum, cur)} з ${money(total, cur)}</span>`;
    else sumEl.innerHTML = `<span style="color:var(--red)">Зайве ${money(-diff, cur)} · сума тегів ${money(sum, cur)} понад ${money(total, cur)}</span>`;
  }
  function renderTagSplit(){
    const tags = parseTags($('#f-tags', body).value);
    if (tags.length < 2) { tagBox.style.display = 'none'; tagBox.innerHTML = ''; return; }
    tagBox.style.display = '';
    const even = round2(round2(entryTotal()) / tags.length);
    tagBox.innerHTML = `<label class="lab" style="margin-top:2px">Розподіл суми за тегами (необовʼязково)</label>` +
      tags.map(tg => `<div class="row" style="gap:8px;align-items:center;margin-top:4px"><span class="chip" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis">#${esc(tg)}</span><input class="tag-amt" data-tag="${esc(tg)}" inputmode="decimal" style="flex:0 0 120px" value="${tagAmtVals[tg] != null ? esc(String(tagAmtVals[tg])) : ''}" placeholder="${even}"></div>`).join('') +
      `<div class="small" id="f-tagsum" style="margin-top:6px"></div>`;
    tagBox.querySelectorAll('.tag-amt').forEach(inp => inp.addEventListener('input', () => { tagAmtVals[inp.dataset.tag] = inp.value; updTagSum(); }));
    enhanceCalcInputs(tagBox);
    updTagSum();
  }
  $('#f-tags', body).addEventListener('change', renderTagSplit);
  $('#f-tags', body).addEventListener('blur', renderTagSplit);
  $('#f-amt', body).addEventListener('input', () => { if (tagBox.style.display !== 'none') updTagSum(); });
  renderTagSplit();

  openModal((existing?'Редагувати ':'') + (isInc?'надходження':'витрату'), body, {
    saveLabel: 'Зберегти',
    onSave: (close) => {
      const err = $('#f-err', body);
      let splits = null;
      if (splitOn.checked) {
        const mainAcc = parseInt($('#f-acc', body).value);
        splits = [...splitRows.querySelectorAll('.exrow')].map(r => {
          const s = { category_id: r.querySelector('.sp-cat').value ? parseInt(r.querySelector('.sp-cat').value) : null, amount: round2(num(r.querySelector('.sp-amt').value)) };
          const ac = r.querySelector('.sp-acc') && r.querySelector('.sp-acc').value;
          if (ac && parseInt(ac) !== mainAcc) s.account_id = parseInt(ac);   // інший рахунок для цієї статті
          return s;
        }).filter(s => s.amount > 0);
        if (!splits.length) { err.textContent = 'Додайте хоча б одну статтю із сумою більше 0'; err.classList.remove('hidden'); return; }
      }
      const amt = splits ? round2(splits.reduce((s,x)=>s+x.amount,0)) : num($('#f-amt', body).value);
      if (amt <= 0) { err.textContent = 'Введіть суму більше 0'; err.classList.remove('hidden'); return; }
      const exAccId = parseInt($('#f-acc', body).value);
      // повернення частини коштів: витрата = ваша частка, решта — переказ на рахунок повернення
      const rf = $('#f-rfon', body);
      let refund = 0, refundAccId = exAccId;
      if (rf && rf.checked) {
        refund = round2(num($('#f-rfamt', body).value));
        refundAccId = parseInt($('#f-rfacc', body).value);
        if (refund > 0 && refund > amt) { err.textContent = 'Повернення не може перевищувати суму витрати'; err.classList.remove('hidden'); return; }
      }
      const rec = {
        kind, amount: round2(amt),
        account_id: exAccId,
        category_id: splits ? (splits[0].category_id ?? null) : ($('#f-cat', body).value ? parseInt($('#f-cat', body).value) : null),
        date: $('#f-date', body).value || todayISO(),
        note: $('#f-note', body).value.trim() || null,
        tags: parseTags($('#f-tags', body).value),
      };
      if (splits) rec.splits = splits;
      // розподіл за тегами: якщо тегів ≥2 і заповнено суми — перевіряємо, що їх сума = сумі операції
      let tagAmounts = null;
      if (rec.tags.length >= 2) {
        const tinps = [...tagBox.querySelectorAll('.tag-amt')];
        if (tinps.some(i => i.value.trim() !== '')) {
          const tsum = round2(tinps.reduce((s, i) => s + (num(i.value) || 0), 0));
          if (Math.abs(tsum - rec.amount) > 0.01) { const cur = accountCur(exAccId); err.textContent = `Сума за тегами ${money(tsum, cur)} має дорівнювати сумі операції ${money(rec.amount, cur)}`; err.classList.remove('hidden'); return; }
          tagAmounts = {}; tinps.forEach(i => { tagAmounts[i.dataset.tag] = round2(num(i.value)); });
        }
      }
      if (tagAmounts) rec.tagAmounts = tagAmounts;
      if (existing) {
        // якщо це платіж за кредитом — синхронізуємо виплачене на різницю суми
        if (existing.loan_id) {
          const loan = state.loans.find(l => l.id === existing.loan_id);
          if (loan) {
            const delta = round2(rec.amount - (existing.amount || 0));
            loan.paid = round2(Math.min(loan.principal, Math.max(0, (loan.paid || 0) + delta)));
          }
        }
        Object.assign(existing, rec);
        if (!splits) delete existing.splits;   // прибрали розбиття — чистимо старі splits
        if (!tagAmounts) delete existing.tagAmounts;   // прибрали розподіл за тегами
      }
      else {
        rec.id = nextId('tx'); rec.ord = nextOrd(); state.transactions.push(rec);
        // Повернену частину проводимо ОКРЕМОЮ операцією (як у виписці): зарахування на рахунок повернення.
        // Зберігаємо як витрату з відʼємною сумою у тій самій категорії — щоб у всіх зведеннях
        // (категорії, бюджети, теги, рахунки) вона віднімалась: реальна витрата = повна − повернення.
        if (refund > 0) {
          state.transactions.push({
            id: nextId('tx'), ord: nextOrd(), kind: 'EXPENSE', date: rec.date,
            account_id: refundAccId || exAccId,
            category_id: rec.category_id ?? null,
            amount: round2(-refund), reimbursement: true, refund_of: rec.id,
            note: rec.note || null,
            tags: (rec.tags && rec.tags.length) ? rec.tags.slice() : [],
          });
        }
      }
      save(); close(); render();
    }
  });
}

//==================== Діалог переказу ====================
function openTransferDialog(fromId, toId, opts) {
  opts = opts || {};
  const from = state.accounts.find(a=>a.id===fromId);
  const to = state.accounts.find(a=>a.id===toId);
  if (!from || !to) return;
  const cross = from.currency_code !== to.currency_code;
  const F = from.currency_code, T = to.currency_code;
  const ori = cross ? rateOrientation(F, T) : null;
  const pick = !!(opts.fromList && opts.toList);   // режим вибору рахунків (для поповнення цілі тощо)
  const fromSel = pick
    ? `<select id="t-from" style="flex:1;min-width:0">${opts.fromList.map(a=>`<option value="${a.id}" ${a.id===from.id?'selected':''}>${esc(a.name)} · ${money(accountBalance(a.id),a.currency_code)}</option>`).join('')}</select>`
    : `<b style="min-width:0;overflow:hidden;text-overflow:ellipsis">${esc(from.name)}</b>`;
  const toSel = pick
    ? `<select id="t-to" style="flex:1;min-width:0">${opts.toList.map(a=>`<option value="${a.id}" ${a.id===to.id?'selected':''}>${esc(a.name)} (${curSym(a.currency_code)})</option>`).join('')}</select>`
    : `<b style="min-width:0;overflow:hidden;text-overflow:ellipsis">${esc(to.name)}</b>`;
  const body = el(`<div>
    <div class="preview" style="display:flex;align-items:center;gap:8px;background:#f8fafc">
      ${fromSel}<span class="muted" style="flex:0 0 auto">→</span>${toSel}
    </div>
    <div><label class="lab">Сума (${curSym(from.currency_code)})</label><input id="t-amt" inputmode="decimal" placeholder="0.00" style="font-size:22px;font-weight:700"></div>
    <div class="row">
      <div style="flex:1"><label class="lab">Комісія</label>
        <select id="t-feetype"><option value="NONE">Без комісії</option><option value="PERCENT">Відсоток %</option><option value="FIXED">Фіксована</option></select></div>
      <div style="flex:1"><label class="lab" id="t-feelab">Сума комісії</label>
        <div style="display:flex;gap:6px">
          <input id="t-feeval" inputmode="decimal" placeholder="0" disabled style="flex:1">
          <select id="t-feecur" class="hidden" style="width:84px">${cross?`<option value="${F}">${curSym(F)}</option><option value="${T}">${curSym(T)}</option>`:''}</select>
        </div></div>
    </div>
    <div class="row ${cross?'':'hidden'}">
      <div style="flex:1"><label class="lab">${cross?`Курс: 1 ${curSym(ori.strong)} = X ${curSym(ori.weak)}`:'Курс'}</label><input id="t-rate" inputmode="decimal" placeholder="напр. 41.5"></div>
      <div style="flex:1"><label class="lab">Сума (${cross?curSym(T):''}) — зарахується</label><input id="t-toamt" inputmode="decimal" placeholder="0.00"></div>
    </div>
    <div class="muted small ${cross?'':'hidden'}" id="t-ratehint" style="margin-top:-4px"></div>
    <div class="row">
      <div style="flex:1"><label class="lab">Дата</label><input id="t-date" type="date" value="${todayISO()}"></div>
      <div style="flex:1"><label class="lab">Нотатка</label><input id="t-note" placeholder="—"></div>
    </div>
    <div class="preview">
      <div class="pl"><span class="muted">Спишеться з «${esc(from.name)}»</span><b style="color:var(--red)" id="t-debit">—</b></div>
      <div class="pl"><span class="muted">Зарахується на «${esc(to.name)}»</span><b style="color:var(--green)" id="t-credit">—</b></div>
      <div class="pl"><span class="muted">Комісія</span><b style="color:var(--amber)" id="t-fee">—</b></div>
    </div>
    <div class="err hidden" id="t-err"></div>
  </div>`);

  const feeType = $('#t-feetype', body), feeVal = $('#t-feeval', body), feeLab = $('#t-feelab', body), feeCurEl = $('#t-feecur', body);
  const amtEl = $('#t-amt', body), rateEl = $('#t-rate', body), toEl = $('#t-toamt', body);

  const feeCurNow = () => (cross && feeType.value === 'FIXED') ? feeCurEl.value : F;
  function curMult(){ const A = num(amtEl.value), B = cross ? num(toEl.value) : A; return (cross && A > 0 && B > 0) ? B / A : 1; }
  function paint(){
    const A = num(amtEl.value);
    const fc = feeCurNow();
    const fee = feeSourceAmount(feeType.value, num(feeVal.value), fc, F, A, curMult());
    const B = cross ? num(toEl.value) : A;
    $('#t-debit', body).textContent = '−' + money(round2(A + fee), F);
    $('#t-credit', body).textContent = '+' + money(round2(B), T);
    // комісію показуємо у введеній валюті (а якщо вона інша — ще й еквівалент у джерелі)
    $('#t-fee', body).textContent = (feeType.value === 'FIXED' && fc !== F)
      ? `${money(round2(num(feeVal.value)), fc)} ≈ ${money(fee, F)}`
      : money(fee, F);
  }
  function fromRate(){ // змінилась сума/курс → перерахувати суму призначення
    if (cross) { const A = num(amtEl.value), m = xToMultiplier(F, T, num(rateEl.value)); toEl.value = (A > 0 && m > 0) ? String(round2(A * m)) : ''; }
    paint();
  }
  function fromTo(){ // змінилась сума призначення → перерахувати курс
    if (cross) { const A = num(amtEl.value), B = num(toEl.value); if (A > 0 && B > 0) rateEl.value = String(multiplierToX(F, T, B / A)); }
    paint();
  }
  feeType.onchange = () => {
    feeVal.disabled = feeType.value === 'NONE';
    feeLab.textContent = feeType.value === 'PERCENT' ? 'Відсоток, %' : 'Сума комісії';
    if (feeType.value === 'NONE') feeVal.value = '';
    feeCurEl.classList.toggle('hidden', !(cross && feeType.value === 'FIXED'));
    feeCurEl._sync && feeCurEl._sync();
    paint();
  };
  amtEl.addEventListener('input', fromRate);
  rateEl.addEventListener('input', fromRate);
  toEl.addEventListener('input', fromTo);
  feeVal.addEventListener('input', paint);
  feeCurEl.addEventListener('change', paint);
  if (cross) {
    const defX = defaultCrossX(F, T);
    if (defX != null) { rateEl.value = String(defX); $('#t-ratehint', body).textContent = `Курс НБУ${ratesCache.date ? ' на ' + fmtDate(ratesCache.date) : ''} — змініть курс або суму нижче.`; }
  }
  if (opts.preset) {
    if (opts.preset.amt) amtEl.value = opts.preset.amt;
    if (opts.preset.note != null) $('#t-note', body).value = opts.preset.note;
    if (opts.preset.date) $('#t-date', body).value = opts.preset.date;
  }
  fromRate();

  const closeDlg = openModal(opts.title || 'Переказ між рахунками', body, {
    saveLabel: opts.saveLabel || 'Переказати',
    onSave: (close) => {
      const amt = num(amtEl.value);
      const err = $('#t-err', body);
      if (amt <= 0) { err.textContent='Введіть суму більше 0'; err.classList.remove('hidden'); return; }
      let toAmount, mult;
      if (cross) {
        toAmount = round2(num(toEl.value));
        if (toAmount <= 0) { err.textContent='Вкажіть курс або суму в валюті призначення'; err.classList.remove('hidden'); return; }
        mult = toAmount / amt;
      } else { toAmount = round2(amt); mult = 1; }
      const fc = feeCurNow();
      const fee = feeSourceAmount(feeType.value, num(feeVal.value), fc, F, amt, mult);
      state.transactions.push({
        id: nextId('tx'), ord: nextOrd(), kind:'TRANSFER', date: $('#t-date', body).value || todayISO(),
        note: $('#t-note', body).value.trim() || null,
        account_id: from.id, to_account_id: to.id,
        amount: round2(amt), to_amount: toAmount,
        exchange_rate: mult, fee_type: feeType.value, fee_value: num(feeVal.value), fee_currency: fc, fee_amount: fee,
      });
      save(); close(); render();
    }
  });
  if (pick) {   // зміна «звідки/куди» → перевідкриваємо діалог із новими рахунками, зберігаючи введену суму
    const reopen = () => {
      const nf = parseInt($('#t-from', body).value), nt = parseInt($('#t-to', body).value);
      const preset = { amt: amtEl.value, note: $('#t-note', body).value, date: $('#t-date', body).value };
      closeDlg();
      openTransferDialog(nf, nt, Object.assign({}, opts, { preset }));
    };
    $('#t-from', body).onchange = reopen;
    $('#t-to', body).onchange = reopen;
  }
}

//==================== Редагування переказу ====================
function openTransferEdit(tx) {
  if (state.accounts.length < 2) { alertModal('Для переказу потрібно щонайменше два рахунки.'); return; }
  const opts = (sel) => state.accounts.map(a=>`<option value="${a.id}" ${a.id===sel?'selected':''}>${esc(a.name)} (${curSym(a.currency_code)})</option>`).join('');
  const body = el(`<div>
    <div class="row">
      <div style="flex:1"><label class="lab">З рахунку</label><select id="e-from">${opts(tx.account_id)}</select></div>
      <div style="flex:1"><label class="lab">На рахунок</label><select id="e-to">${opts(tx.to_account_id)}</select></div>
    </div>
    <div><label class="lab">Сума (<span id="e-curfrom"></span>)</label><input id="e-amt" inputmode="decimal" style="font-size:22px;font-weight:700" value="${tx.amount}"></div>
    <div class="row">
      <div style="flex:1"><label class="lab">Комісія</label><select id="e-feetype">
        <option value="NONE">Без комісії</option><option value="PERCENT">Відсоток %</option><option value="FIXED">Фіксована</option></select></div>
      <div style="flex:1"><label class="lab" id="e-feelab">Сума комісії</label>
        <div style="display:flex;gap:6px">
          <input id="e-feeval" inputmode="decimal" value="${tx.fee_value || ''}" style="flex:1">
          <select id="e-feecur" class="hidden" style="width:84px"></select>
        </div></div>
    </div>
    <div id="e-ratewrap" class="hidden"><div class="row">
      <div style="flex:1"><label class="lab" id="e-ratelab">Курс</label><input id="e-rate" inputmode="decimal"></div>
      <div style="flex:1"><label class="lab" id="e-tolab">Сума</label><input id="e-toamt" inputmode="decimal"></div>
    </div></div>
    <div class="row">
      <div style="flex:1"><label class="lab">Дата</label><input id="e-date" type="date" value="${tx.date}"></div>
      <div style="flex:1"><label class="lab">Нотатка</label><input id="e-note" value="${esc(tx.note||'')}" placeholder="—"></div>
    </div>
    <div class="preview">
      <div class="pl"><span class="muted">Спишеться</span><b style="color:var(--red)" id="e-debit">—</b></div>
      <div class="pl"><span class="muted">Зарахується</span><b style="color:var(--green)" id="e-credit">—</b></div>
      <div class="pl"><span class="muted">Комісія</span><b style="color:var(--amber)" id="e-fee">—</b></div>
    </div>
    <div class="err hidden" id="e-err"></div>
  </div>`);

  const $$ = (s) => $(s, body);
  $$('#e-feetype').value = tx.fee_type || 'NONE';
  const acc = (id) => state.accounts.find(a => a.id === parseInt(id));
  const isCross = () => { const f = acc($$('#e-from').value), t = acc($$('#e-to').value); return !!(f && t && f.currency_code !== t.currency_code); };
  let feeCurChoice = tx.fee_currency || null;
  const feeCurNow = () => { const f = acc($$('#e-from').value); return (isCross() && $$('#e-feetype').value === 'FIXED') ? $$('#e-feecur').value : (f ? f.currency_code : 'UAH'); };
  const curMult = () => { const A = num($$('#e-amt').value), B = isCross() ? num($$('#e-toamt').value) : A; return (isCross() && A > 0 && B > 0) ? B / A : 1; };

  function meta() {
    const from = acc($$('#e-from').value), to = acc($$('#e-to').value);
    const ft = $$('#e-feetype').value;
    const cross = isCross();
    const ori = cross ? rateOrientation(from.currency_code, to.currency_code) : null;
    $$('#e-curfrom').textContent = from ? curSym(from.currency_code) : '';
    $$('#e-feeval').disabled = ft === 'NONE';
    $$('#e-feelab').textContent = ft === 'PERCENT' ? 'Відсоток, %' : 'Сума комісії';
    $$('#e-ratewrap').classList.toggle('hidden', !cross);
    $$('#e-ratelab').textContent = cross ? `Курс: 1 ${curSym(ori.strong)} = X ${curSym(ori.weak)}` : 'Курс';
    $$('#e-tolab').textContent = cross ? `Сума (${curSym(to.currency_code)})` : 'Сума';
    // вибір валюти комісії (лише для FIXED у міжвалютному переказі)
    const feeCurEl = $$('#e-feecur');
    const showFeeCur = cross && ft === 'FIXED';
    feeCurEl.classList.toggle('hidden', !showFeeCur);
    if (showFeeCur) {
      feeCurEl.innerHTML = `<option value="${from.currency_code}">${curSym(from.currency_code)}</option><option value="${to.currency_code}">${curSym(to.currency_code)}</option>`;
      const valid = [from.currency_code, to.currency_code];
      feeCurEl.value = (feeCurChoice && valid.includes(feeCurChoice)) ? feeCurChoice : from.currency_code;
    }
    feeCurEl._sync && feeCurEl._sync();
  }
  function paint() {
    const from = acc($$('#e-from').value), to = acc($$('#e-to').value);
    const cross = isCross();
    const A = num($$('#e-amt').value);
    const ft = $$('#e-feetype').value, fc = feeCurNow();
    const fee = feeSourceAmount(ft, num($$('#e-feeval').value), fc, from?.currency_code, A, curMult());
    const B = cross ? num($$('#e-toamt').value) : A;
    $$('#e-debit').textContent = '−' + money(round2(A + fee), from?.currency_code);
    $$('#e-credit').textContent = '+' + money(round2(B), to?.currency_code);
    $$('#e-fee').textContent = (ft === 'FIXED' && from && fc !== from.currency_code)
      ? `${money(round2(num($$('#e-feeval').value)), fc)} ≈ ${money(fee, from.currency_code)}`
      : money(fee, from?.currency_code);
  }
  function fromRate() { // сума/курс → перерахувати суму призначення
    const from = acc($$('#e-from').value), to = acc($$('#e-to').value);
    if (isCross()) { const A = num($$('#e-amt').value), m = xToMultiplier(from.currency_code, to.currency_code, num($$('#e-rate').value)); $$('#e-toamt').value = (A > 0 && m > 0) ? String(round2(A * m)) : ''; }
    paint();
  }
  function fromTo() { // сума призначення → перерахувати курс
    const from = acc($$('#e-from').value), to = acc($$('#e-to').value);
    if (isCross()) { const A = num($$('#e-amt').value), B = num($$('#e-toamt').value); if (A > 0 && B > 0) $$('#e-rate').value = String(multiplierToX(from.currency_code, to.currency_code, B / A)); }
    paint();
  }
  const onAccChange = () => { // зміна рахунків → новий курс НБУ
    meta();
    const from = acc($$('#e-from').value), to = acc($$('#e-to').value);
    if (isCross()) { const d = defaultCrossX(from.currency_code, to.currency_code); if (d != null) $$('#e-rate').value = String(d); fromRate(); }
    else paint();
  };
  $$('#e-from').addEventListener('change', onAccChange);
  $$('#e-to').addEventListener('change', onAccChange);
  $$('#e-amt').addEventListener('input', fromRate);
  $$('#e-rate').addEventListener('input', fromRate);
  $$('#e-toamt').addEventListener('input', fromTo);
  $$('#e-feetype').addEventListener('change', () => { meta(); paint(); });
  $$('#e-feeval').addEventListener('input', paint);
  $$('#e-feecur').addEventListener('change', () => { feeCurChoice = $$('#e-feecur').value; paint(); });

  meta();
  { // початкові значення курсу й суми призначення зі збереженого переказу
    const from = acc($$('#e-from').value), to = acc($$('#e-to').value);
    if (isCross()) {
      $$('#e-rate').value = String(multiplierToX(from.currency_code, to.currency_code, tx.exchange_rate || 1));
      $$('#e-toamt').value = String(round2(tx.to_amount != null ? tx.to_amount : tx.amount * (tx.exchange_rate || 1)));
    }
  }
  paint();

  openModal('Редагувати переказ', body, {
    saveLabel: 'Зберегти',
    onSave: (close) => {
      const from = acc($$('#e-from').value), to = acc($$('#e-to').value);
      const err = $$('#e-err');
      const show = (m) => { err.textContent = m; err.classList.remove('hidden'); };
      if (!from || !to) return show('Оберіть рахунки');
      if (from.id === to.id) return show('Рахунок-джерело і призначення мають відрізнятися');
      const amt = num($$('#e-amt').value);
      if (amt <= 0) return show('Введіть суму більше 0');
      const ft = $$('#e-feetype').value;
      const cross = from.currency_code !== to.currency_code;
      let toAmount, mult;
      if (cross) {
        toAmount = round2(num($$('#e-toamt').value));
        if (toAmount <= 0) return show('Вкажіть курс або суму в валюті призначення');
        mult = toAmount / amt;
      } else { toAmount = round2(amt); mult = 1; }
      const fc = feeCurNow();
      const fee = feeSourceAmount(ft, num($$('#e-feeval').value), fc, from.currency_code, amt, mult);
      Object.assign(tx, {
        account_id: from.id, to_account_id: to.id,
        amount: round2(amt), to_amount: toAmount,
        exchange_rate: mult,
        fee_type: ft, fee_value: num($$('#e-feeval').value), fee_currency: fc, fee_amount: fee,
        date: $$('#e-date').value || todayISO(), note: $$('#e-note').value.trim() || null,
      });
      save(); close(); render();
    }
  });
}

//==================== Рядок операції ====================
function txRow(t, { onEdit, onDelete, onDup, onView } = {}) {
  const isT = t.kind === 'TRANSFER', isReimb = t.kind === 'EXPENSE' && !!t.reimbursement, isInc = t.kind === 'INCOME', isCrypto = t.kind === 'CRYPTO';
  const isSplit = isSplitTx(t);
  const cat = (!isT && !isCrypto && !isSplit && t.category_id) ? categoryById(t.category_id) : null;
  const icon = isCrypto ? ic('coin') : isT ? ic('transfer') : isReimb ? ic('plus') : isSplit ? ic('split') : (cat?.icon || (isInc ? ic('plus') : ic('minus')));   // значок категорії (емодзі) або наш SVG
  const color = isCrypto ? '#f59e0b' : isT ? '#0ea5e9' : (isInc || isReimb) ? 'var(--green)' : isSplit ? '#8b5cf6' : (cat?.color || 'var(--red)');
  const cur = accountCur(t.account_id);
  const title = isCrypto ? `${t.side === 'SELL' ? 'Продаж' : 'Купівля'} ${esc(t.base_sym || 'крипто')}` : isT ? `${accountName(t.account_id)} → ${accountName(t.to_account_id)}` : isReimb ? `↩ Повернення${cat ? ' · ' + cat.name : ''}` : isSplit ? 'Кілька статей' : (cat?.name || 'Без категорії');
  let sub;
  if (isCrypto) {
    sub = `${t.side === 'SELL' ? 'отримано' : 'сплачено'} ${fmtAmt(t.quote_qty || 0)} ${esc(t.quote_sym || '')}${t.exchange ? ' · ' + esc(t.exchange) : ''}${t.usd ? ' · ' + money(t.usd, 'USD') : ''}`;
  } else if (isT) {
    const T = accountCur(t.to_account_id);
    const cross = cur !== T && t.to_amount != null;
    const parts = [];
    if (cross) {
      const ori = rateOrientation(cur, T);
      const mult = (t.exchange_rate && t.exchange_rate > 0) ? t.exchange_rate : (t.amount ? t.to_amount / t.amount : 1);
      const X = +multiplierToX(cur, T, mult).toFixed(4);
      parts.push(`1 ${curSym(ori.strong)} = ${X} ${curSym(ori.weak)}`);
      parts.push(`→ ${money(t.to_amount, T)}`);
    } else {
      parts.push('Переказ');
    }
    if (t.fee_amount > 0) parts.push(`комісія ${money(t.fee_amount, cur)}`);
    sub = parts.join(' · ');
  } else if (isSplit) {
    sub = `${accountName(t.account_id)} · ${t.splits.map(p => `${categoryById(p.category_id)?.name || 'Без категорії'} ${money(p.amount, cur)}`).join(' · ')}`;
  } else {
    sub = accountName(t.account_id);
  }
  const amtHtml = isCrypto
    ? `<span class="txamt tabnum" style="color:${t.side==='SELL'?'var(--red)':'var(--green)'}">${t.side==='SELL'?'−':'+'}${fmtAmt(t.base_qty||0)} ${esc(t.base_sym||'')}</span>`
    : isT
    ? `<span class="txamt muted">${money(t.amount,cur)}</span>`
    : isReimb
      ? `<span class="txamt" style="color:var(--green)">+${money(Math.abs(t.amount),cur)}</span>`
      : `<span class="txamt" style="color:${isInc?'var(--green)':'var(--red)'}">${isInc?'+':'−'}${money(t.amount,cur)}</span>`;
  const row = el(`<div class="txrow">
    <span class="txicon" style="background:${color}22;color:${color}">${icon}</span>
    <div class="txmain"><div class="txtitle">${esc(title)}</div>
      <div class="txsub">${fmtDate(t.date)} · ${esc(sub)}${t.note?' · '+esc(t.note):''}${(t.tags&&t.tags.length)?' · '+t.tags.map(x=>'#'+esc(x)).join(' '):''}</div></div>
    <div style="text-align:right">${amtHtml}</div>
  </div>`);
  // Усі дії — під однією кнопкою «⋯» (щоб не тіснити назву операції).
  if (onView || onEdit || onDup || onDelete) {
    const b = el(`<button class="btn ghost sm" title="Дії">${ic('dots')}</button>`);
    b.onclick = () => {
      const r = b.getBoundingClientRect();
      const items = [];
      if (onView) items.push({ label: 'Переглянути', icon: ic('eye'), color: '#64748b', onClick: () => onView(t) });
      if (onEdit && !isReimb && !isCrypto) items.push({ label: 'Редагувати', icon: ic('edit'), color: '#0ea5e9', onClick: () => onEdit(t) });
      if (onDup && !isReimb && !isCrypto) items.push({ label: 'Дублювати', icon: ic('dup'), color: '#8b5cf6', onClick: () => onDup(t) });
      if (onDelete) items.push({ sep: true }, { label: 'Видалити', icon: ic('close'), color: 'var(--red)', onClick: () => onDelete(t) });
      openContextMenu(r.right, r.bottom + 4, items);
    };
    row.appendChild(b);
  }
  return row;
}

// Дублювати операцію: відкриваємо форму з підставленими даними (можна змінити суму), дата — сьогодні.
function duplicateTx(tx) {
  if (tx.kind === 'TRANSFER') {
    if (tx.account_id && tx.to_account_id && state.accounts.find(a=>a.id===tx.account_id) && state.accounts.find(a=>a.id===tx.to_account_id))
      openTransferDialog(tx.account_id, tx.to_account_id);
    return;
  }
  openEntryForm(tx.kind, null, null, { amount: tx.amount, account_id: tx.account_id, category_id: tx.category_id, note: tx.note, tags: tx.tags, splits: tx.splits ? tx.splits.map(s => ({ ...s })) : undefined, tagAmounts: tx.tagAmounts ? { ...tx.tagAmounts } : undefined });
}

//==================== SVG-діаграми ====================
function pieSVG(data, size=170) {
  const total = data.reduce((s,d)=>s+d.total,0);
  if (total <= 0) return el(`<div class="empty">Немає даних</div>`);
  const r = size/2, ir = r*0.58, cx = r, cy = r;
  let ang = -Math.PI/2; let paths = '';
  if (data.length === 1) {
    paths = `<circle cx="${cx}" cy="${cy}" r="${(r+ir)/2}" fill="none" stroke="${data[0].color}" stroke-width="${r-ir}"/>`;
  } else {
    for (const d of data) {
      const frac = d.total/total; const a2 = ang + frac*2*Math.PI;
      const large = frac > 0.5 ? 1 : 0;
      const x1=cx+r*Math.cos(ang), y1=cy+r*Math.sin(ang), x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
      const xi2=cx+ir*Math.cos(a2), yi2=cy+ir*Math.sin(a2), xi1=cx+ir*Math.cos(ang), yi1=cy+ir*Math.sin(ang);
      paths += `<path d="M${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2} L${xi2} ${yi2} A${ir} ${ir} 0 ${large} 0 ${xi1} ${yi1} Z" fill="${d.color}"/>`;
      ang = a2;
    }
  }
  return el(`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}</svg>`);
}

function barsSVG(months) {
  // Координати по горизонталі — в одиницях viewBox (0..100), щоб усе вирівнювалось незалежно від ширини.
  const w = 100/Math.max(months.length,1);
  const max = Math.max(1, ...months.flatMap(m=>[m.income,m.expense,m.fees]));
  const H = 180;
  let bars = '';
  months.forEach((m,i) => {
    const bw = w*0.22, gap = w*0.06, base = i*w + w*0.12;
    const vals = [[m.income,'#16a34a'],[m.expense,'#ef4444'],[m.fees,'#f59e0b']];
    vals.forEach(([v,c],j) => {
      const h = (v/max)*(H-6);
      bars += `<rect x="${(base + j*(bw+gap)).toFixed(2)}" y="${(H-h).toFixed(2)}" width="${bw.toFixed(2)}" height="${h.toFixed(2)}" rx="0.6" fill="${c}"/>`;
    });
  });
  return el(`<svg width="100%" height="${H}" viewBox="0 0 100 ${H}" preserveAspectRatio="none" style="overflow:visible;display:block">${bars}</svg>`);
}

//==================== Дати / аналітика: службові функції ====================
function isoOf(d){ const tz = d.getTimezoneOffset()*60000; return new Date(d.getTime()-tz).toISOString().slice(0,10); }
function addMonthsISO(iso, n){ const [y,m,d] = iso.split('-').map(Number); return isoOf(new Date(y, m-1+n, d)); }
function addDaysISO(iso, n){ return isoOf(new Date(Date.parse(iso) + n*86400000)); }
const FREQ_MONTHS = { quarterly: 3, yearly: 12 };
function nextRecurDate(iso, freq){ return freq==='weekly' ? addDaysISO(iso, 7) : addMonthsISO(iso, FREQ_MONTHS[freq] || 1); }
function prevRecurDate(iso, freq){ return freq==='weekly' ? addDaysISO(iso, -7) : addMonthsISO(iso, -(FREQ_MONTHS[freq] || 1)); }
const FREQ_LABEL = { monthly:'щомісяця', weekly:'щотижня', quarterly:'щокварталу', yearly:'щороку' };
function ymd(y,m,d){ return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function presetRange(name){
  const now = new Date(), y = now.getFullYear(), m = now.getMonth();
  if (name==='month') return { from: ymd(y,m+1,1), to: todayISO() };
  if (name==='lastmonth'){ const pm = new Date(y,m-1,1); const ly=pm.getFullYear(), lmo=pm.getMonth(); return { from: ymd(ly,lmo+1,1), to: ymd(ly,lmo+1,new Date(ly,lmo+1,0).getDate()) }; }
  if (name==='year') return { from: ymd(y,1,1), to: todayISO() };
  if (name==='all') return { from:'', to: todayISO() };
  return { from: monthStartISO(), to: todayISO() };
}
function prevRange(from, to){
  if (!from || !to) return null;
  const f = Date.parse(from), t = Date.parse(to); const len = t - f;
  return { from: isoOf(new Date(f-len-86400000)), to: isoOf(new Date(f-86400000)) };
}
function pctDelta(cur, prev){ if (!prev) return null; return Math.round((cur-prev)/Math.abs(prev)*100); }
// Чисті активи (UAH-екв за поточним курсом) станом на дату.
function netWorthAt(dateISO){
  let total = 0;
  state.accounts.forEach(a => {
    let bal = a.initial_balance || 0;
    state.transactions.forEach(t => { if (t.date > dateISO) return;
      if (t.kind==='INCOME') bal += txAccountShare(t, a.id);
      else if (t.kind==='EXPENSE') bal -= txAccountShare(t, a.id);
      else if (t.kind==='TRANSFER'){ if(t.account_id===a.id) bal -= (t.amount+(t.fee_amount||0)); if(t.to_account_id===a.id) bal += (t.to_amount||0); } });
    const u = toUAH(bal, a.currency_code); total += (u==null ? bal : u);
  });
  return round2(total);
}
function lastMonthEnds(n){ const arr=[]; const now=new Date(); for(let i=n-1;i>=0;i--){ const d=new Date(now.getFullYear(), now.getMonth()-i+1, 0); arr.push({ iso: isoOf(d), label: ymd(d.getFullYear(), d.getMonth()+1, 1).slice(2,7) }); } return arr; }
function netWorthSVG(points){
  const H=130, W=100; const vals=points.map(p=>p.value);
  const min=Math.min(0,...vals), max=Math.max(1,...vals); const range=(max-min)||1;
  const x=i=> points.length<=1?W/2 : (i/(points.length-1))*W;
  const y=v=> H-6 - ((v-min)/range)*(H-12);
  const line = points.map((p,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(p.value).toFixed(1)}`).join(' ');
  const area = `M0 ${H-6} ` + points.map((p,i)=>`L${x(i).toFixed(1)} ${y(p.value).toFixed(1)}`).join(' ') + ` L${W} ${H-6} Z`;
  return el(`<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="overflow:visible;display:block">
    <path d="${area}" fill="var(--accent)" opacity="0.13"/>
    <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="1.1" vector-effect="non-scaling-stroke"/></svg>`);
}
// Рядок підписів під графіком (звичайний HTML — без спотворення).
function chartLabels(labels){
  const n = labels.length, step = Math.max(1, Math.ceil(n/6));
  const shown = labels.map((l,i)=> (i%step===0 || i===n-1) ? l : '');
  return el(`<div style="display:flex;justify-content:space-between;margin-top:4px">${shown.map(l=>`<span class="muted" style="font-size:11px;white-space:nowrap">${esc(l)}</span>`).join('')}</div>`);

function monthRangeOf(ym){ const from = ym + '-01'; const [y,m] = ym.split('-').map(Number); const last = new Date(y, m, 0).getDate(); return { from, to: `${ym}-${String(last).padStart(2,'0')}` }; }
function addMonthsYM(ym, d){ const [y,m] = ym.split('-').map(Number); const dt = new Date(y, m-1+d, 1); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`; }
function monthlyReportHTML(ym){
  const { from, to } = monthRangeOf(ym);
  let inc=0, exp=0, fees=0; const cE={}, cI={};
  state.transactions.forEach(t => { if(!inRange(t, from, to)) return;
    if (t.kind==='INCOME'){ inc+=txUAH(t); txParts(t).forEach(p=>{ const n=categoryById(p.category_id)?.name||'Без категорії'; cI[n]=(cI[n]||0)+partUAH(t,p.amount); }); }

    else if (t.kind==='TRANSFER'){ fees+=feeUAH(t); } });
  inc=round2(inc); exp=round2(exp); fees=round2(fees); const net=round2(inc-exp-fees);
  const topE=Object.entries(cE).sort((a,b)=>b[1]-a[1]); const topI=Object.entries(cI).sort((a,b)=>b[1]-a[1]);

  const subM=curMapStr(recurringMonthlyByCur('EXPENSE')); const loanM=curMapStr(loansByCur(loanMonthly));

  const catRows=(arr,col)=>{ const tot=arr.reduce((s,[,v])=>s+v,0)||1; return arr.map(([n,v])=>`<div style="display:flex;align-items:center;gap:8px;font-size:13px;margin-top:5px"><span style="flex:0 0 42%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(n)}</span><div style="flex:1;height:7px;background:${C.line};border-radius:99px;overflow:hidden"><div style="width:${Math.round(v/tot*100)}%;height:100%;background:${col}"></div></div><b style="flex:0 0 auto">${money(v)}</b><span style="color:${C.mut};width:40px;text-align:right">${Math.round(v/tot*100)}%</span></div>`).join(''); };
  return `<div style="color:${C.ink}">

      ${metric('Надходження',money(inc),C.grn)}${metric('Витрати',money(exp),C.red)}
      ${metric('Комісії',money(fees),C.amb)}${metric('Чистий потік',money(net),net>=0?C.grn:C.red)}
    </div>
    ${topE.length?`<div style="font-weight:700;margin-top:16px">Витрати за статтями</div>${catRows(topE,C.red)}`:''}
    ${topI.length?`<div style="font-weight:700;margin-top:16px">Надходження за статтями</div>${catRows(topI,C.grn)}`:''}
    ${budgets.length?`<div style="font-weight:700;margin-top:16px">Бюджети</div>${budgets.map(b=>{const pct=Math.round(b.spent/b.budget*100);const over=b.spent>b.budget;return `<div style="display:flex;justify-content:space-between;gap:10px;font-size:13px;margin-top:4px"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.c.icon?esc(b.c.icon)+' ':''}${esc(b.c.name)}</span><b style="flex:0 0 auto;color:${over?C.red:C.mut}">${money(b.spent)} / ${money(b.budget)} (${pct}%)</b></div>`;}).join('')}`:''}
    <div style="margin-top:16px;color:${C.mut};font-size:13px;border-top:1px solid ${C.line};padding-top:10px">Підписки/міс: <b style="color:${C.ink}">${subM}</b> · Кредити/міс: <b style="color:${C.ink}">${loanM}</b></div>

  if (pr) state.transactions.forEach(t => { if(!inRange(t,pr.from,pr.to))return; if(t.kind==='INCOME')pInc+=txUAH(t); else if(t.kind==='EXPENSE')pExp+=txUAH(t); });
  const dInc = pctDelta(inc,pInc), dExp = pctDelta(exp,pExp);
  const deltaTag = (d, goodIfNeg) => d==null ? '' : `<div class="k" style="font-size:11px;color:${(goodIfNeg? d<=0 : d>=0)?'var(--green)':'var(--red)'}">${d>0?'+':''}${d}% vs попередній</div>`;

  const sum = el(`<div class="sumcards" style="margin-top:14px">
    <div class="card sumcard"><div class="k">Надходження</div><div class="v tabnum" style="color:var(--green)">${money(inc)}</div>${deltaTag(dInc,false)}</div>
    <div class="card sumcard"><div class="k">Витрати</div><div class="v tabnum" style="color:var(--red)">${money(exp)}</div>${deltaTag(dExp,true)}</div>
    <div class="card sumcard"><div class="k">Комісії</div><div class="v tabnum" style="color:var(--amber)">${money(fees)}</div></div>
    <div class="card sumcard"><div class="k">Чистий потік</div><div class="v tabnum" style="color:${net>=0?'var(--green)':'var(--red)'}">${money(net)}</div></div>
  </div>`);
  app.appendChild(sum);

  // бюджети (кожна категорія у своєму циклі); неактивні (0%) згортаємо, як на Огляді
  const bcard = budgetsCard({ hideZero: true });
  if (bcard) { bcard.style.marginTop = '14px'; app.appendChild(bcard); }

  // ——— Кредити: підсумок ———
  const activeLoans = state.loans.filter(loanActive);
  if (activeLoans.length) {
    const lc = el(`<section class="card" style="padding:14px 16px;margin-top:14px">
      <div class="row" style="justify-content:space-between;align-items:baseline;gap:8px"><h2 style="margin:0">Кредити</h2><button class="btn ghost sm" id="an-loans">До кредитів</button></div>
      <div class="row small" style="gap:8px 18px;flex-wrap:wrap;margin-top:8px">
        <div><span class="muted">Активних: </span><b>${activeLoans.length}</b></div>
        <div><span class="muted">Залишок боргу: </span><b style="color:var(--red)">${curMapStr(loansByCur(loanOutstanding))}</b></div>
        <div><span class="muted">Платіж/міс: </span><b style="color:var(--amber)">${curMapStr(loansByCur(loanMonthly))}</b></div>
      </div>
      <div style="margin-top:8px">${activeLoans.map(l => { const cur = bankById(l.bank_id)?.currency || 'UAH'; return `<div class="row" style="justify-content:space-between;gap:10px;font-size:13px;margin-top:5px"><span class="ln" style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(l.name||'Кредит')}</span><span class="muted tabnum" style="flex:0 0 auto">залишок ${money(loanOutstanding(l),cur)}${isFinite(loanMonthsLeft(l))?' · ще '+loanMonthsLeft(l)+' міс':''} · ${money(loanMonthly(l),cur)}/міс</span></div>`; }).join('')}</div>
    </section>`);
    $('#an-loans', lc).onclick = () => navigate('credits');
    app.appendChild(lc);
  }

  // ——— Регулярні платежі: підсумок ———
  const activeRec = state.recurring.filter(r => r.active !== false);
  if (activeRec.length) {
    const incM = recurringMonthlyByCur('INCOME');
    const hasInc = Object.values(incM).some(v => Math.abs(v) > 0.005);
    const rc = el(`<section class="card" style="padding:14px 16px;margin-top:14px">
      <div class="row" style="justify-content:space-between;align-items:baseline;gap:8px"><h2 style="margin:0">Регулярні платежі</h2><button class="btn ghost sm" id="an-rec">До регулярних</button></div>
      <div class="row small" style="gap:8px 18px;flex-wrap:wrap;margin-top:8px">
        <div><span class="muted">Активних: </span><b>${activeRec.length}</b></div>
        <div><span class="muted">Витрати/міс: </span><b style="color:var(--red)">${curMapStr(recurringMonthlyByCur('EXPENSE'))}</b></div>
        ${hasInc?`<div><span class="muted">Надходження/міс: </span><b style="color:var(--green)">${curMapStr(incM)}</b></div>`:''}
      </div>
      <div style="margin-top:8px">${activeRec.map(r => { const cur = accountCur(r.account_id); return `<div class="row" style="justify-content:space-between;gap:10px;font-size:13px;margin-top:5px"><span class="ln" style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><b style="color:${r.kind==='INCOME'?'var(--green)':'var(--red)'}">${r.kind==='INCOME'?'+':'−'}</b> ${esc(r.name||'Платіж')} <span class="muted" style="font-size:11px">${FREQ_LABEL[r.freq]||''}</span></span><span class="muted tabnum" style="flex:0 0 auto">${money(r.amount,cur)} · ${money(recurMonthlyAmt(r),cur)}/міс</span></div>`; }).join('')}</div>
    </section>`);
    $('#an-rec', rc).onclick = () => navigate('recurring');
    app.appendChild(rc);
  }

  // ——— Прогноз балансу (лише регулярні + кредити) ———
  const recIncU = recurringMonthlyUAH('INCOME'), recExpU = recurringMonthlyUAH('EXPENSE'), loanU = loansMonthlyUAH();
  const monthlyNet = round2(recIncU - recExpU - loanU);
  if (recIncU || recExpU || loanU) {
    const start = netWorthAt(todayISO());
    const pts = [{ label: 'зараз', value: start }];
    let bal = start;
    for (let i = 1; i <= 6; i++) { bal = round2(bal + monthlyNet); const ym = addMonthsYM(todayISO().slice(0,7), i); pts.push({ label: new Date(ym + '-01').toLocaleDateString(lang==='en'?'en-US':'uk-UA', { month: 'short' }), value: bal }); }
    const fc = el(`<div class="card" style="padding:14px;margin-top:14px">
      <div class="row" style="justify-content:space-between;align-items:baseline;gap:8px"><h2 style="margin:0">Прогноз балансу</h2>
        <b class="tabnum" style="color:${monthlyNet>=0?'var(--green)':'var(--red)'}">${monthlyNet>=0?'+':''}${money(monthlyNet)}/міс</b></div>
      <div class="muted small" style="margin-top:2px">Лише регулярні платежі та кредити (без разових). Через 6 міс ≈ <b>${money(pts[pts.length-1].value)}</b>.</div></div>`);
    fc.appendChild(netWorthSVG(pts)); fc.appendChild(chartLabels(pts.map(p => p.label)));
    app.appendChild(fc);
  }

  // графік чистих активів (останні 12 місяців)
  const nwPoints = lastMonthEnds(12).map(m => ({ label: m.label, value: netWorthAt(m.iso) }));
  const nw = el(`<div class="card" style="padding:14px;margin-top:14px">
    <div class="row" style="justify-content:space-between;align-items:baseline"><h2>Чисті активи (₴-екв)</h2>
      <b class="tabnum">${money(nwPoints[nwPoints.length-1].value)}</b></div>
    <div class="muted small" style="margin-top:2px">приблизно, за поточним курсом валют</div></div>`);
  nw.appendChild(netWorthSVG(nwPoints));
  nw.appendChild(chartLabels(nwPoints.map(p=>p.label)));
  app.appendChild(nw);

  // за категоріями
  function catData(kind) {
    const map = {};
    state.transactions.forEach(t => { if(t.kind!==kind || !inR(t)) return;
      txParts(t).forEach(p => {
        const c = p.category_id ? categoryById(p.category_id) : null;
        const key = c ? c.id : 0;
        if (!map[key]) map[key] = { name: c?c.name:'Без категорії', color: c?c.color:'#94a3b8', icon: c?c.icon:'', total:0 };
        map[key].total += partUAH(t, p.amount);
      }); });
    return Object.values(map).sort((a,b)=>b.total-a.total);
  }
  const grid = el(`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-top:14px"></div>`);
  [['Витрати за статтями', catData('EXPENSE')], ['Надходження за статтями', catData('INCOME')]].forEach(([title,data]) => {
    const total = data.reduce((s,d)=>s+d.total,0);
    const cardEl = el(`<div class="card" style="padding:14px"><h2 style="margin-bottom:10px">${title}</h2></div>`);
    if (data.length === 0) { cardEl.appendChild(el(`<div class="empty">Немає даних</div>`)); }
    else {
      const wrap = el(`<div class="row" style="align-items:center;flex-wrap:wrap"></div>`);
      const pieBox = el(`<div style="flex:0 0 auto"></div>`); pieBox.appendChild(pieSVG(data));
      const leg = el(`<ul class="legend" style="flex:1;min-width:150px"></ul>`);
      data.forEach(d => leg.appendChild(el(`<li><span class="ld" style="background:${d.color}"></span>
        <span class="ln">${d.icon?d.icon+' ':''}${esc(d.name)}</span>
        <b class="tabnum">${money(d.total)}</b>
        <span class="muted" style="width:38px;text-align:right">${total?Math.round(d.total/total*100):0}%</span></li>`)));
      wrap.appendChild(pieBox); wrap.appendChild(leg); cardEl.appendChild(wrap);
    }
    grid.appendChild(cardEl);
  });
  app.appendChild(grid);

  // витрати по рахунках і по банках
  function spendBy(keyFn) {
    const map = {};
    state.transactions.forEach(t => { if (t.kind!=='EXPENSE' || !inR(t)) return; const k = keyFn(t); if (k==null) return; map[k]=(map[k]||0)+txUAH(t); });
    return map;
  }
  const byAcc = spendBy(t => t.account_id);
  const accRows = Object.entries(byAcc).map(([id,v]) => ({ a: state.accounts.find(x=>x.id==id), total:v })).filter(x=>x.a).sort((a,b)=>b.total-a.total);
  const byBank = {};
  accRows.forEach(r => { const bid = r.a.bank_id || 0; byBank[bid] = (byBank[bid]||0) + r.total; });
  const bankRows = Object.entries(byBank).map(([bid,v]) => ({ name: bid=='0' ? 'Без банку' : (bankById(parseInt(bid))?.name || '—'), color: '#64748b', total:v })).sort((a,b)=>b.total-a.total);

  const breakdown = el(`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-top:14px"></div>`);
  const mkList = (title, rows, colorOf) => {
    const total = rows.reduce((s,r)=>s+r.total,0);
    const card = el(`<div class="card" style="padding:14px"><h2 style="margin-bottom:10px">${title}</h2></div>`);
    if (!rows.length) { card.appendChild(el(`<div class="empty">Немає даних</div>`)); return card; }
    const ul = el(`<div></div>`);
    rows.forEach(r => { const c = colorOf(r); const pct = total?Math.round(r.total/total*100):0;
      ul.appendChild(el(`<div style="margin:8px 0">
        <div style="display:flex;justify-content:space-between;font-size:14px"><span class="ln">${esc(r.name||(r.a&&r.a.name)||'')}</span><b class="tabnum">${money(r.total)}</b></div>
        <div class="pbar" style="margin-top:4px"><i style="width:${pct}%;background:${c}"></i></div></div>`)); });
    card.appendChild(ul); return card;
  };
  breakdown.appendChild(mkList('Витрати по рахунках', accRows, r => r.a.color || 'var(--accent)'));
  breakdown.appendChild(mkList('Витрати по банках', bankRows, () => 'var(--accent)'));
  // витрати за тегами (операція може мати кілька тегів — сума за тегами може перевищувати загальну)
  const byTag = {};
  state.transactions.forEach(t => { if (t.kind!=='EXPENSE' || !inR(t) || !(t.tags&&t.tags.length)) return; t.tags.forEach(tag => { byTag[tag] = (byTag[tag]||0) + partUAH(t, tagAmount(t, tag)); }); });
  const tagRows = Object.entries(byTag).map(([name,total]) => ({ name:'#'+name, total })).sort((a,b)=>b.total-a.total).slice(0,12);
  if (tagRows.length) breakdown.appendChild(mkList('Витрати за тегами', tagRows, () => '#8b5cf6'));
  app.appendChild(breakdown);

  // помісячна динаміка
  const mMap = {};
  state.transactions.forEach(t => { if(!inR(t))return; const m = t.date.slice(0,7);
    if(!mMap[m]) mMap[m] = { month:m, income:0, expense:0, fees:0 };
    if(t.kind==='INCOME')mMap[m].income+=txUAH(t); else if(t.kind==='EXPENSE')mMap[m].expense+=txUAH(t); else if(t.kind==='TRANSFER')mMap[m].fees+=feeUAH(t); });
  const months = Object.values(mMap).sort((a,b)=>a.month<b.month?-1:1);
  const dyn = el(`<div class="card" style="padding:14px;margin-top:14px"><h2 style="margin-bottom:10px">Динаміка по місяцях</h2></div>`);
  if (months.length === 0) dyn.appendChild(el(`<div class="empty">Немає даних за період</div>`));
  else {
    dyn.appendChild(barsSVG(months));
    dyn.appendChild(chartLabels(months.map(m=>m.month.slice(2))));
    dyn.appendChild(el(`<div class="row small muted" style="gap:16px;margin-top:8px">
      <span><span style="color:#16a34a">■</span> Надходження</span>
      <span><span style="color:#ef4444">■</span> Витрати</span>
      <span><span style="color:#f59e0b">■</span> Комісії</span></div>`));
  }
  app.appendChild(dyn);
};

//==================== Вигляд: Рахунки ====================
let accBankFilter = '';   // '' = усі (групувати по банках); 'none' = без банку; інакше id банку
views.accounts = (app) => {
  const head = el(`<div class="row" style="justify-content:space-between;align-items:center"><h1 style="margin:0">Рахунки</h1></div>`);
  const add = el(`<button class="btn primary">+ Додати рахунок</button>`);
  add.onclick = () => openAccountForm();
  head.appendChild(add); app.appendChild(head);

  // сповіщення про банки без жодного рахунку
  const emptyBanks = state.banks.filter(b => !state.accounts.some(a => a.bank_id === b.id));
  if (emptyBanks.length) {
    app.appendChild(el(`<div class="notice" style="margin-top:10px">⚠️ ${emptyBanks.length === 1 ? 'Банк' : 'Банки'} без жодного привʼязаного рахунку: <b>${emptyBanks.map(b=>esc(b.name)).join(', ')}</b>. Додайте рахунок і вкажіть для нього банк (поле «Банк» у формі рахунку).</div>`));
  }

  // фільтр по банку
  if (state.banks.length > 0) {
    const f = el(`<div style="max-width:280px;margin-top:10px"><label class="lab">Банк</label><select id="acc-bf">
      <option value="">Усі (по банках)</option>
      ${state.banks.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('')}
      <option value="none">Без банку</option>
    </select></div>`);
    $('#acc-bf', f).value = accBankFilter;
    $('#acc-bf', f).onchange = (e) => { accBankFilter = e.target.value; render(); };
    app.appendChild(f);
  }
  app.appendChild(el(`<div class="muted small" style="margin-top:8px">Перетягуйте картки, щоб змінити порядок (застосується і на «Огляді»).</div>`));

  function accCard(a) {
    const bnk = a.bank_id ? bankById(a.bank_id) : null;
    const c = el(`<div class="card" style="padding:14px;border-left:4px solid ${a.color};display:flex;align-items:flex-start;gap:8px${a.archived?';opacity:.6':''}">
      <span class="grip" title="Перетягніть, щоб змінити порядок" style="margin-top:2px">⠿</span>
      <div style="min-width:0;flex:1"><div style="font-weight:600">${a.icon?a.icon+' ':''}${esc(a.name)}${a.archived?' <span class="muted small">(архів)</span>':''}</div>
      <div class="muted small">${TYPE_LABEL[a.type]} · ${curSym(a.currency_code)}${bnk?' · '+esc(bnk.name):''} · старт: ${money(a.initial_balance,a.currency_code)}</div>
      <div class="tabnum" style="font-size:18px;font-weight:800;margin-top:4px">${money(accountBalance(a.id),a.currency_code)}</div></div>
      <div style="display:flex;flex-direction:column;gap:4px"></div></div>`);
    const actions = c.lastElementChild;
    const ed = el(`<button class="btn ghost sm">Змінити</button>`); ed.onclick=()=>openAccountForm(a);
    const arch = el(`<button class="btn ghost sm">${a.archived?'Розархівувати':'Архівувати'}</button>`);
    arch.onclick = () => { a.archived = a.archived ? 0 : 1; save(); render(); };
    const del = el(`<button class="btn danger sm">Видалити</button>`);
    del.onclick = () => {
      const txN = state.transactions.filter(t => t.account_id===a.id || t.to_account_id===a.id).length;
      const recN = state.recurring.filter(r => r.account_id===a.id).length;
      const goalN = state.goals.filter(g => (g.account_ids||[]).includes(a.id)).length;
      const primary = state.banks.find(b => b.primary_account_id===a.id);
      const parts = [];
      if (txN) parts.push(`${txN} операцій`);
      if (recN) parts.push(`${recN} регулярних платежів`);
      if (goalN) parts.push(`${goalN} цілей (рахунок підвʼязаний)`);
      if (primary) parts.push(`основний рахунок банку «${primary.name}»`);
      const doDelete = () => deleteWithUndo(`Рахунок «${a.name}» видалено`, () => {
        // повертаємо суми кредитів за платежами, що видаляються разом з рахунком
        state.transactions.forEach(t => {
          if ((t.account_id===a.id || t.to_account_id===a.id) && t.loan_id) {
            const loan = state.loans.find(l=>l.id===t.loan_id);
            if (loan) loan.paid = round2(Math.max(0, (loan.paid||0) - (t.amount||0)));
          }
        });
        state.accounts = state.accounts.filter(x=>x.id!==a.id);
        state.transactions = state.transactions.filter(t=>t.account_id!==a.id && t.to_account_id!==a.id);
        state.transactions.forEach(t => { if (t.splits) t.splits.forEach(s => { if (s.account_id === a.id) delete s.account_id; }); }); // split-статті на цьому рахунку → на основний
        state.recurring = state.recurring.filter(r=>r.account_id!==a.id);            // регулярні без рахунку — видаляємо
        state.goals.forEach(g => { if (g.account_ids) g.account_ids = g.account_ids.filter(id => id !== a.id); }); // відвʼязуємо від цілей
        state.banks.forEach(b=>{ if(b.primary_account_id===a.id) b.primary_account_id=null; }); // скидаємо «основний рахунок»
      });
      confirmDeleteImpact(`Рахунок «${a.name}»`, parts, { hint: 'Порада: зазвичай краще «Архівувати» — рахунок зникне зі списків, а операції збережуться. При видаленні всі його операції підуть разом із ним.', onConfirm: doDelete });
    };
    actions.appendChild(ed); actions.appendChild(arch); actions.appendChild(del);
    makeReorderable(c, 'acc', a.id, reorderAccount);
    return c;
  }
  const gridOf = (list) => { const g = el(`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr));margin-top:8px"></div>`); list.forEach(a=>g.appendChild(accCard(a))); return g; };

  if (state.accounts.length === 0) { app.appendChild(el(`<div class="muted" style="margin-top:8px">Ще немає рахунків.</div>`)); return; }

  const active = a => !a.archived;
  if (accBankFilter === '') {
    const hasBanks = state.banks.length > 0;
    // групування по банках + сумарний баланс групи за валютами
    state.banks.forEach(b => {
      const list = state.accounts.filter(a => active(a) && a.bank_id === b.id);
      if (list.length === 0) return;
      const total = {}; list.forEach(a => total[a.currency_code]=(total[a.currency_code]||0)+accountBalance(a.id));
      const totStr = Object.entries(total).map(([c,v])=>money(v,c)).join(' · ');
      app.appendChild(el(`<div class="row" style="justify-content:space-between;align-items:baseline;margin-top:16px"><h2 style="min-width:0">${esc(b.name)}</h2><span class="muted small tabnum">${totStr}</span></div>`));
      app.appendChild(gridOf(list));
    });
    const none = state.accounts.filter(a => active(a) && !a.bank_id);
    if (none.length) {
      if (hasBanks) app.appendChild(el(`<div class="row" style="margin-top:16px"><h2 class="muted">Без банку</h2></div>`));
      app.appendChild(gridOf(none));
    }
  } else {
    const list = (accBankFilter === 'none'
      ? state.accounts.filter(a => !a.bank_id)
      : state.accounts.filter(a => a.bank_id === parseInt(accBankFilter))).filter(active);
    if (list.length === 0) app.appendChild(el(`<div class="muted" style="margin-top:8px">Немає рахунків у цій групі.</div>`));
    else app.appendChild(gridOf(list));
  }

  // архівні рахунки
  const archived = state.accounts.filter(a => a.archived);
  if (archived.length) {
    const t = el(`<div style="margin-top:18px"><button class="btn ghost sm" id="show-arch">${showArchived?'▾':'▸'} Архівні рахунки (${archived.length})</button></div>`);
    $('#show-arch', t).onclick = () => { showArchived = !showArchived; render(); };
    app.appendChild(t);
    if (showArchived) app.appendChild(gridOf(archived));
  }
};
let showArchived = false;

function openAccountForm(existing) {
  const e = existing || { type:'CARD', currency_code:'UAH', initial_balance:0, color:PALETTE[0] };
  let color = e.color;
  const body = el(`<div>
    <div><label class="lab">Назва</label><input id="a-name" value="${esc(e.name||'')}" placeholder="напр. Monobank"></div>
    <div class="row">
      <div style="flex:1"><label class="lab">Тип</label><select id="a-type">
        <option value="CASH">Готівка</option><option value="CARD">Картка</option><option value="BANK">Банк. рахунок</option></select></div>
      <div style="flex:1"><label class="lab">Валюта</label><select id="a-cur">${CURRENCIES.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
    </div>

// Видалення категорії: якщо по ній є операції — питаємо, куди їх перенести (інша категорія або «Без категорії»).
function deleteCategory(c){
  const used = state.transactions.filter(t => txParts(t).some(p => p.category_id === c.id)).length;
  const usedRec = state.recurring.filter(r => r.category_id === c.id).length;
  if (used === 0 && usedRec === 0) {
    deleteWithUndo(`Категорію «${c.name}» видалено`, () => { state.categories = state.categories.filter(x => x.id !== c.id); });
    return;
  }
  const others = state.categories.filter(x => x.id !== c.id && x.kind === c.kind);
  const body = el(`<div>
    <p class="muted small">Категорію «${esc(c.name)}» використовують <b>${used}</b> операцій${usedRec?` і ${usedRec} регулярних`:''}.<br>Оберіть, куди перенести їх перед видаленням.</p>
    <div><label class="lab">Перенести в категорію</label>
      <select id="dc-cat"><option value="">— Без категорії —</option>${others.map(x=>`<option value="${x.id}">${x.icon?x.icon+' ':''}${esc(x.name)}</option>`).join('')}</select></div>
  </div>`);
  openModal(`Видалити «${c.name}»`, body, { saveLabel: 'Перенести й видалити', onSave: (close) => {
    const target = $('#dc-cat', body).value ? parseInt($('#dc-cat', body).value) : null;
    deleteWithUndo(`Категорію «${c.name}» видалено (${used} операцій перенесено)`, () => {
      state.transactions.forEach(t => {
        if (t.category_id === c.id) t.category_id = target;
        if (t.splits) t.splits.forEach(s => { if (s.category_id === c.id) s.category_id = target; });
      });
      state.recurring.forEach(r => { if (r.category_id === c.id) r.category_id = target; });
      state.categories = state.categories.filter(x => x.id !== c.id);
    });
    close();
  }});
}

// Переміщення категорії в межах свого типу (міняємо місцями із сусідньою у спільному масиві).
function moveCategory(cat, dir) {
  const same = state.categories.filter(c => c.kind === cat.kind);
  const idx = same.indexOf(cat);
  const target = same[idx + dir];
  if (!target) return;
  const i1 = state.categories.indexOf(cat), i2 = state.categories.indexOf(target);
  [state.categories[i1], state.categories[i2]] = [state.categories[i2], state.categories[i1]];
  save(); render();
}

//==================== Цілі накопичення ====================
function goalMonthsLeft(g){ if (!g.deadline) return null; const now=new Date(); const d=new Date(g.deadline); return Math.max(0, (d.getFullYear()-now.getFullYear())*12 + (d.getMonth()-now.getMonth())); }
function goalNeedPerMonth(g){ const ml=goalMonthsLeft(g); if (ml==null) return null; const rem=Math.max(0,(g.target||0)-goalSaved(g)); return ml>0 ? round2(rem/ml) : rem; }
// Конвертація суми між валютами через гривню (за поточним курсом). null, якщо курсу немає.
function convertCur(amount, from, to){ if (from === to) return amount; const u = toUAH(amount, from); if (u == null) return null; const r = rateFor(to); if (r == null) return null; return u / r; }
// Ціль із підвʼязаними реальними рахунками (накопичено = їхній сумарний баланс).
function goalLinked(g){ return !!(g.account_ids && g.account_ids.length); }
function goalAccounts(g){ return (g.account_ids||[]).map(id => state.accounts.find(a => a.id === id)).filter(Boolean); }
// Накопичено: для звʼязаної цілі — сумарний баланс рахунків у валюті цілі; інакше ручне g.saved.
function goalSaved(g){
  if (!goalLinked(g)) return round2(g.saved || 0);
  let sum = 0;
  goalAccounts(g).forEach(a => { const v = convertCur(accountBalance(a.id), a.currency_code, g.currency); if (v != null) sum += v; });
  return round2(sum);
}

views.goals = (app) => {
  const head = el(`<div class="row" style="justify-content:space-between;align-items:center"><h1 style="margin:0">Цілі</h1></div>`);

  const grid = el(`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-top:12px"></div>`);
  if (state.goals.length === 0) grid.appendChild(el(`<div class="muted">Цілей немає.</div>`));
  state.goals.forEach(g => {
    const target = g.target || 0, saved = goalSaved(g);
    const linked = goalLinked(g);
    const pct = target > 0 ? Math.min(100, Math.round(saved / target * 100)) : 0;
    const done = saved >= target && target > 0;
    const need = goalNeedPerMonth(g), ml = goalMonthsLeft(g);
    const accChips = linked ? goalAccounts(g).map(a => `<span class="chip" style="font-size:11px;padding:3px 8px">${a.icon?a.icon+' ':''}${esc(a.name)} · <span class="tabnum">${money(accountBalance(a.id), a.currency_code)}</span></span>`).join('') : '';
    const card = el(`<section class="card" style="padding:14px;border-top:4px solid ${g.color||'var(--accent)'}">
      <div class="row" style="justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="min-width:0"><div style="font-weight:600">${g.icon?g.icon+' ':''}${esc(g.name||'Ціль')}${done?' ✅':''}${linked?' <span class="muted small">🔗</span>':''}</div>
          <div class="muted small">${g.deadline?(lang==='en'?'until ':'до ')+fmtDate(g.deadline)+(ml!=null?` · ${ml} міс`:''):'без дедлайну'}</div></div>

      </div>

      <div class="row" style="justify-content:space-between;margin-top:6px"><span class="muted small tabnum">${money(saved,g.currency)} з ${money(target,g.currency)}</span>${(need&&!done)?`<span class="small" style="color:var(--amber)">треба ${money(need,g.currency)}/міс</span>`:''}</div>
      ${linked?`<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px">${accChips}</div>`:''}
      <div class="row" style="margin-top:10px;gap:6px;flex-wrap:wrap"></div></section>`);
    const acts = card.lastElementChild;
    if (linked) {
      if (state.accounts.filter(a=>!a.archived).length >= 2) { const top = el(`<button class="btn sm">↑ Поповнити</button>`); top.onclick = () => goalTopUp(g); acts.appendChild(top); }
    } else {
      const inB = el(`<button class="btn sm">+ Внести</button>`); inB.onclick = () => openGoalContribute(g, 1);

      acts.appendChild(inB); acts.appendChild(outB);

    acts.appendChild(ed); acts.appendChild(del);
    grid.appendChild(card);
  });
  app.appendChild(grid);
};

function openGoalContribute(g, sign){
  const body = el(`<div><label class="lab">Сума (${curSym(g.currency)})</label><input id="g-amt" inputmode="decimal" placeholder="0.00" style="font-size:22px;font-weight:700"></div>`);
  openModal((sign>0?'Внести до':'Зняти з') + ' «' + (g.name||'Ціль') + '»', body, { saveLabel: sign>0?'Внести':'Зняти', onSave:(close)=>{
    const a = round2(num($('#g-amt', body).value)); if (a <= 0) return;
    g.saved = round2(Math.max(0, (g.saved||0) + sign*a));
    save(); close(); render();
  }});
}
// Поповнити звʼязану ціль: переказ з обраного рахунка-джерела на підвʼязаний рахунок цілі.
// Куди — підвʼязані рахунки цілі; Звідки — усі інші рахунки з балансом > 0.
function goalTopUp(g){
  const toList = goalAccounts(g).filter(a => !a.archived);
  if (!toList.length) return;
  const fromList = state.accounts.filter(a => !a.archived && accountBalance(a.id) > 0 && !(g.account_ids||[]).includes(a.id));
  if (!fromList.length) { alertModal('Немає рахунків з додатним балансом для поповнення.'); return; }
  openTransferDialog(fromList[0].id, toList[0].id, { fromList, toList, title: 'Поповнити «' + (g.name||'Ціль') + '»', saveLabel: 'Поповнити' });
}

      deadline: $('#g-deadline', body).value || null, color, icon: $('#g-icon',body).value.trim() || null, account_ids,
      saved: account_ids.length ? (existing ? (existing.saved||0) : 0) : round2(Math.max(0, num($('#g-saved', body).value))) };
    if (existing) Object.assign(existing, rec);
    else { rec.id = nextId('goal'); state.goals.push(rec); }
    save(); close(); render();
  }});
}

function fmtAmt(n){ const v = Number(n) || 0; return v.toLocaleString('uk-UA', { maximumFractionDigits: 8 }); }
function cryptoRound(x){ return Math.max(0, Math.round((Number(x) || 0) * 1e8) / 1e8); }   // округлення крипто-кількості (8 знаків, не від'ємне)
// Знак P&L: повертає {txt, color} для відсотка прибутку/збитку.
function plTag(pct){ if (pct == null) return null; const up = pct >= 0; return { txt: (up?'▲ ':'▼ ') + (up?'+':'') + pct.toFixed(1) + '%', color: up?'var(--green)':'var(--red)' }; }

// Зводить записи бірж активу до унікальних {name, amount} (однойменні підсумовуються; конвертує старий рядковий формат).
function mergeExchanges(exs){
  const m = new Map();
  (exs || []).forEach(x => { const nm = (typeof x === 'string' ? x : x.name || '').trim(); if (!nm) return; const amt = typeof x === 'object' ? (x.amount || 0) : 0; m.set(nm, (m.get(nm) || 0) + amt); });
  return [...m].map(([name, amount]) => ({ name, amount }));
}
function exchangeUsageCount(name){ return (state.crypto || []).filter(h => (h.exchanges || []).some(x => (typeof x === 'string' ? x : x.name) === name)).length; }
function renameExchange(oldName, after){
  promptModal('Перейменувати біржу', 'Нова назва біржі / гаманця:', oldName).then(input => {
    if (input == null) return;
    const name = input.trim();
    if (!name || name === oldName) return;
    (state.crypto || []).forEach(h => {
      if (!h.exchanges || !h.exchanges.length) return;
      const mapped = h.exchanges.map(x => { const nm = typeof x === 'string' ? x : x.name; const amt = typeof x === 'object' ? (x.amount || 0) : 0; return { name: nm === oldName ? name : nm, amount: amt }; });
      h.exchanges = mergeExchanges(mapped);
    });
    save(); showToast(`Біржу перейменовано на «${name}»`, null, null, 2500); if (after) after(); render();
  });
}
function exchangePlural(n){ if (lang === 'en') return n === 1 ? 'asset' : 'assets'; return n === 1 ? 'актив' : (n >= 2 && n <= 4 ? 'активи' : 'активів'); }
function deleteExchange(name, after){
  const cnt = exchangeUsageCount(name);
  const others = cryptoExchanges().filter(n => n !== name);
  const body = el(`<div>
    <div class="muted small" style="margin-bottom:8px">Біржу «${esc(name)}» використовують <b>${cnt}</b> ${exchangePlural(cnt)}. Куди перенести монети з неї?</div>
    <label class="lab">Перенести монети на</label>
    <select id="exm-target">
      ${others.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('')}
      <option value="">— Без біржі (прибрати прив'язку) —</option>
    </select>
    <div class="muted small" style="margin-top:6px">Кількість монет в активах збережеться.</div>
  </div>`);
  openModal(`Видалити біржу «${name}»`, body, { saveLabel: 'Перенести й видалити', onSave: (close) => {
    const target = $('#exm-target', body).value;   // '' = без біржі (просто прибрати)
    (state.crypto || []).forEach(h => {
      if (!h.exchanges || !h.exchanges.length) return;
      const moved = h.exchanges.filter(x => (typeof x === 'string' ? x : x.name) === name)
        .reduce((s, x) => s + (typeof x === 'object' ? (x.amount || 0) : 0), 0);
      let rest = h.exchanges.filter(x => (typeof x === 'string' ? x : x.name) !== name);
      if (target && moved > 0) rest = rest.concat([{ name: target, amount: moved }]);
      h.exchanges = mergeExchanges(rest);
    });
    save(); close();
    showToast(target ? `Монети перенесено на «${target}», біржу «${name}» видалено` : `Біржу «${name}» видалено`, null, null, 2800);
    if (after) after(); render();
  }});
  const ok = [...document.querySelectorAll('#modal-root .overlay')].pop()?.querySelector('.mfoot .btn.primary');
  if (ok) { ok.classList.remove('primary'); ok.classList.add('danger'); }
}
// Перегляд і керування біржами / гаманцями (перейменування, видалення).
function openExchangesManager(){
  const body = el(`<div><div class="muted small" style="margin-bottom:6px">Біржі та гаманці зі ваших активів. Перейменування й видалення застосовуються до всіх активів.</div><div id="exm-list"></div></div>`);
  const listBox = $('#exm-list', body);
  function rebuild(){
    listBox.innerHTML = '';
    const names = cryptoExchanges();
    if (!names.length) { listBox.appendChild(el(`<div class="muted small">Бірж ще немає. Додайте їх у формі активу («Розподіл по біржах»).</div>`)); return; }
    names.forEach(nm => {

// Донат-блок розподілу: title + кругова діаграма + легенда (для активів/бірж).
function allocChart(title, data, totalUsd){
  const sec = el(`<section class="card" style="padding:14px;margin-top:12px"><h2 style="margin-bottom:8px">${esc(title)}</h2>
    <div class="row" style="align-items:center;flex-wrap:wrap;gap:6px 14px"></div></section>`);
  const wrap = sec.lastElementChild;

// Сумарна вартість (USD) по біржах / гаманцях, відсортовано за спаданням.
function cryptoExchangeTotals(){
  const t = {};
  (state.crypto || []).forEach(h => {
    const unit = cryptoUnitUsd(h);
    const exs = (h.exchanges || []).filter(x => typeof x === 'object' && x.amount > 0);
    if (exs.length) exs.forEach(x => { const nm = (x.name || '').trim() || 'Без назви'; t[nm] = (t[nm] || 0) + (unit != null ? x.amount * unit : 0); });
    else t['Без біржі'] = (t['Без біржі'] || 0) + cryptoValueUsd(h);
  });
  return Object.keys(t).map(nm => ({ name: nm, total: round2(t[nm]) })).sort((a, b) => b.total - a.total);
}

// Перегляд портфеля, згрупований за біржами / гаманцями.
function renderCryptoByExchange(app, totalUsd){
  const byEx = {};
  (state.crypto || []).forEach(h => {
    const unit = cryptoUnitUsd(h);
    const exs = (h.exchanges || []).filter(x => typeof x === 'object' && x.amount > 0);
    if (exs.length) {
      exs.forEach(x => { const nm = (x.name || '').trim() || 'Без назви'; (byEx[nm] = byEx[nm] || []).push({ h, amount: x.amount, val: unit != null ? round2(x.amount * unit) : 0, unit }); });
    } else {
      (byEx['Без біржі'] = byEx['Без біржі'] || []).push({ h, amount: h.amount, val: cryptoValueUsd(h), unit });
    }
  });
  const groups = Object.keys(byEx)
    .map(nm => ({ nm, items: byEx[nm].sort((a, b) => b.val - a.val), total: round2(byEx[nm].reduce((s, i) => s + i.val, 0)) }))
    .sort((a, b) => b.total - a.total);
  if (!groups.length) { app.appendChild(el(`<div class="muted" style="margin-top:12px">Активів немає.</div>`)); return; }
  groups.forEach(g => {
    const pct = totalUsd > 0 ? Math.round(g.total / totalUsd * 100) : 0;
    const card = el(`<section class="card" style="padding:10px 14px;margin-top:12px">
      <div class="row" style="justify-content:space-between;align-items:baseline;gap:10px">
        <h2 style="margin:0;font-size:16px">${esc(g.nm)}</h2>
        <div style="text-align:right;flex:0 0 auto"><b class="tabnum">${money(g.total,'USD')}</b> <span class="muted small">${pct}%</span></div>
      </div></section>`);
    g.items.forEach(it => {
      const img = cryptoImg(it.h);
      const icon = img
        ? `<img src="${esc(img)}" alt="" style="width:22px;height:22px;border-radius:50%;flex:0 0 auto" loading="lazy">`
        : `<span class="crsym">${esc((it.h.symbol||'?').slice(0,3))}</span>`;
      const r = el(`<div class="txrow" style="gap:10px${it.h.color?`;border-left:3px solid ${it.h.color};padding-left:9px;border-radius:8px;background:${it.h.color}14`:''}">
        ${icon}
        <div style="flex:1;min-width:0"><div style="font-weight:600">${esc(it.h.symbol)}</div>
          <div class="muted small tabnum">${fmtAmt(it.amount)}${it.unit!=null?' × '+money(it.unit,'USD'):''}</div>${it.h.note?`<div class="muted small" style="margin-top:2px;white-space:pre-wrap">${esc(it.h.note)}</div>`:''}</div>
        <div class="tabnum" style="font-weight:700;text-align:right;flex:0 0 auto">${it.unit!=null?money(it.val,'USD'):'—'}</div>
      </div>`);
      card.appendChild(r);
    });
    app.appendChild(card);
  });
}

// ——— Обмін крипти за крипту (пари): купівля/продаж бази за котирування (USDT/USDC/…) ———
// Чиста функція: рахує USD-вартість угоди та зміни cost-basis (без мутацій) — для тестів.
function cryptoTradeDeltas(base, quote, side, baseQty, quoteQty){
  const qUsd = cryptoUnitUsd(quote), bUsd = cryptoUnitUsd(base);
  const usd = round2((qUsd != null) ? quoteQty * qUsd : (bUsd != null ? baseQty * bUsd : 0));
  if (side === 'SELL') {   // продаємо базу → забираємо пропорційний cost бази, котируванню додаємо usd
    const baseCostDelta = (base && base.amount > 0 && typeof base.cost === 'number') ? round2(base.cost * baseQty / base.amount) : 0;
    return { usd, baseCostDelta, quoteCostDelta: usd };
  }
  // купуємо базу → базі додаємо usd, у котирування забираємо пропорційний cost витраченого
  const quoteCostDelta = (quote && quote.amount > 0 && typeof quote.cost === 'number') ? round2(quote.cost * quoteQty / quote.amount) : 0;
  return { usd, baseCostDelta: usd, quoteCostDelta };
}
// Чи позиція ведеться по біржах (є хоч одна біржа з ненульовою кількістю).
function cryptoTracked(h){ return !!(h && h.exchanges && h.exchanges.some(x => (x.amount || 0) > 0)); }
// Коригує кількість позиції на конкретній біржі (delta) і перераховує загальну. Якщо біржі нема або позиція
// «пласка» (без розподілу) — просто змінюємо загальну кількість.
function adjustHoldingOnExchange(h, exName, delta){
  const tracked = cryptoTracked(h);
  const seedNew = exName && delta > 0 && !tracked && (!h.exchanges || !h.exchanges.length) && (h.amount || 0) === 0;   // нова/порожня позиція → почати облік по біржі
  if (exName && (tracked || seedNew)) {
    if (!h.exchanges) h.exchanges = [];
    let e = h.exchanges.find(x => x.name === exName);
    if (!e) { e = { name: exName, amount: 0 }; h.exchanges.push(e); }
    e.amount = cryptoRound((e.amount || 0) + delta);
    h.exchanges = h.exchanges.filter(x => (x.amount || 0) > 0);   // прибрати порожні біржі
    h.amount = cryptoRound(h.exchanges.reduce((s, x) => s + (x.amount || 0), 0));
  } else {
    h.amount = cryptoRound((h.amount || 0) + delta);
  }
}
// Застосовує обмін: мутує обидві позиції (з урахуванням біржі) й створює операцію kind:'CRYPTO' (фіат не чіпаємо).
function applyCryptoTrade(base, quote, side, baseQty, quoteQty, date, note, exchange){
  const d = cryptoTradeDeltas(base, quote, side, baseQty, quoteQty);   // рахуємо ДО мутацій (пропорції за поточними amount)
  const ex = exchange || null;
  if (side === 'SELL') {   // продали базу (на біржі ex) → отримали котирування (туди ж)
    adjustHoldingOnExchange(base, ex, -baseQty); base.cost = round2(Math.max(0, (base.cost || 0) - d.baseCostDelta));
    adjustHoldingOnExchange(quote, ex, +quoteQty); quote.cost = round2((quote.cost || 0) + d.quoteCostDelta);
  } else {                 // купили базу (на біржі ex) за котирування (звідти ж)
    adjustHoldingOnExchange(base, ex, +baseQty); base.cost = round2((base.cost || 0) + d.baseCostDelta);
    adjustHoldingOnExchange(quote, ex, -quoteQty); quote.cost = round2(Math.max(0, (quote.cost || 0) - d.quoteCostDelta));
  }
  const tx = { id: nextId('tx'), ord: nextOrd(), kind: 'CRYPTO', side, date: date || todayISO(),
    base_id: base.id, base_sym: base.symbol, base_qty: baseQty,
    quote_id: quote.id, quote_sym: quote.symbol, quote_qty: quoteQty, exchange: ex,
    usd: d.usd, base_cost_delta: d.baseCostDelta, quote_cost_delta: d.quoteCostDelta, note: note || null };
  state.transactions.push(tx);
  return tx;
}

function round2plusCrypto(x){ return Math.round((Number(x) || 0) * 1e8) / 1e8; }   // як cryptoRound, але дозволяє 0 без clamp до >0 (для проміжних розрахунків)

//==================== Регулярні платежі ====================
function dueRecurring(){ const t = todayISO(); return state.recurring.filter(r => r.active !== false && r.next_date && r.next_date <= t); }
// Місячний еквівалент суми регулярного (тиждень → ×52/12).
function recurMonthlyAmt(r){ const f = r.freq; const m = f === 'weekly' ? 52/12 : f === 'quarterly' ? 1/3 : f === 'yearly' ? 1/12 : 1; return round2((r.amount || 0) * m); }
// Місячне навантаження регулярних за валютами, для типу (EXPENSE/INCOME).
function recurringMonthlyByCur(kind){ const m = {}; state.recurring.filter(r => r.active !== false && r.kind === kind).forEach(r => { const c = accountCur(r.account_id); m[c] = (m[c] || 0) + recurMonthlyAmt(r); }); return m; }
// Агрегат по активних кредитах за валютами (fn — що сумувати: залишок/платіж).
function loansByCur(fn){ const m = {}; state.loans.filter(loanActive).forEach(l => { const c = bankById(l.bank_id)?.currency || 'UAH'; m[c] = (m[c] || 0) + fn(l); }); return m; }
// «{UAH: 100, USD: 5}» → «100,00 ₴ + 5,00 $» (пропускає ~нульові).
function curMapStr(m){ const e = Object.entries(m).filter(([c, v]) => Math.abs(v) > 0.005); return e.length ? e.map(([c, v]) => money(round2(v), c)).join(' + ') : '—'; }
// Місячні регулярні/кредитні потоки, зведені в гривню (для прогнозу балансу).
function recurringMonthlyUAH(kind){ return round2(state.recurring.filter(r => r.active !== false && r.kind === kind).reduce((s, r) => { const a = recurMonthlyAmt(r); const u = toUAH(a, accountCur(r.account_id)); return s + (u == null ? a : u); }, 0)); }
function loansMonthlyUAH(){ return round2(state.loans.filter(loanActive).reduce((s, l) => { const a = loanMonthly(l); const u = toUAH(a, bankById(l.bank_id)?.currency || 'UAH'); return s + (u == null ? a : u); }, 0)); }
// Графік амортизації від поточного залишку: помісячно платіж = тіло + відсотки.
function loanSchedule(l){
  const M = loanMonthly(l), i = loanMonthlyRate(l);
  let bal = loanOutstanding(l); const rows = []; let n = 0;
  while (bal > 0.005 && n < 600) {
    n++;
    const interest = round2(bal * i);
    let principal = round2(M - interest);
    if (principal <= 0) break;   // платіж не покриває відсотки
    if (principal > bal) principal = bal;
    bal = round2(bal - principal);
    rows.push({ n, interest, principal, pay: round2(principal + interest), bal: Math.max(0, bal) });
  }
  return rows;
}
function openLoanSchedule(l, bank){

  const totalInt = round2(rows.reduce((s, r) => s + r.interest, 0));
  const startISO = l.due_date || todayISO();
  const body = el(`<div>
    <div class="muted small" style="margin-bottom:8px">Залишок <b class="tabnum">${money(loanOutstanding(l),cur)}</b> · ${rows.length} платежів · переплата відсотків ≈ <b class="tabnum" style="color:var(--amber)">${money(totalInt,cur)}</b></div>

function recordRecurring(r){
