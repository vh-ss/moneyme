function recalcSeq(data){
  const mx = (arr)=>arr.reduce((m,x)=>Math.max(m,x.id||0),0);
  return { acc: mx(data.accounts||[])+1, cat: mx(data.categories||[])+1, tx: mx(data.transactions||[])+1,
           bank: mx(data.banks||[])+1, loan: mx(data.loans||[])+1, rec: mx(data.recurring||[])+1, goal: mx(data.goals||[])+1 };
}
// Привести будь-який бекап (старий v1 чи новий v2) до поточної схеми.
function migrateBackup(raw){
  let d = (raw && raw.data && Array.isArray(raw.data.accounts)) ? raw.data : raw;
  d = JSON.parse(JSON.stringify(d || {}));
  d.accounts = d.accounts || []; d.categories = d.categories || []; d.transactions = d.transactions || [];
  d.banks = d.banks || []; d.loans = d.loans || []; d.recurring = d.recurring || []; d.goals = d.goals || [];
  const rs = recalcSeq(d);
  d.seq = d.seq || {};
  ['acc','cat','tx','bank','loan','rec','goal'].forEach(k => { if (d.seq[k] == null) d.seq[k] = rs[k]; });
  d.version = SCHEMA_VERSION;
  return d;
}
// Прибирає «осиротілі» посилання після імпорту (на неіснуючі рахунки/категорії/банки/кредити).
// Повертає кількість виправлень. Захищає цілісність від зіпсованого/чужого бекапу.
function sanitizeImport(d){
  let fixed = 0;
  const accIds = new Set((d.accounts||[]).map(a=>a.id));
  const catIds = new Set((d.categories||[]).map(c=>c.id));
  const bankIds = new Set((d.banks||[]).map(b=>b.id));
  const loanIds = new Set((d.loans||[]).map(l=>l.id));
  const recIds = new Set((d.recurring||[]).map(r=>r.id));
  const txBefore = (d.transactions||[]).length;
  d.transactions = (d.transactions||[]).filter(t => t.kind === 'CRYPTO' || accIds.has(t.account_id));   // крипто-обмін рахунку не має; решта — без валідного рахунку непридатна
  fixed += txBefore - d.transactions.length;
  d.transactions.forEach(t => {
    if (t.category_id != null && !catIds.has(t.category_id)) { t.category_id = null; fixed++; }
    if (Array.isArray(t.splits)) t.splits.forEach(s => { if (s.category_id != null && !catIds.has(s.category_id)) { s.category_id = null; fixed++; } if (s.account_id != null && !accIds.has(s.account_id)) { delete s.account_id; fixed++; } });
    if (t.to_account_id != null && !accIds.has(t.to_account_id)) { t.to_account_id = null; fixed++; }
    if (t.loan_id != null && !loanIds.has(t.loan_id)) { t.loan_id = null; fixed++; }
    if (t.recurring_id != null && !recIds.has(t.recurring_id)) { t.recurring_id = null; fixed++; }
  });
  const tx2 = d.transactions.length;
  d.transactions = d.transactions.filter(t => t.kind !== 'TRANSFER' || t.to_account_id != null);   // переказ без призначення прибираємо
  fixed += tx2 - d.transactions.length;
  (d.accounts||[]).forEach(a => { if (a.bank_id != null && !bankIds.has(a.bank_id)) { a.bank_id = null; fixed++; } });
  (d.loans||[]).forEach(l => { if (l.bank_id != null && !bankIds.has(l.bank_id)) { l.bank_id = null; fixed++; } });
  (d.banks||[]).forEach(b => { if (b.primary_account_id != null && !accIds.has(b.primary_account_id)) { b.primary_account_id = null; fixed++; } });
  (d.recurring||[]).forEach(r => { if (r.account_id != null && !accIds.has(r.account_id)) { r.account_id = null; fixed++; } if (r.category_id != null && !catIds.has(r.category_id)) { r.category_id = null; fixed++; } });
  (d.goals||[]).forEach(g => { if (Array.isArray(g.account_ids)) { const b = g.account_ids.length; g.account_ids = g.account_ids.filter(id => accIds.has(id)); fixed += b - g.account_ids.length; } });
  return fixed;
}

let showZeroLimitBanks = false;   // показувати банки з нульовим кредитним лімітом
views.credits = (app) => {
  const head = el(`<div class="row" style="justify-content:space-between;align-items:center"><h1 style="margin:0">Кредити</h1></div>`);
  const addBank = el(`<button class="btn primary">+ Банк</button>`); addBank.onclick = () => openBankForm();
  head.appendChild(addBank); app.appendChild(head);

  // Зведена статистика по всіх банках (за валютами).
  const agg = {};
  state.banks.forEach(b => {
    const c = b.currency;
    if (!agg[c]) agg[c] = { limit:0, used:0, avail:0 };
    agg[c].limit += b.limit || 0;
    agg[c].used  += bankOutstanding(b.id);
    agg[c].avail += bankAvailable(b);
  });
  const burdenByCur = {};
  state.loans.filter(loanActive).forEach(l => {
    const b = bankById(l.bank_id); const cur = b ? b.currency : 'UAH';
    burdenByCur[cur] = (burdenByCur[cur] || 0) + loanMonthly(l);
  });
  // зводимо значення за валютами в рядок
  const joinObj = (obj, key) => { const e = Object.entries(obj); return e.length ? e.map(([c,o])=>money(round2(key?o[key]:o),c)).join(' · ') : '—'; };

  const sum = el(`<div class="sumcards" style="margin-top:12px">
    <div class="card sumcard"><div class="k">Всього (ліміт)</div><div class="v tabnum">${joinObj(agg,'limit')}</div></div>
    <div class="card sumcard"><div class="k">Використано</div><div class="v tabnum" style="color:var(--red)">${joinObj(agg,'used')}</div></div>
    <div class="card sumcard"><div class="k">Доступно</div><div class="v tabnum" style="color:var(--green)">${joinObj(agg,'avail')}</div></div>
    <div class="card sumcard"><div class="k">Навантаження/міс</div><div class="v tabnum" style="color:var(--amber)">${joinObj(burdenByCur,null)}</div></div>
  </div>`);
  app.appendChild(sum);

  if (state.banks.length === 0) {
    app.appendChild(el(`<div class="empty">Додайте банк, щоб вести кредитні ліміти та кредити.</div>`));
    return;
  }

  // банки з нульовим лімітом — приховані, з кнопкою показу
  const hidden = state.banks.filter(b => (b.limit || 0) <= 0);
  const visible = showZeroLimitBanks ? state.banks : state.banks.filter(b => (b.limit || 0) > 0);
  if (hidden.length > 0) {
    const t = el(`<div style="margin-top:10px"><button class="btn ghost sm">${showZeroLimitBanks ? `Сховати банки без ліміту (${hidden.length})` : `Показати банки без ліміту (${hidden.length})`}</button></div>`);
    t.firstElementChild.onclick = () => { showZeroLimitBanks = !showZeroLimitBanks; render(); };
    app.appendChild(t);
  }

  visible.forEach(bank => {
    const out = bankOutstanding(bank.id);
    const avail = bankAvailable(bank);
    const burden = bankMonthlyBurden(bank.id);
    const usedPct = bank.limit > 0 ? Math.min(100, Math.round(out / bank.limit * 100)) : 0;
    const card = el(`<section class="card" style="padding:16px;margin-top:12px">
      <div class="row" style="justify-content:space-between;align-items:center;gap:8px">
        <h2 style="min-width:0;display:flex;align-items:center;gap:8px"><span class="grip" title="Перетягніть, щоб змінити порядок банків">⠿</span><span style="min-width:0;overflow:hidden;text-overflow:ellipsis">${esc(bank.name)}</span> <span class="muted small">${curSym(bank.currency)}</span></h2>
        <div class="bankacts" style="display:flex;gap:6px;flex:0 0 auto"></div></div>
      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-top:12px">
        <div><div class="muted small">Ліміт</div><div class="tabnum" style="font-weight:700">${money(bank.limit,bank.currency)}</div></div>
        <div><div class="muted small">Використано</div><div class="tabnum" style="font-weight:700">${money(out,bank.currency)}</div></div>
        <div><div class="muted small">Доступно</div><div class="tabnum" style="font-weight:700;color:${avail<0?'var(--red)':'var(--green)'}">${money(avail,bank.currency)}</div></div>
        <div><div class="muted small">Навантаження/міс</div><div class="tabnum" style="font-weight:700;color:var(--amber)">${money(burden,bank.currency)}</div></div>
      </div>
      <div class="bar" style="margin-top:12px"><i style="width:${usedPct}%;background:${avail<0?'var(--red)':'var(--accent)'}"></i></div>
      <div class="loansbox" style="margin-top:12px"></div>
    </section>`);
    const acts = $('.bankacts', card);
    const addLoan = el(`<button class="btn sm">+ Кредит</button>`); addLoan.onclick = () => openLoanForm(null, bank.id);
    const edB = el(`<button class="btn ghost sm" title="Редагувати банк">${ic('edit')}</button>`); edB.onclick = () => openBankForm(bank);
    const delB = el(`<button class="btn danger sm" title="Видалити банк">${ic('close')}</button>`);
    delB.onclick = () => {
      const accN = state.accounts.filter(x => x.bank_id===bank.id).length;
      const loanN = state.loans.filter(l => l.bank_id===bank.id).length;
      const parts = [];
      if (accN) parts.push(`${accN} рахунків (привʼязані до банку)`);
      if (loanN) parts.push(`${loanN} кредитів`);
      confirmDeleteImpact(`Банк «${bank.name}»`, parts, { hint: 'Рахунки відвʼяжуться від банку (самі рахунки залишаться), а кредити цього банку буде видалено.', onConfirm: () => deleteWithUndo(`Банк «${bank.name}» видалено`, () => {
        state.banks = state.banks.filter(x=>x.id!==bank.id);
        state.loans = state.loans.filter(l=>l.bank_id!==bank.id);
        state.accounts.forEach(a => { if (a.bank_id === bank.id) a.bank_id = null; });
      }) });
    };
    acts.appendChild(addLoan); acts.appendChild(edB); acts.appendChild(delB);

    const box = $('.loansbox', card);
    const loans = state.loans.filter(l => l.bank_id === bank.id);
    if (loans.length === 0) box.appendChild(el(`<div class="muted small">Кредитів немає.</div>`));
    loans.forEach(l => box.appendChild(loanRow(l, bank)));
    makeReorderable(card, 'bank', bank.id, reorderBank);
    app.appendChild(card);
  });
};

function loanRow(l, bank) {
  const monthly = loanMonthly(l), out = loanOutstanding(l);
  const paidPct = l.principal > 0 ? Math.min(100, Math.round((l.paid||0) / l.principal * 100)) : 0;
  const closed = !loanActive(l);
  const interest = l.has_interest ? `${l.rate||0}% річних` : 'без відсотків';
  const node = el(`<div class="card" style="padding:12px;margin-top:8px;${closed?'opacity:.6':''}">
    <div class="row" style="justify-content:space-between;align-items:flex-start;gap:8px">
      <div style="min-width:0">
        <div style="font-weight:600">${esc(l.name||'Кредит')}${closed?' <span class="muted small">(закрито)</span>':''}</div>
        <div class="muted small">${money(l.principal,bank.currency)} · ${l.months} міс · ${interest}${l.due_date?' · списання '+fmtDate(l.due_date):''}</div>
      </div>
      <div style="text-align:right;flex:0 0 auto">
        <div class="tabnum" style="font-weight:700;color:var(--amber)">${money(monthly,bank.currency)}/міс</div>
        <div class="muted small">залишок ${money(out,bank.currency)}</div>
      </div>
    </div>
    <div class="bar" style="margin-top:8px"><i style="width:${paidPct}%;background:var(--green)"></i></div>
    <div class="row" style="justify-content:space-between;align-items:center;margin-top:6px">
      <span class="muted small">Виплачено ${money(l.paid||0,bank.currency)} з ${money(l.principal,bank.currency)} (${paidPct}%)</span>
      <span class="loanacts" style="display:flex;gap:6px"></span>
    </div>
  </div>`);
  const acts = $('.loanacts', node);
  if (!closed) {
    const pay = el(`<button class="btn sm" title="Внести платіж за місяць">Платіж</button>`);
    pay.onclick = () => openLoanPayment(l, bank);
    acts.appendChild(pay);
    if (l.has_interest && l.rate > 0) { const po = el(`<button class="btn ghost sm" title="Калькулятор дострокового погашення">Достроково</button>`); po.onclick = () => openPayoff(l, bank); acts.appendChild(po); }
    const sch = el(`<button class="btn ghost sm" title="Графік платежів (амортизація)">Графік</button>`); sch.onclick = () => openLoanSchedule(l, bank); acts.appendChild(sch);
  }
  const ed = el(`<button class="btn ghost sm">${ic('edit')}</button>`); ed.onclick = () => openLoanForm(l);
  const del = el(`<button class="btn danger sm">${ic('close')}</button>`);
  del.onclick = () => {
    const payN = state.transactions.filter(t => t.loan_id===l.id).length;
    const parts = [];
    if (payN) parts.push(`${payN} операцій-платежів — залишаться, але втратять привʼязку до кредиту`);
    confirmDeleteImpact(`Кредит «${l.name||'Кредит'}»`, parts, {
      force: true,   // кредит — важливий запис: підтверджуємо завжди, навіть без платежів
      hint: `Кредит на ${money(l.principal, bank.currency)} · виплачено ${money(l.paid||0, bank.currency)} · залишок ${money(out, bank.currency)}.`,
      onConfirm: () => deleteWithUndo('Кредит видалено', () => { state.loans = state.loans.filter(x=>x.id!==l.id); state.transactions.forEach(t=>{ if(t.loan_id===l.id) t.loan_id=null; }); })
    });
  };
  acts.appendChild(ed); acts.appendChild(del);
  return node;
}

// Внесення платежу: сума за місяць рахується автоматично, користувач підтверджує (або змінює).
// Якщо обрано рахунок — створюється операція «витрата» на суму платежу.
function openLoanPayment(l, bank) {
  const monthly = loanMonthly(l);
  const out = loanOutstanding(l);
  const pay = round2(Math.min(monthly, out));
  // рахунки тієї ж валюти — спершу
  const accs = [...state.accounts].sort((a,b) => (b.currency_code===bank.currency) - (a.currency_code===bank.currency));
  const expCats = state.categories.filter(c => c.kind === 'EXPENSE');
  const defCat = expCats.find(c => /кредит/i.test(c.name));

  const body = el(`<div>
    <div class="preview">
      <div class="pl"><span class="muted">Платіж за місяць (авто)</span><b style="color:var(--amber)">${money(pay,bank.currency)}</b></div>
      <div class="pl"><span class="muted">Поточний залишок</span><b>${money(out,bank.currency)}</b></div>
      <div class="pl"><span class="muted">Залишок після платежу</span><b id="pp-after">—</b></div>
    </div>
    <div><label class="lab">Сума платежу (${curSym(bank.currency)})</label><input id="pp-amt" inputmode="decimal" value="${pay}"></div>
    <div><label class="lab">Списати з рахунку (як «витрату»)</label><select id="pp-acc">
      <option value="">— не створювати операцію —</option>
      ${accs.map(a=>`<option value="${a.id}">${esc(a.name)} (${curSym(a.currency_code)})</option>`).join('')}
    </select></div>
    <div class="row">
      <div style="flex:1"><label class="lab">Категорія</label><select id="pp-cat"><option value="">Без категорії</option>${expCats.map(c=>`<option value="${c.id}">${c.icon?c.icon+' ':''}${esc(c.name)}</option>`).join('')}</select></div>
      <div style="flex:1"><label class="lab">Дата</label><input id="pp-date" type="date" value="${todayISO()}"></div>
    </div>
    <div class="muted small">Якщо обрано рахунок — створиться операція «витрата» на суму платежу.</div>
    <div id="pp-close-note" class="small hidden" style="color:var(--green)">Після цього платежу кредит буде закрито.</div>
    <div id="pp-curwarn" class="small hidden" style="color:var(--amber)"></div>
    <button class="btn ghost sm" id="pp-full" style="margin-top:6px">Закрити кредит повністю</button>
  </div>`);
  const $$ = (s) => $(s, body);
  // за замовчуванням — основний рахунок банку; інакше перший рахунок тієї ж валюти
  const primaryOk = bank.primary_account_id && state.accounts.some(a => a.id === bank.primary_account_id);
  if (primaryOk) $$('#pp-acc').value = String(bank.primary_account_id);
  else if (accs.length && accs[0].currency_code === bank.currency) $$('#pp-acc').value = String(accs[0].id);
  if (defCat) $$('#pp-cat').value = String(defCat.id);

  function upd() {
    let amt = Math.max(0, Math.min(round2(num($$('#pp-amt').value)), out));
    $$('#pp-after').textContent = money(round2(out - amt), bank.currency);
    $$('#pp-close-note').classList.toggle('hidden', round2(out - amt) > 0.005);
    const acc = $$('#pp-acc').value ? state.accounts.find(a=>a.id===parseInt($$('#pp-acc').value)) : null;
    const warn = $$('#pp-curwarn');
    if (acc && acc.currency_code !== bank.currency) {
      warn.textContent = `Увага: валюта рахунку (${curSym(acc.currency_code)}) відрізняється від ${curSym(bank.currency)}; суму спишеться як є.`;
      warn.classList.remove('hidden');
    } else warn.classList.add('hidden');
  }
  body.addEventListener('input', upd); body.addEventListener('change', upd); upd();

  function apply(amount, close) {
    amount = Math.min(round2(amount), loanOutstanding(l));
    if (amount <= 0) return;
    l.paid = round2(Math.min(l.principal, (l.paid || 0) + amount));
    if (l.due_date && loanActive(l)) l.due_date = addMonthsISO(l.due_date, 1);   // наступне списання — за місяць
    const accId = $$('#pp-acc').value ? parseInt($$('#pp-acc').value) : null;
    if (accId) {
      const catId = $$('#pp-cat').value ? parseInt($$('#pp-cat').value) : null;
      state.transactions.push({
        id: nextId('tx'), ord: nextOrd(), kind: 'EXPENSE',
        date: $$('#pp-date').value || todayISO(),
        note: 'Платіж за кредитом «' + (l.name || 'Кредит') + '»',
        account_id: accId, category_id: catId, amount, loan_id: l.id,
      });
    }
    save(); close(); render();
  }

  const close = openModal('Платіж — ' + (l.name || 'Кредит'), body, {
    saveLabel: 'Підтвердити платіж',
    onSave: (close) => apply(round2(num($$('#pp-amt').value)), close),
  });
  $$('#pp-full').onclick = () => {
    confirmModal('Закрити кредит повністю?', `Кредит «${l.name || 'Кредит'}»: залишок ${money(loanOutstanding(l), bank.currency)} буде погашено${$$('#pp-acc').value ? ' і створено операцію «витрата»' : ''}.`, { okLabel: 'Закрити кредит' }).then(ok => { if (ok) apply(loanOutstanding(l), close); });
  };
}

function openBankForm(existing) {
  const e = existing || { currency:'UAH', limit:0 };
  const linked = existing ? state.accounts.filter(a => a.bank_id === existing.id) : [];
  const body = el(`<div>
    <div><label class="lab">Назва банку</label><input id="b-name" value="${esc(e.name||'')}" placeholder="напр. ПриватБанк"></div>
    <div class="row">
      <div style="flex:1"><label class="lab">Валюта</label><select id="b-cur">${CURRENCIES.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
      <div style="flex:1"><label class="lab">Кредитний ліміт (максимум)</label><input id="b-limit" inputmode="decimal" value="${e.limit ?? 0}"></div>
    </div>
    <div><label class="lab">Основний рахунок (для платежів за кредитами)</label><select id="b-primary">
      <option value="">— не вказано —</option>
      ${linked.map(a=>`<option value="${a.id}">${esc(a.name)} (${curSym(a.currency_code)})</option>`).join('')}
    </select>
    ${existing && linked.length === 0 ? `<div class="muted small" style="margin-top:4px">Привʼяжіть рахунки до цього банку у вкладці «Рахунки», щоб обрати основний.</div>` : ''}</div>
    <div class="err hidden" id="b-err"></div>
  </div>`);
  $('#b-cur', body).value = e.currency || 'UAH';
  $('#b-primary', body).value = e.primary_account_id ? String(e.primary_account_id) : '';
  openModal(existing?'Редагувати банк':'Новий банк', body, { onSave: (close) => {
    const name = $('#b-name', body).value.trim();
    const err = $('#b-err', body);
    if (!name) { err.textContent = 'Введіть назву'; err.classList.remove('hidden'); return; }
    const rec = { name, currency: $('#b-cur',body).value, limit: round2(num($('#b-limit',body).value)),

    if (existing) Object.assign(existing, rec);
    else { rec.id = nextId('bank'); state.banks.push(rec); }
    save(); close(); render();
  }});

function openLoanForm(existing, presetBankId) {
  if (state.banks.length === 0) { alertModal('Спершу додайте банк.'); return; }
  const e = existing || { bank_id: presetBankId ?? state.banks[0].id, months:12, has_interest:false, rate:0, paid:0, due_date: todayISO() };
  const body = el(`<div>
    <div><label class="lab">Банк</label><select id="l-bank">${state.banks.map(b=>`<option value="${b.id}">${esc(b.name)} (${curSym(b.currency)})</option>`).join('')}</select></div>
    <div><label class="lab">Опис</label><input id="l-name" value="${esc(e.name||'')}" placeholder="напр. Розстрочка на холодильник"></div>

function _recTime(r){ return (r && r.updatedAt) || ''; }
function mergeAll(states){
  states = (states || []).filter(s => s && typeof s === 'object');
  if (!states.length) return null;
  // скалярні поля — зі стану з найновішою загальною міткою (детерміновано)
  const newest = states.slice().sort((a, b) => (a.updatedAt || '') < (b.updatedAt || '') ? 1 : ((a.updatedAt || '') > (b.updatedAt || '') ? -1 : 0))[0];
  const out = JSON.parse(JSON.stringify(newest));
  out.tombstones = {};
  SYNC_TYPES.forEach(type => {
    // найновіший надгробок по кожному id
    const tomb = {};
    states.forEach(s => { const tt = (s.tombstones && s.tombstones[type]) || {}; for (const id in tt) { if (!tomb[id] || tt[id] > tomb[id]) tomb[id] = tt[id]; } });
    // найновіший живий запис по кожному id (ефективна мітка = updatedAt запису або мітка його стану;
    // на рівність — детермінований tie-break за вмістом)
    const live = new Map(), liveT = new Map();
    states.forEach(s => { const su = s.updatedAt || ''; (s[type] || []).forEach(r => { if (!r || r.id == null) return;
      const rt = r.updatedAt || su, et = liveT.get(r.id);
      if (et === undefined || rt > et || (rt === et && _recSig(r) > _recSig(live.get(r.id)))) { live.set(r.id, r); liveT.set(r.id, rt); } }); });
    const arr = []; const keptTomb = {};
    live.forEach((r, id) => { const td = tomb[id];
      if (td && td >= liveT.get(id)) { keptTomb[id] = td; return; }   // надгробок не старіший за live → запис видалено
      arr.push(JSON.parse(JSON.stringify(r))); });
    for (const id in tomb) { if (!live.has(id)) keptTomb[id] = tomb[id]; }   // надгробки без живого запису теж лишаємо
    out[type] = arr; out.tombstones[type] = keptTomb;
  });

  out.cryptoHistory = Object.values(ch).sort((a, b) => a.date < b.date ? -1 : 1).slice(-180);

  ['acc','cat','tx','bank','loan','rec','goal','cry'].forEach(k => { let mx = 1; states.forEach(s => { mx = Math.max(mx, (s.seq && s.seq[k]) || 1); }); out.seq[k] = mx; });

    gcTombstones(merged, Date.now());
    const mergedSig = syncSig(merged);
    if (mergedSig !== localSig) {   // прийшли зміни з інших пристроїв → застосовуємо локально
      cloudBackupSnapshot('Перед синхронізацією');
      Sync.applying = true; state = merged; normalize(); sanitizeImport(state); Sync.applying = false;
      _syncPrev = _snapSig(); persist(); render();
      showToast('🔄 Синхронізовано з іншими пристроями', null, null, 2500);
    } else { state.tombstones = merged.tombstones; persist(); }   // підтягуємо/чистимо надгробки навіть без видимих змін
    // пишемо СВІЙ файл, якщо в ньому ще не той самий стан (щоб інші пристрої побачили наш внесок)
    const mine = downloads.find(d => d && d.f.name === myName);
    Sync.fileId = mine ? mine.f.id : null;
    const myRemoteSig = mine ? syncSig(migrateBackup(mine.j)) : null;
    if (myRemoteSig !== mergedSig) Sync.fileId = await driveUploadNamed(Sync.fileId, myName, cloudPayload());
    // міграція: legacy-файл уже влитий у merged → видаляємо, щоб не плодити гонитву одного файлу
    const legacy = files.find(f => f.name === DRIVE_FILE_NAME && f.name !== myName);
    if (legacy) { try { await driveDeleteFile(legacy.id); } catch (e) {} }
    markSynced();
    setSyncStatus('idle');
    cloudVersionedBackup(10);
  } catch (e) { setSyncStatus('error', e.message || String(e)); }
  finally { Sync.syncing = false; if (Sync.again) { Sync.again = false; setTimeout(() => cloudSync(false), 400); } }
}
function cloudPush(){ return cloudSync(false); }   // вивантаження = повна (але комутативна) синхронізація
// Підключення акаунта з ізоляцією даних: дані кожного Google-акаунта — окремі.
// На спільному пристрої локальні дані НЕ заливаються в чужий акаунт без підтвердження.
async function cloudConnect(){
  if (!syncConfigured()) { alertModal('Спершу вставте Google Client ID у Налаштуваннях.'); return; }
  if (location.protocol.indexOf('http') !== 0) { alertModal('Синхронізація працює лише з https-хостингу (GitHub Pages), не з локального файлу.'); return; }
  try {
    setSyncStatus('connecting');
    Sync.token = null; localStorage.removeItem(TOKEN_KEY); localStorage.removeItem('moneyme.demo.sync.account');   // свіжий вхід — можна обрати акаунт
    await acquireToken('consent');
    const email = await fetchAccountEmail();   // запамʼятовуємо акаунт → подальші оновлення тихі (без вибору)
    if (email) localStorage.setItem('moneyme.demo.sync.account', email);
    const files = await driveListSyncFiles();
    const downloads = await Promise.all(files.map(async f => { try { return migrateBackup(await driveDownload(f.id)); } catch (e) { return null; } }));
    const remoteStates = downloads.filter(Boolean);
    const remoteHasData = remoteStates.some(s => (s.accounts||[]).length || (s.transactions||[]).length);
    const localHasData = !!(((state.accounts||[]).length) || ((state.transactions||[]).length));
    const everConnected = localStorage.getItem('moneyme.demo.sync.everConnected') === '1';
    if (remoteHasData) {
      // на цьому акаунті вже є дані → підтягуємо ЛИШЕ хмарні (локальні з пристрою НЕ заливаємо — ізоляція акаунтів)
      const merged = mergeAll(remoteStates); gcTombstones(merged, Date.now());
      Sync.applying = true; state = merged; normalize(); sanitizeImport(state); Sync.applying = false; _syncPrev = _snapSig(); persist(); render();
    } else if (!everConnected && localHasData) {
      // ПЕРШЕ підключення, акаунт порожній, локально є дані → питаємо власника
      const up = await confirmModal('Перше підключення', 'Акаунт у хмарі порожній. Завантажити поточні дані з цього пристрою у ваш акаунт — чи почати з чистого?', { okLabel: 'Завантажити мої дані', cancelLabel: 'Почати з чистого' });
      if (!up) { state = seed(); normalize(); persist(); _syncPrev = _snapSig(); render(); }
    } else if (localHasData) {
      // зміна акаунта на порожній → беремо «чисто», локальне НЕ заливаємо (щоб дані не перетікали між акаунтами)
      state = seed(); normalize(); persist(); _syncPrev = _snapSig(); render();
    }
    Sync.on = true; localStorage.setItem('moneyme.demo.sync.on', '1'); localStorage.setItem('moneyme.demo.sync.everConnected', '1');
    Sync.fileId = null;
    setSyncStatus('idle');
    await cloudSync(true);   // запише наш device-файл і дозливає (дані вже «наші»)
  } catch (e) { setSyncStatus('error', e.message || String(e)); }
}
async function cloudDisconnect(){
  const wipe = await confirmModal('Відключити Google Drive?', 'Дані у Drive лишаться. Чи очистити локальні дані MoneyMe на цьому пристрої (зручно на спільному пристрої)?', { okLabel: 'Очистити локальні', cancelLabel: 'Лишити дані' });
  if (Sync.token && window.google && google.accounts) { try { google.accounts.oauth2.revoke(Sync.token.access_token, function(){}); } catch (e) {} }
  Sync.on = false; Sync.token = null; Sync.fileId = null;
  localStorage.removeItem('moneyme.demo.sync.on');
  localStorage.removeItem('moneyme.demo.sync.base');
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem('moneyme.demo.sync.account');
  if (wipe) { state = seed(); normalize(); persist(); _syncPrev = _snapSig(); render(); }
  setSyncStatus('off');
}

// PWA: реєстрація service worker + плашка «доступне оновлення» (лише на http/https)
function showUpdateBar(reg){
  if (document.getElementById('upd-bar')) return;
  const bar = el(`<div id="upd-bar" style="position:fixed;left:8px;right:8px;bottom:8px;z-index:10000;background:var(--ink2);color:#fff;padding:10px 14px;border-radius:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,.28)">
    <span class="small">Доступна нова версія MoneyMe</span>
    <span style="display:flex;gap:8px"><button class="btn primary sm" id="upd-now">Оновити</button><button class="btn sm" id="upd-later">Пізніше</button></span></div>`);
  document.body.appendChild(bar); translateTree(bar);
  $('#upd-now', bar).onclick = () => {
    bar.remove();
    if (reg.waiting) { navigator.serviceWorker.addEventListener('controllerchange', () => location.reload(), { once: true }); reg.waiting.postMessage('skipWaiting'); }
    else location.reload();
  };
  $('#upd-later', bar).onclick = () => bar.remove();
}
if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('sw.js');
      if (reg.waiting && navigator.serviceWorker.controller) showUpdateBar(reg);
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing; if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) showUpdateBar(reg);
        });
      });
      setInterval(() => reg.update().catch(() => {}), 60 * 60 * 1000);   // перевіряти оновлення раз на годину
    } catch (e) {}
  });
}
// Автосинхронізація при старті/поверненні в застосунок/появі мережі.
// Усі ці тригери — ФОНОВІ: cloudSync(false) синхронізує лише за наявності збереженого
// токена і НІКОЛИ не відкриває вікно входу Google. Вікно зʼявляється тільки коли користувач
// сам тисне «Підключити» чи «Синхронізувати зараз».
if (Sync.on && syncAvailable()) { setSyncStatus('idle'); cloudSync(false); }
else if (!navigator.onLine && Sync.on) { setSyncStatus('offline'); }
window.addEventListener('online', () => { if (Sync.on && syncAvailable()) cloudSync(false); });
window.addEventListener('offline', () => { if (Sync.on) setSyncStatus('offline'); });
document.addEventListener('visibilitychange', () => { if (!document.hidden && Sync.on && syncAvailable() && navigator.onLine) cloudSync(false); });
// Періодична фонова синхронізація (раз на ~90 с), поки вкладка активна — щоб зміни з інших пристроїв
// підтягувались самі, без ручного «Синхронізувати».
setInterval(() => { if (Sync.on && syncAvailable() && navigator.onLine && !document.hidden) cloudSync(false); }, 90 * 1000);
</script>
