<!doctype html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<!-- Content Security Policy: головне — connect-src обмежує, куди можуть піти дані (захист від витоку
     при можливому XSS). script/style 'unsafe-inline' потрібні для single-file застосунку. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; manifest-src 'self'; worker-src 'self'; img-src 'self' data: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com https://www.gstatic.com; connect-src 'self' https://www.googleapis.com https://accounts.google.com https://oauth2.googleapis.com https://api.coingecko.com https://bank.gov.ua; frame-src https://accounts.google.com; form-action 'self'" />
<title>MoneyMe — облік фінансів</title>
<meta name="description" content="Персональний облік витрат і доходів. Працює офлайн, синхронізація через Google Drive." />
<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#3b82f6" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="MoneyMe" />
<style>
  :root {
    --bg: #f1f5f9; --card: #fff; --ink: #1e293b; --muted: #64748b; --line: #e2e8f0;
    --ink2: #0f172a; --green: #16a34a; --red: #dc2626; --amber: #d97706; --accent: #0f172a;
    --hover: #f1f5f9; --chip: #e2e8f0; --chiphover: #cbd5e1; --accenthover: #334155;
    --input: #fff; --inputline: #cbd5e1; --headbg: rgba(255,255,255,.85);
    --softline: #f1f5f9; --dangerbg: #fee2e2; --tip: #eff6ff;
  }
  html[data-theme="dark"] {
    --bg: #0b1220; --card: #131c2e; --ink: #e5e9f0; --muted: #94a3b8; --line: #273043;
    --ink2: #f1f5f9; --green: #34d399; --red: #f87171; --amber: #fbbf24; --accent: #6366f1;
    --hover: #1e2a3f; --chip: #1e2a3f; --chiphover: #273043; --accenthover: #4f46e5;
    --input: #0f1726; --inputline: #334155; --headbg: rgba(13,20,34,.88);
    --softline: #1b2436; --dangerbg: #3b1d1d; --tip: #16233b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: 'Segoe UI', system-ui, Roboto, sans-serif; font-size: 15px;
  }
  button { font-family: inherit; cursor: pointer; }
  .wrap { max-width: 920px; margin: 0 auto; padding: 16px 16px 60px; }

  header {
    position: sticky; top: 0; z-index: 30; background: var(--headbg);
    backdrop-filter: blur(8px); border-bottom: 1px solid var(--line);
  }
  .nav { max-width: 1180px; margin: 0 auto; display: flex; align-items: center; gap: 3px;
    padding: 10px 16px; overflow-x: auto; }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 18px; margin-right: 14px; white-space: nowrap; }
  .brand .logo { width: 30px; height: 30px; border-radius: 9px; object-fit: cover; display: block; }
  .nav a { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 10px; color: var(--muted); text-decoration: none; font-weight: 500; white-space: nowrap; font-size: 14px; }
  .nav a.active { background: var(--accent); color: #fff; }
  /* Опція: меню внизу екрана (data-nav="bottom" на <html>) */
  html[data-nav="bottom"] header { position: fixed; top: auto; bottom: 0; left: 0; right: 0; border-bottom: none; border-top: 1px solid var(--line); padding-bottom: env(safe-area-inset-bottom, 0px); }
  html[data-nav="bottom"] .wrap { padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px)); }
  html[data-nav="bottom"] #toasts { bottom: calc(86px + env(safe-area-inset-bottom, 0px)); }
  .nav a:hover:not(.active) { background: var(--hover); }
  .nav a .ni { font-size: 15px; line-height: 1; display: inline-flex; align-items: center; }
  .nav a .ni svg { width: 1.35em; height: 1.35em; display: block; }
  .navmore-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 10px; color: var(--muted); background: none; border: none; cursor: pointer; font: inherit; font-weight: 500; font-size: 14px; white-space: nowrap; }
  .navmore-btn .ni { font-size: 15px; line-height: 1; display: inline-flex; align-items: center; }
  .navmore-btn .ni svg { width: 1.35em; height: 1.35em; display: block; }
  .navmore-btn:hover:not(.active) { background: var(--hover); }
  .navmore-btn.active { background: var(--accent); color: #fff; }
  .nav .nav-end { margin-left: auto; }   /* «Налаштування» — у правий край */
  .navlang { margin-left: auto; border: 1px solid var(--line); background: transparent; color: var(--muted);
    border-radius: 8px; padding: 5px 9px; font-weight: 700; font-size: 12px; cursor: pointer; white-space: nowrap; flex: 0 0 auto; }
  .navlang:hover { background: var(--hover); }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  h1 { font-size: 22px; margin: 0 0 14px; }
  h2 { font-size: 16px; margin: 0; }
  .muted { color: var(--muted); }
  .small { font-size: 13px; }
  .row { display: flex; gap: 12px; }
  .grid { display: grid; gap: 12px; }
  .tabnum { font-variant-numeric: tabular-nums; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    border: 0; border-radius: 11px; padding: 9px 15px; font-size: 14px; font-weight: 600; background: var(--chip); color: var(--ink); }
  .btn:hover { background: var(--chiphover); }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accenthover); }
  .btn.ghost { background: transparent; color: var(--muted); }
  .btn.ghost:hover { background: var(--hover); }
  .btn.danger { background: transparent; color: var(--red); }
  .btn.danger:hover { background: var(--dangerbg); }
  .btn.sm { padding: 5px 9px; font-size: 13px; border-radius: 8px; }

  label.lab { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin: 0 0 4px; }
  input, select { width: 100%; border: 1px solid var(--inputline); border-radius: 11px; padding: 9px 11px; font-size: 14px; font-family: inherit; outline: none; background: var(--input); color: var(--ink); }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  input[type=date]::-webkit-calendar-picker-indicator { filter: var(--cal-filter, none); }
  html[data-theme="dark"] { --cal-filter: invert(1) brightness(1.4); }

  .quick { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
  .quick button { display: flex; align-items: center; justify-content: center; gap: 9px; border: 0; border-radius: 14px; padding: 13px 14px; font-size: 15px; font-weight: 700; color: #fff; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.06); transition: filter .15s ease, transform .04s ease; }
  .quick button:hover { filter: brightness(1.05); }
  .quick button:active { transform: translateY(1px); }
  .quick .exp { background: #c0474c; background: color-mix(in srgb, var(--red) 74%, #64748b); }      /* приглушений червоний */
  .quick .inc { background: #2f9159; background: color-mix(in srgb, var(--green) 74%, #64748b); }    /* приглушений зелений */
  .quick .dot { width: 24px; height: 24px; border-radius: 999px; background: rgba(255,255,255,.22); display: grid; place-items: center; color: #fff; font-size: 18px; font-weight: 800; line-height: 1; }
  .quick .dot svg { width: 15px; height: 15px; display: block; }
  .ic { width: 1.15em; height: 1.15em; display: inline-block; vertical-align: -0.18em; flex: 0 0 auto; }
  .btn.sm .ic, .btn.ghost.sm .ic, .btn.danger.sm .ic { width: 1.05em; height: 1.05em; }
  .txicon .ic { width: 1.05em; height: 1.05em; vertical-align: middle; }
  /* Друк звіту в самому додатку (без нового вікна — інакше на iPhone не повернутись) */
  #print-area { display: none; }
  @media print {
    body > *:not(#print-area) { display: none !important; }
    #print-area { display: block !important; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
    header { display: none !important; }
  }
  .quick.sm button { padding: 11px 12px; font-size: 14px; }
  .quick.sm .dot { width: 22px; height: 22px; font-size: 16px; }

  .accgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  /* заголовок секції з підказкою праворуч */
  .sechead { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 8px; }
  .sechead h2 { margin: 0; }
  .sechead .hint { text-align: right; }
  .acc { border-top: 4px solid #999; padding: 14px; border-radius: 16px; background: var(--card); border: 1px solid var(--line); user-select: none; touch-action: pan-y; }
  .acc .grip { touch-action: none; }   /* перетягування лише за ручку ⠿ */
  .acc.dragover { box-shadow: 0 0 0 2px var(--accent); }
  .acc.dragging { opacity: .4; }
  .acc .top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .acc .name { font-weight: 600; font-size: 14px; min-width: 0; overflow-wrap: anywhere; }
  .acc .type { font-size: 10px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); flex: 0 0 auto; white-space: nowrap; }
  .acc .bal { margin-top: 10px; font-size: 22px; font-weight: 800; }
  .acc.compact { padding: 12px 14px; }
  .acc.compact .bal { margin-top: 6px; font-size: 20px; }

  .txrow { display: flex; align-items: center; gap: 12px; padding: 10px 4px; border-bottom: 1px solid var(--softline); }
  .txrow:last-child { border-bottom: 0; }
  .txicon { width: 36px; height: 36px; border-radius: 999px; display: grid; place-items: center; font-size: 15px; flex: 0 0 auto; }
  .txmain { flex: 1; min-width: 0; }
  .txtitle { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txsub { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txamt { font-weight: 700; font-size: 14px; }

  .pill { display: inline-flex; background: var(--chip); border-radius: 11px; padding: 3px; gap: 3px; }
  .pill button { border: 0; background: transparent; padding: 6px 14px; border-radius: 9px; font-weight: 600; font-size: 14px; color: var(--muted); }
  .pill button.on { background: var(--card); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.08); }

  .sumcards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 12px; }
  .sumcard { padding: 14px; }
  .sumcard .k { font-size: 12px; color: var(--muted); }
  .sumcard .v { font-size: 20px; font-weight: 800; margin-top: 3px; }

  .draggable { cursor: grab; }
  .draggable:active { cursor: grabbing; }
  .dragging { opacity: .4; }
  .card.dragover { box-shadow: 0 0 0 2px var(--accent); }
  .txrow.dragover { background: var(--tip); border-radius: 8px; }
  .grip { color: var(--inputline); font-size: 18px; cursor: grab; flex: 0 0 auto; padding: 2px 2px; }
  .draghandle { touch-action: none; cursor: grab; }
  .draghandle:active { cursor: grabbing; }
  .bar { height: 7px; background: var(--chip); border-radius: 999px; overflow: hidden; }
  .bar > i { display: block; height: 100%; background: var(--accent); }
  .curchip { border: 1px solid var(--line); background: var(--card); color: var(--muted); border-radius: 999px; padding: 3px 11px; font-size: 12px; font-weight: 600; }
  .curchip:hover { background: var(--hover); }
  .curchip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  /* плитки вибору рахунків (форма цілі) */
  .accgridpick { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 7px; }
  .accpick { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border: 1px solid var(--inputline); border-radius: 10px; background: var(--input); cursor: pointer; font-size: 13px; min-width: 0; user-select: none; text-align: left; }
  .accpick:hover { border-color: var(--accent); }
  .accpick.on { border-color: var(--accent); background: var(--hover); }
  .accpick .tick { flex: 0 0 auto; width: 17px; height: 17px; border-radius: 5px; border: 1.5px solid var(--inputline); display: grid; place-items: center; font-size: 11px; line-height: 1; color: #fff; }
  .accpick.on .tick { background: var(--accent); border-color: var(--accent); }
  .accpick .nm { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .accpick .cur { flex: 0 0 auto; color: var(--muted); font-size: 11px; padding: 1px 6px; background: var(--chip); border-radius: 6px; }
  .crsym { width: 24px; height: 24px; border-radius: 50%; background: var(--chip); color: var(--muted); display: inline-grid; place-items: center; font-size: 9px; font-weight: 700; flex: 0 0 auto; }
  .notice { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; border-radius: 12px; padding: 10px 12px; font-size: 13px; }
  html[data-theme="dark"] .notice { background: #2a230d; border-color: #5b4a13; color: #fcd34d; }
  .ctxmenu { position: fixed; z-index: 60; min-width: 190px; background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,.28); padding: 6px; }
  .ctxmenu .ci { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border-radius: 9px;
    font-size: 14px; cursor: pointer; }
  .ctxmenu .ci:hover { background: var(--hover); }
  .ctxmenu .ci .cdot { width: 22px; height: 22px; border-radius: 999px; display: grid; place-items: center;
    color: #fff; font-weight: 700; font-size: 15px; line-height: 1; flex: 0 0 auto; }
  .ctxmenu .ci .cdot .ic { width: 14px; height: 14px; vertical-align: 0; }
  .ctxmenu .chead { padding: 6px 11px 4px; font-size: 12px; color: var(--muted); font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ctxmenu .sep { height: 1px; background: var(--line); margin: 4px 6px; }

  /* Кастомний select — кнопка як інпут + випадайка в стилі контекстного меню (замість потворного нативного) */
  .selbtn { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 8px;
    border: 1px solid var(--inputline); border-radius: 11px; padding: 9px 11px; font-size: 14px; font-family: inherit;
    background: var(--input); color: var(--ink); cursor: pointer; text-align: left; }
  .selbtn .seltxt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .selbtn .selcar { color: var(--muted); flex: 0 0 auto; font-size: 11px; }
  .selbtn:disabled { opacity: .6; cursor: default; }
  .selmenu { position: fixed; z-index: 70; background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    box-shadow: 0 12px 34px rgba(0,0,0,.32); padding: 6px; max-height: 60vh; overflow-y: auto; }
  .selmenu .ci { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 11px 12px;
    border-radius: 9px; font-size: 15px; cursor: pointer; }
  .selmenu .ci:hover, .selmenu .ci.sel { background: var(--hover); }
  .selmenu .ci.sel { font-weight: 600; }
  .selmenu .ci .cichk { color: var(--accent); flex: 0 0 auto; }
  .selmenu .chead { padding: 8px 12px 4px; font-size: 12px; color: var(--muted); font-weight: 600; }

  /* Поле вводу суми з кнопкою-калькулятором */
  .calcfield { position: relative; display: block; }
  .calcfield > input { width: 100%; padding-right: 38px; }
  .calcbtn { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); display: flex; align-items: center;
    justify-content: center; width: 28px; height: 28px; border: none; background: transparent; color: var(--muted);
    cursor: pointer; border-radius: 8px; padding: 0; }
  .calcbtn:hover { color: var(--accent); background: var(--hover); }
  .calcbtn .ic { width: 18px; height: 18px; }
  /* Клавіатура калькулятора */
  .calcdisp { font-size: 15px; color: var(--muted); min-height: 20px; text-align: right; word-break: break-all; line-height: 1.3; }
  .calcres { font-size: 30px; font-weight: 700; text-align: right; word-break: break-all; line-height: 1.15; margin-top: 2px; }
  .calcpad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; }
  .calckey { border: 1px solid var(--inputline); background: var(--input); color: var(--ink); border-radius: 12px;
    padding: 14px 0; font-size: 19px; font-weight: 600; cursor: pointer; font-family: inherit; user-select: none; }
  .calckey:active { background: var(--hover); }
  .calckey.op { color: var(--accent); }
  .calckey.act { background: var(--hover); }
  .calckey.eq { background: var(--accent); color: #fff; border-color: var(--accent); }

  .swatches { display: flex; flex-wrap: wrap; gap: 8px; }
  .swatch { width: 28px; height: 28px; border-radius: 999px; border: 0; }
  .swatch.sel { box-shadow: 0 0 0 2px var(--card), 0 0 0 4px var(--accent); }

  /* modal */
  .overlay { position: fixed; inset: 0; background: rgba(15,23,42,.5); display: grid; place-items: center; padding: 16px; z-index: 50; }
  .modal { width: 100%; max-width: 430px; max-height: 90vh; overflow-y: auto; padding: 20px; box-shadow: 0 16px 48px rgba(0,0,0,.34); }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes sheetDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
  .overlay.topsheet { align-items: start; }   /* кріпимо модалку зверху — щоб при зміні висоти вмісту вона не «стрибала» */
  .modal .mhead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .modal .mhead h2 { font-size: 18px; }
  .modal .x { border: 0; background: transparent; font-size: 22px; color: var(--muted); line-height: 1; }
  .modal .mbody > * + * { margin-top: 12px; }
  .mfoot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  .preview { border: 1px solid var(--line); border-radius: 12px; padding: 12px; font-size: 14px; }
  .preview .pl { display: flex; justify-content: space-between; }
  .preview .pl + .pl { margin-top: 4px; }
  .err { color: var(--red); font-size: 13px; }
  .empty { text-align: center; color: var(--muted); padding: 28px 0; }
  .legend { list-style: none; margin: 0; padding: 0; font-size: 14px; }
  .legend li { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
  .legend .ld { width: 12px; height: 12px; border-radius: 999px; flex: 0 0 auto; }
  .legend .ln { flex: 1; }
  .ln { min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hidden { display: none; }

  /* тости (скасування) */
  #toasts { position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%); z-index: 80;
    display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
  .toast { pointer-events: auto; display: flex; align-items: center; gap: 14px; background: var(--ink2);
    color: #fff; border-radius: 12px; padding: 10px 14px; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,.25);
    animation: toastIn .18s ease; max-width: 92vw; }
  html[data-theme="dark"] .toast { background: #25324a; }
  .toast button { border: 0; background: transparent; color: #7dd3fc; font-weight: 700; cursor: pointer; font-size: 14px; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* міні прогрес-бар бюджету (кольоровий) */
  .pbar { height: 8px; background: var(--chip); border-radius: 999px; overflow: hidden; }
  .pbar > i { display: block; height: 100%; border-radius: 999px; }

  /* вибір емодзі */
  .emojigrid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; max-height: 150px;
    overflow-y: auto; border: 1px solid var(--line); border-radius: 10px; padding: 6px; background: var(--input); }
  .emojigrid button { border: 0; background: transparent; font-size: 20px; padding: 4px 0; border-radius: 8px; cursor: pointer; line-height: 1.2; }
  .emojigrid button:hover { background: var(--hover); }
  .emojigrid button.sel { background: var(--accent); }

  /* меню без прокрутки: щойно бракує місця — лише іконки */
  @media (max-width: 1140px) {
    .nav a .nt, .navmore-btn .nt { display: none; }
    .brand .bt { display: none; }
    .nav a { padding: 7px 10px; }
    .nav a .ni { font-size: 18px; }
  }

  /* адаптив під телефон */
  @media (max-width: 560px) {
    body { font-size: 14px; }
    .wrap { padding: 12px 10px 70px; }
    .nav { padding: 11px 6px; gap: 1px; }
    .brand { display: none; }   /* на телефоні логотип ховаємо — лишаємо лише іконки розділів */
    .nav a { padding: 10px 6px; font-size: 13px; }
    .nav a .nt, .navmore-btn .nt { display: none; }
    .nav a .ni { font-size: 19px; }
    .navmore-btn { padding: 10px 6px; }
    .navmore-btn .ni { font-size: 19px; }

// Стан синхронізації з Google Drive. Оголошуємо рано, бо save() звертається до Sync
// (повна логіка — у блоці «Синхронізація з Google Drive» нижче). Функції синхронізації —
// це function-декларації, тож гарантовано доступні через підняття (hoisting).
const Sync = {
  on: localStorage.getItem('moneyme.demo.sync.on') === '1',
  status: 'off', detail: '', applying: false,
  token: null, tokenClient: null, fileId: null, gisLoading: null,
  pending: false, pushTimer: null,
  last: localStorage.getItem('moneyme.demo.sync.last') || null,
};
// ——— Синхронізація: per-record LWW (Last-Write-Wins) + надгробки видалень ———
// Кожен запис має updatedAt; видалення лишає «надгробок» {id: updatedAt}. Злиття бере найновіший
// запис по кожному id (надгробок виграє, якщо не старіший за live) — комутативно, не залежить від порядку.
const SYNC_TYPES = ['accounts','categories','transactions','banks','loans','recurring','goals','crypto'];
function deviceId(){ let d = localStorage.getItem('moneyme.demo.sync.deviceId'); if (!d) { d = 'd' + Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); localStorage.setItem('moneyme.demo.sync.deviceId', d); } return d; }
function deviceFileName(){ return 'moneyme-' + deviceId() + '.json'; }
const TOMBSTONE_TTL = 90 * 24 * 3600 * 1000;   // надгробки живуть ~90 днів, далі чистяться
// JSON запису без updatedAt — для виявлення реальних змін (а не лише оновлення мітки часу).
function _recSig(r){ if (!r || typeof r !== 'object') return JSON.stringify(r); const { updatedAt, ...rest } = r; return JSON.stringify(rest); }
let _syncPrev = null;   // знімок { type: Map(id -> _recSig) } на момент останнього save — для diff
function _snapSig(){ const m = {}; SYNC_TYPES.forEach(t => { const mm = new Map(); (state[t] || []).forEach(r => { if (r && r.id != null) mm.set(r.id, _recSig(r)); }); m[t] = mm; }); return m; }
// Проставляє updatedAt на нові/змінені записи та надгробки на видалені (порівнюючи з _syncPrev). Лише локальні правки.
function stampLocalChanges(){
  const now = new Date().toISOString();
  if (!state.tombstones) state.tombstones = {};
  SYNC_TYPES.forEach(t => {
    if (!state.tombstones[t]) state.tombstones[t] = {};
    const prev = _syncPrev ? _syncPrev[t] : new Map();
    const cur = new Set();
    (state[t] || []).forEach(r => { if (!r || r.id == null) return; cur.add(r.id);
      const sig = _recSig(r), p = prev.get(r.id);
      if (p === undefined || p !== sig || !r.updatedAt) r.updatedAt = now;   // новий / змінений / без мітки
      if (state.tombstones[t][r.id]) delete state.tombstones[t][r.id];       // воскрес — прибираємо надгробок
    });
    prev.forEach((_, id) => { if (!cur.has(id) && !state.tombstones[t][id]) state.tombstones[t][id] = now; });   // зник → надгробок
  });
  _syncPrev = _snapSig();
}

// Криптовалюти: символ → CoinGecko id (для цін у USD). Оголошуємо рано — потрібні в normalize().
const CRYPTO_CG = {
  '1INCH':'1inch','ADA':'cardano','APT':'aptos','ARB':'arbitrum','AUDIO':'audius','BNB':'binancecoin',
  'BTC':'bitcoin','ETC':'ethereum-classic','ETH':'ethereum','IVPAY':'ivendpay','LTC':'litecoin','NOT':'notcoin',
  'OP':'optimism','POL':'polygon-ecosystem-token','SOL':'solana','SUPRA':'supra','TON':'the-open-network',
  'TRX':'tron','USDC':'usd-coin','USDT':'tether','WBT':'whitebit','WLKN':'walken','XCH':'chia'
};
let state = load();
normalize();
_syncPrev = _snapSig();   // базовий знімок для виявлення локальних змін у save()

// Гарантуємо наявність усіх полів (міграція старих даних до поточної схеми).
function normalize() {
  let changed = false;
  (state.transactions || []).forEach(t => { if (typeof t.ord !== 'number') { t.ord = t.id; changed = true; } });
  if (!state.banks) { state.banks = []; changed = true; }
  if (!state.loans) { state.loans = []; changed = true; }
  if (!state.recurring) { state.recurring = []; changed = true; }   // регулярні платежі
  if (!state.goals) { state.goals = []; changed = true; }           // цілі накопичення
  if (state.crypto === undefined) { state.crypto = []; changed = true; }   // крипто-портфель (порожній за замовчуванням)
  if (!Array.isArray(state.cryptoHistory)) { state.cryptoHistory = []; changed = true; }   // історія вартості портфеля
  if (!state.tombstones || typeof state.tombstones !== 'object') { state.tombstones = {}; changed = true; }   // надгробки видалень для синху (per-record LWW)
  SYNC_TYPES.forEach(t => { if (!state.tombstones[t]) { state.tombstones[t] = {}; changed = true; } });
  // міграція: старим записам без updatedAt даємо мітку всього стану (щоб «новіший пристрій виграє» при злитті)
  { const baseUpd = state.updatedAt || '2020-01-01T00:00:00.000Z'; SYNC_TYPES.forEach(t => (state[t] || []).forEach(r => { if (r && r.id != null && !r.updatedAt) { r.updatedAt = baseUpd; changed = true; } })); }
  if (!state.seq) { state.seq = { acc:1, cat:1, tx:1, bank:1, loan:1, rec:1, goal:1, cry:1 }; changed = true; }
  ['acc','cat','tx','bank','loan','rec','goal','cry'].forEach(k => { if (state.seq[k] == null) { state.seq[k] = (k==='cry') ? ((state.crypto||[]).reduce((m,h)=>Math.max(m,h.id||0),0)+1) : 1; changed = true; } });
  (state.categories || []).forEach(c => {
    if (c.budget === undefined && c.kind === 'EXPENSE') { c.budget = 0; changed = true; }
    if (c.kind === 'EXPENSE' && !c.budget_period) { c.budget_period = 'monthly'; changed = true; }
  });
  if (state.version !== SCHEMA_VERSION) { state.version = SCHEMA_VERSION; changed = true; }
  // ВАЖЛИВО: міграція/дефолти схеми зберігаються БЕЗ оновлення updatedAt (persist, не save),
  // щоб «технічні» зміни не вигравали конфлікт синхронізації над реальними правками.
  if (changed) persist();
}

// Нормалізація апострофів (ʼ ’ ‘ → '), щоб збіги не залежали від варіанту символу.
const APO = /[ʼ’‘′]/g;
const I18N_EN_N = {}; for (const k in I18N_EN) I18N_EN_N[k.replace(APO, "'")] = I18N_EN[k];
const I18N_PARTIAL_N = I18N_PARTIAL.map(([u, e]) => [u.replace(APO, "'"), e]).sort((a, b) => b[0].length - a[0].length);   // найдовші збіги першими (специфічні перед загальними)
function tStr(s){ // переклад рядка (точний збіг або підрядкові заміни)
  if (s == null) return s;
  const norm = s.replace(APO, "'");
  const trimmed = norm.trim();
  if (I18N_EN_N[trimmed] !== undefined) return s.replace(s.trim(), I18N_EN_N[trimmed]);
  let v = norm, changed = false;
  for (const [u, en] of I18N_PARTIAL_N) if (v.indexOf(u) >= 0) { v = v.split(u).join(en); changed = true; }
  return changed ? v : s;
}
function translateTree(root){
  if (!root || lang !== 'en') return;
  const w = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const nodes = []; let n; while (n = w.nextNode()) nodes.push(n);
  nodes.forEach(t => { if (t.nodeValue.trim()) { const r = tStr(t.nodeValue); if (r !== t.nodeValue) t.nodeValue = r; } });
  root.querySelectorAll('[placeholder]').forEach(e => { const r = tStr(e.getAttribute('placeholder')); if (r !== e.getAttribute('placeholder')) e.setAttribute('placeholder', r); });
  root.querySelectorAll('[title]').forEach(e => { const r = tStr(e.getAttribute('title')); if (r !== e.getAttribute('title')) e.setAttribute('title', r); });
  root.querySelectorAll('option').forEach(o => { const r = tStr(o.textContent); if (r !== o.textContent) o.textContent = r; });
}

// ——— Шифрування бекап-файлу паролем (WebCrypto: AES-GCM + PBKDF2) ———
function _b64(u8){ let s = ''; u8.forEach(b => s += String.fromCharCode(b)); return btoa(s); }
function _ub64(s){ const bin = atob(s); const u = new Uint8Array(bin.length); for (let i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i); return u; }
async function _deriveKey(password, salt, iter){
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: iter, hash: 'SHA-256' }, km, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
}
async function encryptBackup(obj, password){
  const salt = crypto.getRandomValues(new Uint8Array(16)), iv = crypto.getRandomValues(new Uint8Array(12)), iter = 210000;
  const key = await _deriveKey(password, salt, iter);
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(JSON.stringify(obj)));
  return { app: 'MoneyMe', enc: 'AES-GCM', kdf: 'PBKDF2-SHA256', iter, salt: _b64(salt), iv: _b64(iv), data: _b64(new Uint8Array(ct)) };
}
async function decryptBackup(env, password){
  const key = await _deriveKey(password, _ub64(env.salt), env.iter || 210000);
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: _ub64(env.iv) }, key, _ub64(env.data));
  return JSON.parse(new TextDecoder().decode(pt));
}
function isEncryptedBackup(o){ return !!(o && o.enc === 'AES-GCM' && o.data && o.salt && o.iv); }
async function downloadBackupEncrypted(){
  if (!(window.crypto && crypto.subtle)) { alertModal('Шифрування працює лише на https-сайті (не з файлу, відкритого подвійним кліком).'); return; }
  const pw = await promptModal('Зашифрований експорт', 'Пароль для бекапу (запамʼятайте — без нього файл не відкрити!):', '');
  if (pw == null) return;
  if (!pw || pw.length < 4) { alertModal('Пароль закороткий — мінімум 4 символи.'); return; }
  try {

    a.href = url; a.download = `moneyme-backup-${todayISO()}.mmenc`; a.click(); URL.revokeObjectURL(url);

//==================== Курси валют (НБУ, раз на день) ====================
const RATES_KEY = 'moneyme.demo.rates';
let ratesCache = loadRates();
function loadRates() {
  try { const r = JSON.parse(localStorage.getItem(RATES_KEY)); if (r && r.rates) return r; } catch (e) {}
  return { date: '', base: 'UAH', rates: { UAH: 1 }, error: null };
}
// Курс: скільки UAH за 1 одиницю валюти (UAH = 1). null, якщо курсу немає.
function rateFor(cur) {
  if (cur === 'UAH') return 1;
  const r = ratesCache.rates ? ratesCache.rates[cur] : null;
  return (typeof r === 'number' && r > 0) ? r : null;
}
function toUAH(amount, cur) { const r = rateFor(cur); return r == null ? null : amount * r; }

// Орієнтація крос-курсу для зручного вводу: «1 strong = X weak». Грн завжди weak (тобто «X грн за 1 валюту»).
function rateOrientation(F, T) {
  if (F === 'UAH' && T !== 'UAH') return { strong: T, weak: F };
  if (T === 'UAH' && F !== 'UAH') return { strong: F, weak: T };
  const rF = rateFor(F), rT = rateFor(T);
  if (rF != null && rT != null) return rF >= rT ? { strong: F, weak: T } : { strong: T, weak: F };
  return { strong: T, weak: F };
}
// Курс за замовчуванням (X = скільки weak за 1 strong) з даних НБУ; null, якщо невідомо.
function defaultCrossX(F, T) {
  const { strong, weak } = rateOrientation(F, T);
  const rs = rateFor(strong), rw = rateFor(weak);
  if (rs != null && rw != null && rw > 0) return Math.round(rs / rw * 10000) / 10000;
  return null;
}
// Перетворення введеного X у множник: toAmount = amount(F) * mult (результат у T).
function xToMultiplier(F, T, X) {
  if (!(X > 0)) return 1;
  const { strong } = rateOrientation(F, T);
  return F === strong ? X : 1 / X;
}
// Зворотне: з множника отримати X (для редагування переказу).
function multiplierToX(F, T, mult) {
  const { strong } = rateOrientation(F, T);
  if (!(mult > 0)) return defaultCrossX(F, T) || 1;
  const x = F === strong ? mult : 1 / mult;
  return Math.round(x * 10000) / 10000;
}

const CRYPTO_PRICES_KEY = 'moneyme.demo.cryptoPrices';

function loadCryptoPrices(){ try { const r = JSON.parse(localStorage.getItem(CRYPTO_PRICES_KEY)); if (r && r.coins) return r; } catch (e) {} return { date:'', coins:{}, error:null }; }
function cryptoMeta(h){ return (h && h.cg && cryptoCache.coins) ? cryptoCache.coins[h.cg] : null; }
// Ціна 1 одиниці у USD: з кешу за CoinGecko id, або ручна price; null — невідома.
function cryptoUnitUsd(h){
  const m = cryptoMeta(h);
  if (m && typeof m.usd === 'number' && m.usd >= 0) return m.usd;
  return (typeof h.price === 'number' && h.price >= 0) ? h.price : null;
}
function cryptoImg(h){ const m = cryptoMeta(h); return m && m.img ? m.img : null; }
function cryptoChange24(h){ const m = cryptoMeta(h); return m && typeof m.chg === 'number' ? m.chg : null; }
function cryptoValueUsd(h){ const p = cryptoUnitUsd(h); return p == null ? 0 : (h.amount || 0) * p; }
function cryptoTotalUsd(){ return round2((state.crypto || []).reduce((s, h) => s + cryptoValueUsd(h), 0)); }
function cryptoTotalUAH(){ const r = rateFor('USD'); return r == null ? null : round2(cryptoTotalUsd() * r); }
function hasCrypto(){ return (state.crypto || []).length > 0; }
// Усі біржі/гаманці зі збережених активів (для підказки при додаванні наступного).
function cryptoExchanges(){ const s = new Set(); (state.crypto || []).forEach(h => (h.exchanges || []).forEach(x => s.add(typeof x === 'string' ? x : x.name))); return [...s].filter(Boolean).sort((a, b) => a.localeCompare(b, 'uk')); }
// Знімок вартості портфеля на сьогодні (для історії). Один запис на день.
function recordCryptoSnapshot(){
  if (!hasCrypto()) return;
  const v = cryptoTotalUsd(); if (!(v > 0)) return;
  if (!Array.isArray(state.cryptoHistory)) state.cryptoHistory = [];
  const t = todayISO(); const last = state.cryptoHistory[state.cryptoHistory.length - 1];
  if (last && last.date === t) last.usd = v;
  else state.cryptoHistory.push({ date: t, usd: v });
  state.cryptoHistory = state.cryptoHistory.slice(-180);   // до ~півроку щоденних точок
  persist();   // без оновлення updatedAt — щоб знімок цін не перезаписував реальні правки при синху
}
// Перевірка цінових алертів активів. Тротлінг: один раз на день на актив+напрям;
// якщо ціна повернулась за поріг — алерт зможе спрацювати знову.
function checkCryptoAlerts(){
  const today = todayISO();
  let fired = {}; try { fired = JSON.parse(localStorage.getItem('moneyme.demo.cryptoAlerts') || '{}'); } catch (e) {}
  const hits = [];
  (state.crypto || []).forEach(h => {
    const p = cryptoUnitUsd(h); if (p == null) return;
    [['above', h.alertAbove], ['below', h.alertBelow]].forEach(([dir, target]) => {
      if (typeof target !== 'number' || target <= 0) return;
      const crossed = dir === 'above' ? p >= target : p <= target;
      const key = h.id + ':' + dir;
      if (crossed) { if (fired[key] !== today) { hits.push(`${h.symbol} ${dir === 'above' ? '≥' : '≤'} ${money(target, 'USD')} (зараз ${money(p, 'USD')})`); fired[key] = today; } }
      else if (fired[key]) { delete fired[key]; }
    });
  });
  try { localStorage.setItem('moneyme.demo.cryptoAlerts', JSON.stringify(fired)); } catch (e) {}
  if (hits.length) showToast('🔔 Крипто-алерт: ' + hits.join('; '), 'Крипто', () => navigate('crypto'), 10000);
}

// Колізійно-стійкі id (час·1000 + random): унікальні між пристроями — щоб merge не плутав
// дві різні нові операції з однаковим послідовним номером. Лишаються числовими (форми роблять parseInt).
let _lastGenId = 0;
function nextId(kind){ if (state.seq) state.seq[kind] = (state.seq[kind] || 1) + 1; let v = Date.now() * 1000 + Math.floor(Math.random() * 1000); if (v <= _lastGenId) v = _lastGenId + 1; _lastGenId = v; save(); return v; }

//==================== Перетягування для зміни порядку ====================
// Робить елемент draggable; при киданні на інший такого ж типу викликає onReorder(srcId, dstId).
// Перевпорядкування через Pointer Events (миша + тач). Тягнемо за ручку (.grip), якщо є.
function makeReorderable(node, type, id, onReorder, handle) {
  node.dataset.rtype = type; node.dataset.rid = String(id);
  const h = handle || node.querySelector('.grip') || node;
  h.classList.add('draghandle');
  let sx=0, sy=0, dragging=false, ghost=null, target=null;
  const TH = 7;
  h.addEventListener('pointerdown', e => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    sx = e.clientX; sy = e.clientY; dragging = false; target = null;
    document.addEventListener('pointermove', move, { passive:false });
    document.addEventListener('pointerup', up);
    document.addEventListener('pointercancel', up);
  });
  function move(e){
    if (!dragging) {
      if (Math.hypot(e.clientX - sx, e.clientY - sy) < TH) return;
      dragging = true; node.classList.add('dragging');
      ghost = node.cloneNode(true);
      Object.assign(ghost.style, { position:'fixed', left:'0', top:'0', margin:'0', pointerEvents:'none', opacity:'.92',
        width: node.offsetWidth+'px', zIndex:'70', boxShadow:'0 12px 28px rgba(0,0,0,.28)' });
      document.body.appendChild(ghost);
    }
    e.preventDefault();
    ghost.style.transform = `translate(${e.clientX - 22}px, ${e.clientY - 16}px)`;
    ghost.style.visibility = 'hidden';
    const under = document.elementFromPoint(e.clientX, e.clientY);
    ghost.style.visibility = '';
    const t = under && under.closest ? under.closest('[data-rtype="' + type + '"]') : null;
    if (target && target !== t) target.classList.remove('dragover');
    target = (t && t !== node) ? t : null;
    if (target) target.classList.add('dragover');
  }
  function up(){
    document.removeEventListener('pointermove', move);
    document.removeEventListener('pointerup', up);
    document.removeEventListener('pointercancel', up);
    node.classList.remove('dragging');
    if (ghost) { ghost.remove(); ghost = null; }
    if (dragging && target) { target.classList.remove('dragover'); const dst = parseInt(target.dataset.rid); if (dst && dst !== id) onReorder(id, dst); }
    target = null;
  }
}

function reorderTx(srcId, dstId) {
  if (srcId === dstId) return;
  const all = [...state.transactions].sort((a,b)=>(b.ord||0)-(a.ord||0));
  const src = all.find(t=>t.id===srcId), dst = all.find(t=>t.id===dstId);
  if (!src || !dst) return;
  const arr = all.filter(t=>t.id!==srcId);
  arr.splice(arr.indexOf(dst), 0, src);          // перетягнута операція стає одразу над цільовою
  arr.forEach((t,i)=> t.ord = arr.length - i);    // верх = найбільший ord
  save(); render();
}

function reorderCategory(srcId, dstId) {
  const src = state.categories.find(c=>c.id===srcId), dst = state.categories.find(c=>c.id===dstId);
  if (!src || !dst || src.kind !== dst.kind || srcId === dstId) return;
  const arr = state.categories;
  arr.splice(arr.indexOf(src), 1);
  arr.splice(arr.indexOf(dst), 0, src);
  save(); render();
}

function reorderAccount(srcId, dstId) {
  const src = state.accounts.find(a=>a.id===srcId), dst = state.accounts.find(a=>a.id===dstId);
  if (!src || !dst || srcId === dstId) return;
  const arr = state.accounts;
  arr.splice(arr.indexOf(src), 1);
  arr.splice(arr.indexOf(dst), 0, src);
  save(); render();
}

function reorderBank(srcId, dstId) {
  const src = state.banks.find(b=>b.id===srcId), dst = state.banks.find(b=>b.id===dstId);
  if (!src || !dst || srcId === dstId) return;
  const arr = state.banks;
  arr.splice(arr.indexOf(src), 1);
  arr.splice(arr.indexOf(dst), 0, src);
  save(); render();
}

// Деталі операції у вигляді блоку (тип + сума + поля) — спільне для перегляду й підтвердження видалення.
function txInfoNode(tx){
  const isT = tx.kind === 'TRANSFER', isReimb = tx.kind === 'EXPENSE' && !!tx.reimbursement, isInc = tx.kind === 'INCOME', isCrypto = tx.kind === 'CRYPTO';
  const cur = accountCur(tx.account_id);
  const cat = tx.category_id ? categoryById(tx.category_id) : null;
  const typeLabel = isCrypto ? (tx.side === 'SELL' ? 'Продаж крипти' : 'Купівля крипти') : isT ? 'Переказ' : isReimb ? 'Повернення' : isInc ? 'Надходження' : 'Витрата';
  const typeColor = isCrypto ? (tx.side === 'SELL' ? 'var(--red)' : 'var(--green)') : isT ? '#0ea5e9' : (isInc || isReimb) ? 'var(--green)' : 'var(--red)';
  const amtStr = isCrypto ? (tx.side === 'SELL' ? '−' : '+') + `${fmtAmt(tx.base_qty || 0)} ${tx.base_sym || ''}` : isT ? money(tx.amount, cur) : isReimb ? '+' + money(Math.abs(tx.amount), cur) : (isInc ? '+' : '−') + money(tx.amount, cur);
  const rows = [];
  if (isCrypto) {
    rows.push([tx.side === 'SELL' ? 'Продано' : 'Куплено', `${fmtAmt(tx.base_qty || 0)} ${tx.base_sym || ''}`]);
    rows.push([tx.side === 'SELL' ? 'Отримано' : 'Сплачено', `${fmtAmt(tx.quote_qty || 0)} ${tx.quote_sym || ''}`]);
    if (tx.base_qty > 0) rows.push(['Ціна', `${fmtAmt(round2(tx.quote_qty / tx.base_qty))} ${tx.quote_sym || ''} / ${tx.base_sym || ''}`]);
    if (tx.exchange) rows.push(['Біржа', tx.exchange]);
    if (tx.usd) rows.push(['Вартість', money(tx.usd, 'USD')]);
  } else if (isT) {
    rows.push(['Напрямок', `${accountName(tx.account_id)} → ${accountName(tx.to_account_id)}`]);
    const T = accountCur(tx.to_account_id);
    if (tx.to_amount != null && T !== cur) rows.push(['Зараховано', money(tx.to_amount, T)]);
    if (tx.fee_amount > 0) rows.push(['Комісія', money(tx.fee_amount, cur)]);
  } else if (isSplitTx(tx)) {
    tx.splits.forEach(p => rows.push([(categoryById(p.category_id)?.name || 'Без категорії') + (p.account_id ? ' · ' + accountName(p.account_id) : ''), money(p.amount, accountCur(p.account_id != null ? p.account_id : tx.account_id))]));
    rows.push(['Рахунок', accountName(tx.account_id)]);
  } else {
    rows.push(['Категорія', cat ? `${cat.icon ? cat.icon + ' ' : ''}${cat.name}` : 'Без категорії']);
    rows.push(['Рахунок', accountName(tx.account_id)]);
  }
  rows.push(['Дата', fmtDate(tx.date)]);
  if (tx.note) rows.push(['Нотатка', tx.note]);
  if (tx.tags && tx.tags.length) rows.push(['Теги', tx.tags.map(x => '#' + x).join(' ')]);
  if (tx.loan_id) { const l = state.loans.find(x => x.id === tx.loan_id); if (l) rows.push(['Кредит', l.name || 'Кредит']); }
  if (tx.recurring_id) rows.push(['Тип запису', 'Регулярний платіж']);
  return el(`<div>
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <span style="font-weight:700;color:${typeColor}">${typeLabel}</span>
      <span class="tabnum" style="font-size:22px;font-weight:800;color:${isT ? 'var(--ink)' : typeColor}">${amtStr}</span>
    </div>
    ${rows.map(([k, v]) => `<div class="row" style="justify-content:space-between;gap:18px;margin-top:6px"><span class="muted small">${esc(k)}</span><b style="text-align:right">${esc(v)}</b></div>`).join('')}
  </div>`);
}
// Перегляд операції лише на читання (без змін).
function openTxView(tx){ openModal('Операція', txInfoNode(tx), {}); }

// Видалення операції — спершу показуємо інфо й просимо підтвердження, далі видаляємо (з можливістю undo).
function deleteTx(tx) {
  const body = txInfoNode(tx);
  const warns = [];
  if (tx.loan_id) warns.push('Це платіж за кредитом — суму буде повернено у залишок боргу.');
  if (tx.recurring_id) warns.push('Це регулярний платіж — дату наступного списання буде відкочено на цикл назад.');
  if (state.transactions.some(x => x.refund_of === tx.id)) warns.push('Разом із цією витратою буде видалено й повʼязану операцію-повернення.');
  if (warns.length) body.appendChild(el(`<div class="notice" style="margin-top:12px">${warns.map(esc).join('<br>')}</div>`));
  openModal('Видалити операцію?', body, {
    saveLabel: '🗑 Видалити',
    onSave: (close) => { close(); doDeleteTx(tx); }
  });
  // кнопку підтвердження робимо «небезпечною» (червоною)
  const ok = [...document.querySelectorAll('#modal-root .overlay')].pop()?.querySelector('.mfoot .btn.primary');
  if (ok) { ok.classList.remove('primary'); ok.classList.add('danger'); }
}

// Власне видалення (після підтвердження). Якщо це платіж за кредитом (loan_id) — повертаємо суму у залишок боргу.
function doDeleteTx(tx) {
  deleteWithUndo(tx.kind === 'TRANSFER' ? 'Переказ видалено' : 'Операцію видалено', () => {
    if (tx.loan_id) {
      const loan = state.loans.find(l => l.id === tx.loan_id);
      if (loan) loan.paid = round2(Math.max(0, (loan.paid || 0) - (tx.amount || 0)));
    }
    if (tx.recurring_id) {   // це регулярний платіж — відкочуємо дату наступного списання на цикл назад
      const r = state.recurring.find(x => x.id === tx.recurring_id);
      if (r && r.next_date) r.next_date = prevRecurDate(r.next_date, r.freq);
    }
    if (tx.kind === 'CRYPTO') {   // крипто-обмін — відкочуємо обидві позиції (базу й котирування)
      const base = (state.crypto || []).find(x => x.id === tx.base_id);
      const quote = (state.crypto || []).find(x => x.id === tx.quote_id);
      const bq = tx.base_qty || 0, qq = tx.quote_qty || 0, bc = tx.base_cost_delta || 0, qc = tx.quote_cost_delta || 0, ex = tx.exchange || null;
      if (tx.side === 'SELL') {   // продали базу за котирування → повертаємо базу, забираємо котирування
        if (base) { adjustHoldingOnExchange(base, ex, bq); base.cost = round2((base.cost || 0) + bc); }
        if (quote) { adjustHoldingOnExchange(quote, ex, -qq); quote.cost = round2(Math.max(0, (quote.cost || 0) - qc)); }
      } else {                    // купили базу за котирування → забираємо базу, повертаємо котирування
        if (base) { adjustHoldingOnExchange(base, ex, -bq); base.cost = round2(Math.max(0, (base.cost || 0) - bc)); }
        if (quote) { adjustHoldingOnExchange(quote, ex, qq); quote.cost = round2((quote.cost || 0) + qc); }
      }
    }
    // прибираємо й повʼязану операцію-повернення (якщо була), щоб не лишити «мінус» сиротою
    state.transactions = state.transactions.filter(x => x.id !== tx.id && x.refund_of !== tx.id);
  });
}

const $ = (sel, root=document) => root.querySelector(sel);
const el = (html) => { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstElementChild; };
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const num = (s) => { const n = parseFloat(String(s).replace(',', '.')); return isNaN(n) ? 0 : n; };
const round2 = (n) => Math.round((n + Number.EPSILON) * 100) / 100;
const todayISO = () => { const d = new Date(); return new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,10); };
const monthStartISO = () => todayISO().slice(0,8) + '01';
const yearStartISO = () => todayISO().slice(0,4) + '-01-01';
function money(amount, cur='UAH') {
  if (hideBalances) return '••••• ' + curSym(cur);
  let v = isFinite(amount) ? amount : 0;
  // демо-масштаб лише для скріншота і ТІЛЬКИ коли немає відкритого діалогу (щоб у формах були справжні числа)
  if (screenshotMode && !document.querySelector('.overlay')) v = v * screenshotFactor;
  try { return new Intl.NumberFormat('uk-UA',{style:'currency',currency:cur,currencyDisplay:'narrowSymbol',maximumFractionDigits:2}).format(v); }
  catch(e){ return v.toFixed(2) + ' ' + curSym(cur); }
}
function fmtDate(iso){ if(!iso) return ''; const [y,m,d] = iso.slice(0,10).split('-'); return `${d}.${m}.${y}`; }

//==================== Доменні обчислення ====================
// Скільки EXPENSE/INCOME-операція торкається конкретного рахунку. Для split з рахунками
// по рядках кожна стаття списується зі свого рахунку (split.account_id) або з основного.
function txAccountShare(t, accId){
  if ((t.kind === 'EXPENSE' || t.kind === 'INCOME') && t.splits && t.splits.length) {
    let s = 0; t.splits.forEach(p => { if ((p.account_id != null ? p.account_id : t.account_id) === accId) s += (p.amount || 0); }); return s;
  }
  return t.account_id === accId ? (t.amount || 0) : 0;
}
function accountBalance(id) {
  const a = state.accounts.find(x => x.id === id);
  if (!a) return 0;
  let bal = a.initial_balance || 0;
  for (const t of state.transactions) {
    if (t.kind === 'INCOME') bal += txAccountShare(t, id);
    else if (t.kind === 'EXPENSE') bal -= txAccountShare(t, id);
    else if (t.kind === 'TRANSFER') {
      if (t.account_id === id) bal -= (t.amount + (t.fee_amount||0));
      if (t.to_account_id === id) bal += (t.to_amount||0);
    }
  }
  return round2(bal);
}
// Комісія у валюті рахунку-джерела (для списання). Для FIXED дозволяємо валюту feeCur;
// якщо це валюта призначення — конвертуємо в джерело за множником mult (T за 1 F).
function feeSourceAmount(type, val, feeCur, srcCur, amount, mult) {
  if (type === 'PERCENT') return round2(amount * (val||0) / 100);
  if (type === 'FIXED') {
    const v = Math.max(0, val||0);
    if (feeCur && feeCur !== srcCur && mult > 0) return round2(v / mult);
    return round2(v);
  }
  return 0;
}
function accountName(id){ const a = state.accounts.find(x=>x.id===id); return a ? a.name : '—'; }
function accountCur(id){ const a = state.accounts.find(x=>x.id===id); return a ? a.currency_code : 'UAH'; }
// Сума операції / комісії у гривні (для коректного зведення мультивалютних показників).
function parseTags(str){ return [...new Set((str||'').split(/[,\n]+/).map(s=>s.trim().replace(/^#/,'')).filter(Boolean))]; }
function allTags(){ const s = new Set(); state.transactions.forEach(t => (t.tags||[]).forEach(x => s.add(x))); return [...s].sort((a,b)=>a.localeCompare(b,'uk')); }
function txUAH(t){ const u = toUAH(t.amount||0, accountCur(t.account_id)); return u==null ? (t.amount||0) : u; }
function feeUAH(t){ const u = toUAH(t.fee_amount||0, accountCur(t.account_id)); return u==null ? (t.fee_amount||0) : u; }
function categoryById(id){ return state.categories.find(c=>c.id===id); }
// Розбиття операції на статті: [{category_id, amount}] — split (декілька статей) або єдина категорія.
function txParts(t){ return (t.splits && t.splits.length) ? t.splits : [{ category_id: t.category_id ?? null, amount: t.amount || 0 }]; }
// Сума операції, віднесена до категорії catId (у валюті рахунку операції).
function txCatAmount(t, catId){ return txParts(t).filter(p => (p.category_id ?? null) === catId).reduce((s, p) => s + (p.amount || 0), 0); }
// Конвертація частини суми операції у гривню (для зведень).
function partUAH(t, amount){ const u = toUAH(amount || 0, accountCur(t.account_id)); return u == null ? (amount || 0) : u; }
function isSplitTx(t){ return !!(t.splits && t.splits.length > 1); }
// Сума операції, віднесена до тегу (у валюті рахунку). Якщо є явний розподіл t.tagAmounts —
// беремо його; інакше ділимо суму операції порівну між тегами (щоб не дублювати в аналітиці).
function tagAmount(t, tag){ if (t.tagAmounts && t.tagAmounts[tag] != null) return t.tagAmounts[tag]; const n = (t.tags || []).length || 1; return round2((t.amount || 0) / n); }
// Витрачено за категорією у періоді (для бюджетів) — з урахуванням split-операцій.
function categorySpent(catId, from, to){
  return round2(state.transactions.filter(t => t.kind==='EXPENSE' && inRange(t, from, to)).reduce((s,t)=>s + partUAH(t, txCatAmount(t, catId)), 0));
}
// Період витрат категорії за її типом бюджету (місяць/рік), станом на сьогодні.
function budgetRange(c){ return c.budget_period === 'yearly' ? { from: yearStartISO(), to: todayISO(), label: 'рік' } : { from: monthStartISO(), to: todayISO(), label: 'міс.' }; }
// Діапазон попереднього місяця (для перенесення невитраченого бюджету).
function prevMonthRange(){ const n=new Date(); const d=new Date(n.getFullYear(), n.getMonth()-1, 1); const y=d.getFullYear(), m=d.getMonth(); return { from: ymd(y,m+1,1), to: ymd(y,m+1,new Date(y,m+1,0).getDate()) }; }
// Невитрачений залишок минулого місяця (для категорій з rollover).
function budgetRollover(c){ if (!(c.budget>0) || c.budget_period==='yearly' || !c.rollover) return 0; const pr=prevMonthRange(); return round2(Math.max(0, c.budget - categorySpent(c.id, pr.from, pr.to))); }
// Ефективний ліміт = бюджет + перенесене.
function effectiveBudget(c){ return round2((c.budget||0) + budgetRollover(c)); }
// Картка «Бюджети»: категорії витрат з лімітом; кожна — у своєму циклі (місяць/рік).
function budgetsCard(opts){
  const title = (opts&&opts.title) || 'Бюджети';
  const hideZero = !!(opts && opts.hideZero);   // не показувати категорії без витрат (0%)
  const cats = state.categories.filter(c => c.kind==='EXPENSE' && (c.budget||0) > 0);
  if (!cats.length) return null;
  let rows = cats.map(c => { const r = budgetRange(c); const eb = effectiveBudget(c); return { c, eb, roll: budgetRollover(c), spent: categorySpent(c.id, r.from, r.to), label: r.label }; })
    .sort((a,b)=> (b.spent/b.eb) - (a.spent/a.eb));
  const totalCount = rows.length;
  if (hideZero) rows = rows.filter(r => Math.round(r.spent / r.eb * 100) > 0);
  if (!rows.length) return null;   // усі бюджети без витрат — картку не показуємо
  const card = el(`<section class="card" style="padding:14px 16px"><h2 style="margin-bottom:8px">${esc(title)}</h2><div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:7px 18px"></div></section>`);
  const grid = card.lastElementChild;
  rows.forEach(({c, eb, roll, spent, label}) => {
    const pct = Math.min(100, Math.round(spent / eb * 100));
    const real = Math.round(spent / eb * 100);
    const over = spent > eb;
    const color = over ? 'var(--red)' : (spent >= eb*0.8 ? 'var(--amber)' : 'var(--green)');
    const tip = `${c.name} / ${label}: ${money(spent)} з ${money(eb)} (${real}%)` + (roll>0?` · перенесено ${money(roll)}`:'');
    grid.appendChild(el(`<div title="${esc(tip)}" style="display:flex;align-items:center;gap:8px;font-size:13px">
      <span class="ln" style="flex:0 0 46%">${c.icon?c.icon+' ':''}${esc(c.name)}${roll>0?' <span class="muted" style="font-size:10px">↻</span>':''}</span>
      <div class="pbar" style="flex:1"><i style="width:${pct}%;background:${color}"></i></div>
      <span class="tabnum" style="flex:0 0 auto;width:34px;text-align:right;color:${over?'var(--red)':'var(--muted)'}">${real}%</span>
    </div>`));
  });
  const hidden = totalCount - rows.length;
  if (hidden > 0) card.appendChild(el(`<div class="muted small" style="margin-top:7px">+ ${hidden} без витрат цього періоду</div>`));
  return card;
}

function inRange(t, from, to){ return (!from || t.date >= from) && (!to || t.date <= to); }

// --- Кредити ---
function bankById(id){ return state.banks.find(b => b.id === id); }
// Платіж за місяць: без відсотків = сума/місяці; з відсотками = ануїтет за річною ставкою.
function loanMonthly(l) {
  const P = l.principal || 0, n = Math.max(1, l.months || 1);
  if (!l.has_interest || !l.rate) return round2(P / n);
  const i = (l.rate / 100) / 12;
  if (i <= 0) return round2(P / n);
  const f = Math.pow(1 + i, n);
  return round2(P * (i * f) / (f - 1));
}
function loanOutstanding(l){ return round2(Math.max(0, (l.principal || 0) - (l.paid || 0))); }
function loanActive(l){ return loanOutstanding(l) > 0.005; }
function bankOutstanding(bankId){ return round2(state.loans.filter(l=>l.bank_id===bankId).reduce((s,l)=>s+loanOutstanding(l),0)); }
function bankAvailable(bank){ return round2((bank.limit || 0) - bankOutstanding(bank.id)); }
function bankMonthlyBurden(bankId){ return round2(state.loans.filter(l=>l.bank_id===bankId && loanActive(l)).reduce((s,l)=>s+loanMonthly(l),0)); }
// Чи внесено платіж по кредиту в поточному циклі (за ~місяць до дати списання).
function loanPaidThisCycle(l){
  if (!l.due_date) return false;
  const cycleStart = addMonthsISO(l.due_date, -1);
  return state.transactions.some(t => t.loan_id === l.id && t.kind === 'EXPENSE' && t.date >= cycleStart && t.date <= todayISO());
}
// Кредит «очікує платіж»: активний, термін у межах 3 днів/прострочено, і платіж цього циклу ще не внесено.
function loanPending(l){
  return loanActive(l) && !!l.due_date && l.due_date <= addDaysISO(todayISO(), 3) && !loanPaidThisCycle(l);
}
// Скільки платежів лишилось при поточному платежі M, залишку O і місячній ставці i.
function remainingMonths(O, M, i){
  if (O <= 0 || M <= 0) return 0;
  if (!(i > 0)) { const n = O / M; const r = Math.round(n); return Math.abs(n-r) < 0.1 ? r : Math.ceil(n); }
  if (M <= O * i) return Infinity;   // платіж не покриває навіть відсотки
  const n = -Math.log(1 - i*O/M) / Math.log(1+i);
  const r = Math.round(n);
  return Math.abs(n - r) < 0.1 ? r : Math.ceil(n);   // приліплюємо до цілого (нівелюємо округлення платежу)
}
function loanMonthlyRate(l){ return (l.has_interest && l.rate > 0) ? (l.rate/100/12) : 0; }
// Орієнтовно місяців до повного погашення (з урахуванням відсотків). Infinity, якщо платіж не покриває %.
function loanMonthsLeft(l){
  const O = loanOutstanding(l), M = loanMonthly(l), i = loanMonthlyRate(l);
  if (O <= 0 || M <= 0) return 0;
  if (i <= 0) return Math.ceil(O / M);
  if (M <= O * i) return Infinity;   // платіж менший за нараховані відсотки — борг не зменшується
  return Math.ceil(-Math.log(1 - O * i / M) / Math.log(1 + i));
}

// Калькулятор дострокового погашення кредиту.
function openPayoff(l, bank){
  const cur = bank.currency, M = loanMonthly(l), O = loanOutstanding(l), i = loanMonthlyRate(l);
  const nRem = remainingMonths(O, M, i);
  const totalRem = nRem === Infinity ? Infinity : round2(M * nRem);
  const interestRem = totalRem === Infinity ? Infinity : round2(Math.max(0, totalRem - O));
  const fmtN = v => v === Infinity ? '∞' : v;
  const body = el(`<div>
    <div class="preview">
      <div class="pl"><span class="muted">Залишок боргу</span><b class="tabnum">${money(O,cur)}</b></div>
      <div class="pl"><span class="muted">Платежів лишилось</span><b class="tabnum">${fmtN(nRem)}</b></div>
      <div class="pl"><span class="muted">Ще сплатите за графіком</span><b class="tabnum">${interestRem===Infinity?'∞':money(totalRem,cur)}</b></div>
      <div class="pl"><span class="muted">з них відсотки</span><b class="tabnum" style="color:var(--amber)">${interestRem===Infinity?'∞':money(interestRem,cur)}</b></div>
    </div>
    <div class="small" style="margin-top:8px;color:var(--green)">Якщо погасити зараз увесь залишок — зекономите ≈ ${interestRem===Infinity?'∞':money(interestRem,cur)} відсотків.</div>
    <div style="margin-top:10px"><label class="lab">Або разовий додатковий платіж (${curSym(cur)})</label><input id="po-extra" inputmode="decimal" placeholder="0.00"></div>
    <div class="preview" id="po-result" style="display:none">
      <div class="pl"><span class="muted">Новий залишок</span><b class="tabnum" id="po-newo">—</b></div>
      <div class="pl"><span class="muted">Термін скоротиться на</span><b class="tabnum" id="po-saved">—</b></div>
      <div class="pl"><span class="muted">Економія відсотків</span><b class="tabnum" id="po-isave" style="color:var(--green)">—</b></div>
    </div>
  </div>`);
  const $$ = s => $(s, body);
  $$('#po-extra').addEventListener('input', () => {
    const X = round2(num($$('#po-extra').value));
    const res = $$('#po-result');
    if (X <= 0) { res.style.display = 'none'; return; }
    const newO = round2(Math.max(0, O - X));
    const nRem2 = remainingMonths(newO, M, i);
    const totalRem2 = nRem2 === Infinity ? Infinity : round2(M * nRem2);
    const interestRem2 = totalRem2 === Infinity ? Infinity : round2(Math.max(0, totalRem2 - newO));
    const monthsSaved = (nRem===Infinity||nRem2===Infinity) ? '∞' : Math.max(0, nRem - nRem2);
    const isave = (interestRem===Infinity||interestRem2===Infinity) ? '∞' : money(round2(Math.max(0, interestRem - interestRem2)), cur);
    res.style.display = '';
    $$('#po-newo').textContent = money(newO, cur);
    $$('#po-saved').textContent = monthsSaved + ' міс';
    $$('#po-isave').textContent = isave;
  });
  openModal('Дострокове погашення — ' + (l.name||'Кредит'), body, {});
}

//==================== Навігація (через хеш URL — зберігається при перезавантаженні) ====================
const views = {};
let currentView = 'dashboard';
function hashView(){ const v = decodeURIComponent((location.hash || '').replace(/^#/, '')); return views[v] ? v : null; }
function navigate(v){
  if (!views[v]) v = 'dashboard';
  const changed = v !== currentView;
  currentView = v;
  if (('#' + v) !== location.hash) location.hash = v;   // запамʼятовуємо вкладку в URL
  document.querySelectorAll('.nav a').forEach(a => a.classList.toggle('active', a.dataset.view === v));
  applyNavMenu();   // показ/приховання розділів + стан кнопки «…» (тут views вже визначені — на старті йде через navigate())
  render();
  if (changed) window.scrollTo(0, 0);   // при зміні вкладки — на початок
}
// Перемальовує поточну вкладку, зберігаючи позицію прокрутки (щоб зміни оновлювались «на місці»).
function render(){ const y = window.scrollY; const app = $('#app'); app.innerHTML = ''; views[currentView](app); enhanceSelects(app); enhanceCalcInputs(app); applyLang(); window.scrollTo(0, y); }   // переклад ПІСЛЯ enhance — щоб кастомні кнопки/калькулятор теж переклались

window.addEventListener('hashchange', () => { const v = hashView(); if (v && v !== currentView) navigate(v); });
document.querySelectorAll('.nav a').forEach(a => {
  a.setAttribute('tabindex', '0'); a.setAttribute('role', 'link');   // <a> без href сам не фокусується — робимо доступним з клавіатури
  a.addEventListener('click', e => { e.preventDefault(); navigate(a.dataset.view); });
  a.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); navigate(a.dataset.view); } });
});
{ const more = document.getElementById('navmore'); if (more) more.addEventListener('click', e => { e.preventDefault(); openNavMore(); }); }

// Свайпи вліво/вправо — перехід між вкладками (тач).
const VIEW_ORDER = ['dashboard','transactions','analytics','accounts','credits','crypto','goals','recurring','categories','settings'];
applyNavMenu();   // застосувати збережені налаштування меню (приховані розділи → під «…»)
// Порядок свайпу = видимі розділи меню (приховані під «…» пропускаємо). Поточний
// розділ лишаємо в послідовності, навіть якщо він прихований — щоб можна було «вийти» з нього свайпом.
function navOrder(){ return VIEW_ORDER.filter(v => !navHidden.has(v) || v === currentView); }
function swipeNavigate(dir){
  const order = navOrder();
  const i = order.indexOf(currentView), ni = i + dir;
  if (i < 0 || ni < 0 || ni >= order.length) return;
  navigate(order[ni]);
}
(function setupSwipe(){
  let sx=0, sy=0, on=false;
  document.addEventListener('touchstart', e => {
    on = false;
    if (e.touches.length !== 1) return;
    if (document.querySelector('.overlay') || document.querySelector('.ctxmenu')) return;  // не свайпати при відкритому діалозі/меню
    const x = e.touches[0].clientX;
    if (x < 24 || x > window.innerWidth - 24) return;   // лишаємо крайові свайпи браузеру (назад/вперед)
    const t = e.target;
    if (t.closest && t.closest('input,select,textarea,.nav,.emojigrid,.acc,.draghandle,svg,.modal,.pbar,.bar')) return;
    sx = x; sy = e.touches[0].clientY; on = true;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (!on) return; on = false;
    const dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy) * 1.8) swipeNavigate(dx < 0 ? 1 : -1);
  }, { passive: true });
})();

//==================== Модалка ====================
function openModal(title, bodyNode, { onSave, saveLabel='Зберегти', wide=false, topSheet=false } = {}) {
  const root = $('#modal-root');
  const prevFocus = document.activeElement;   // щоб повернути фокус після закриття (a11y)
  const overlay = el(`<div class="overlay${topSheet ? ' topsheet' : ''}"></div>`);
  const modal = el(`<div class="card modal" role="dialog" aria-modal="true"></div>`);
  modal.setAttribute('aria-label', title);
  const head = el(`<div class="mhead"><h2>${esc(title)}</h2><button class="x" aria-label="Закрити">×</button></div>`);
  const body = el(`<div class="mbody"></div>`);
  body.appendChild(bodyNode);
  modal.appendChild(head); modal.appendChild(body);
  if (onSave) {
    const foot = el(`<div class="mfoot"></div>`);
    const cancel = el(`<button class="btn ghost">Скасувати</button>`);
    const ok = el(`<button class="btn primary">${esc(saveLabel)}</button>`);
    cancel.onclick = close; ok.onclick = () => onSave(close);
    foot.appendChild(cancel); foot.appendChild(ok); modal.appendChild(foot);
  }
  overlay.appendChild(modal); root.appendChild(overlay);
  enhanceSelects(modal); enhanceCalcInputs(modal); translateTree(modal);   // enhance ДО перекладу — щоб title калькулятора/кнопок переклались
  function close(){ overlay.remove(); document.removeEventListener('keydown', onKey); if (prevFocus && prevFocus.focus) { try { prevFocus.focus(); } catch (e) {} } }
  overlay.addEventListener('mousedown', e => { if (e.target === overlay) close(); });
  head.querySelector('.x').onclick = close;
  function onKey(e){ if (e.key === 'Escape') close(); }
  document.addEventListener('keydown', onKey);
  const firstFocus = modal.querySelector('input, .selbtn') || head.querySelector('.x');
  if (firstFocus) firstFocus.focus();
  return close;
}

// Власні діалоги (замість нативних confirm/alert/prompt) — у стилі застосунку, з нижнім листом на мобільному.
// Повертає Promise: confirm → bool, alert → true, prompt → рядок або null.
function appDialog({ title = '', message = '', body = null, okLabel = 'OK', cancelLabel = null, danger = false }){
  return new Promise(resolve => {
    const root = $('#modal-root'); const prevFocus = document.activeElement;
    const overlay = el(`<div class="overlay"></div>`);
    const modal = el(`<div class="card modal" role="dialog" aria-modal="true"></div>`); modal.setAttribute('aria-label', title);
    const head = el(`<div class="mhead"><h2>${esc(title)}</h2><button class="x" aria-label="Закрити">×</button></div>`);
    const bd = el(`<div class="mbody"></div>`);
    bd.appendChild(body || el(`<div style="line-height:1.5;white-space:pre-line">${esc(message)}</div>`));
    const foot = el(`<div class="mfoot"></div>`);
    if (cancelLabel) { const c = el(`<button class="btn ghost">${esc(cancelLabel)}</button>`); c.onclick = () => done(false); foot.appendChild(c); }
    const ok = el(`<button class="btn ${danger ? 'danger' : 'primary'}">${esc(okLabel)}</button>`); ok.onclick = () => done(true); foot.appendChild(ok);
    modal.appendChild(head); modal.appendChild(bd); modal.appendChild(foot);
    overlay.appendChild(modal); root.appendChild(overlay); enhanceSelects(modal); enhanceCalcInputs(modal); translateTree(modal);
    let settled = false;
    function done(v){ if (settled) return; settled = true; overlay.remove(); document.removeEventListener('keydown', onKey); if (prevFocus && prevFocus.focus) { try { prevFocus.focus(); } catch (e) {} } resolve(v); }
    function onKey(e){ if (e.key === 'Escape') done(false); }
    overlay.addEventListener('mousedown', e => { if (e.target === overlay) done(false); });
    head.querySelector('.x').onclick = () => done(false);
    document.addEventListener('keydown', onKey);
    (modal.querySelector('input, select') || ok).focus();
  });
}
function confirmModal(title, message, opts = {}){ return appDialog({ title, message, okLabel: opts.okLabel || 'Так', cancelLabel: opts.cancelLabel || 'Скасувати', danger: opts.danger }); }
function alertModal(message, title = 'Увага'){ return appDialog({ title, message, okLabel: 'OK' }); }
function promptModal(title, label, value = ''){ const body = el(`<div><label class="lab">${esc(label || '')}</label><input id="pm-in" value="${esc(value)}"></div>`); return appDialog({ title, body, okLabel: 'OK', cancelLabel: 'Скасувати' }).then(okp => okp ? $('#pm-in', body).value : null); }

// ——— Кастомний select: ховаємо нативний <select>, показуємо кнопку + випадайку як меню ———
function openSelectMenu(anchor, sel){
  document.querySelectorAll('.ctxmenu, .selmenu').forEach(m => m.remove());
  const menu = el(`<div class="selmenu"></div>`);
  const cur = sel.value;
  const optRow = (o) => {
    const isSel = o.value === cur;
    const row = el(`<div class="ci${isSel ? ' sel' : ''}"><span class="cilbl">${o.innerHTML || esc(o.textContent)}</span>${isSel ? '<span class="cichk">✓</span>' : ''}</div>`);
    row.onclick = () => { close(); if (sel.value !== o.value) { sel.value = o.value; sel.dispatchEvent(new Event('change', { bubbles: true })); } sel._sync && sel._sync(); };
    return row;
  };
  [...sel.children].forEach(node => {
    if (node.tagName === 'OPTGROUP') { menu.appendChild(el(`<div class="chead">${esc(node.label)}</div>`)); [...node.children].forEach(o => menu.appendChild(optRow(o))); }
    else if (node.tagName === 'OPTION') menu.appendChild(optRow(node));
  });
  document.body.appendChild(menu); translateTree(menu);
  const r = anchor.getBoundingClientRect();
  menu.style.minWidth = Math.max(r.width, 200) + 'px';
  let mh = menu.getBoundingClientRect();
  let left = Math.min(r.left, window.innerWidth - mh.width - 8);
  let top = r.bottom + 4;
  if (top + mh.height > window.innerHeight - 8) {
    if (r.top - mh.height - 4 >= 8) top = r.top - mh.height - 4;             // місця внизу нема — відкриваємо вгору
    else { top = 8; menu.style.maxHeight = (window.innerHeight - 16) + 'px'; } // надто довгий — на весь екран зі скролом
  }
  menu.style.left = Math.max(8, left) + 'px'; menu.style.top = Math.max(8, top) + 'px';
  const selRow = menu.querySelector('.ci.sel'); if (selRow) selRow.scrollIntoView({ block: 'nearest' });
  function close(){ menu.remove(); document.removeEventListener('mousedown', onDown, true); document.removeEventListener('keydown', onKey, true); }
  function onDown(e){ if (!menu.contains(e.target)) close(); }
  function onKey(e){ if (e.key === 'Escape') close(); }
  setTimeout(() => { document.addEventListener('mousedown', onDown, true); document.addEventListener('keydown', onKey, true); }, 0);
}
function enhanceSelect(sel){
  if (sel.dataset.enh || sel.multiple) return; sel.dataset.enh = '1';
  sel.style.display = 'none'; sel.setAttribute('tabindex', '-1'); sel.setAttribute('aria-hidden', 'true');
  const btn = el(`<button type="button" class="selbtn"><span class="seltxt"></span><span class="selcar">▼</span></button>`);
  const sync = () => { const o = sel.options[sel.selectedIndex]; btn.querySelector('.seltxt').innerHTML = o ? (o.innerHTML || esc(o.textContent)) : ''; btn.disabled = sel.disabled; btn.classList.toggle('hidden', sel.classList.contains('hidden')); };
  sel._sync = sync;
  sel.insertAdjacentElement('afterend', btn);
  btn.onclick = () => { if (!sel.disabled) openSelectMenu(btn, sel); };
  sel.addEventListener('change', sync);   // ре-синк при програмній зміні (.dispatchEvent('change')) та виборі
  sync();
}
function enhanceSelects(root){ (root || document).querySelectorAll('select').forEach(enhanceSelect); }

// ——— Калькулятор у полях вводу сум ———
// Безпечний обчислювач виразу (+ − × ÷, дужки, унарний мінус). Повертає число або null.
function calcEval(str){
  if (str == null) return null;
  let s = String(str).replace(/,/g, '.').replace(/×/g, '*').replace(/÷/g, '/').replace(/[−–—]/g, '-').replace(/\s+/g, '');

    if (/[0-9.]/.test(c)) { let j = i + 1; while (j < s.length && /[0-9.]/.test(s[j])) j++; const v = parseFloat(s.slice(i, j)); if (!isFinite(v)) return null; toks.push({ t: 'n', v }); i = j; }
    else { toks.push({ t: c }); i++; }
  }
  const out = [], ops = [], prec = { '+': 1, '-': 1, '*': 2, '/': 2 }; let prev = null;
  for (const tk of toks) {
    if (tk.t === 'n') out.push(tk.v);
    else if (tk.t === '(') ops.push('(');
    else if (tk.t === ')') { while (ops.length && ops[ops.length - 1] !== '(') out.push(ops.pop()); if (!ops.length) return null; ops.pop(); }
    else {

  while (ops.length) { const o = ops.pop(); if (o === '(') return null; out.push(o); }

function openCalc(input){

  const start = (input.value || '').trim();
  let expr = /[0-9]/.test(start) ? start.replace(/,/g, '.') : '';

  const dispEl = $('#calc-expr', body), resEl = $('#calc-res', body), pad = body.querySelector('.calcpad');
  const fmtNum = n => { const r = Math.round(n * 1e6) / 1e6; return (Object.is(r, -0) ? 0 : r).toLocaleString('uk-UA', { maximumFractionDigits: 6 }); };
  const refresh = () => { dispEl.innerHTML = (expr.replace(/\*/g, '×').replace(/\//g, '÷')) || '&nbsp;'; const r = calcEval(expr); resEl.textContent = (expr && r != null) ? fmtNum(r) : (expr ? '—' : '0'); };
  const onKey = (k) => {
    if (k === 'C') expr = '';
    else if (k === '⌫') expr = expr.slice(0, -1);
    else if (k === '=') { const r = calcEval(expr); if (r != null) expr = String(round2(r)); }
    else { expr += ({ '×': '*', '÷': '/', '−': '-' }[k] || k); }
    refresh();
  };
  [['C', 'act'], ['(', ''], [')', ''], ['÷', 'op'], ['7', ''], ['8', ''], ['9', ''], ['×', 'op'], ['4', ''], ['5', ''], ['6', ''], ['−', 'op'], ['1', ''], ['2', ''], ['3', ''], ['+', 'op'], ['0', ''], ['.', ''], ['⌫', 'act'], ['=', 'eq']].forEach(([label, cls]) => {
    const b = el(`<button type="button" class="calckey ${cls}">${label}</button>`); b.onclick = () => onKey(label); pad.appendChild(b);
  });
  const onPhys = (e) => {
    const k = e.key;
    if (/[0-9.()]/.test(k) && k.length === 1) onKey(k);
    else if (k === '+') onKey('+'); else if (k === '-') onKey('−'); else if (k === '*') onKey('×'); else if (k === '/') onKey('÷');
    else if (k === 'Enter') onKey('='); else if (k === 'Backspace') onKey('⌫'); else return;
    e.preventDefault();
  };
  refresh();
  document.addEventListener('keydown', onPhys);
  appDialog({ title: 'Калькулятор', body, okLabel: 'Готово', cancelLabel: 'Скасувати' }).then(ok => {
    document.removeEventListener('keydown', onPhys);
    if (!ok) return;
    const r = calcEval(expr); if (r == null) return;
    input.value = String(round2(r));
    input.dispatchEvent(new Event('input', { bubbles: true }));
    input.dispatchEvent(new Event('change', { bubbles: true }));

}
function enhanceCalc(inp){
  if (inp.dataset.calc || (inp.getAttribute('inputmode') || '') !== 'decimal') return;

// Контекстне меню біля курсору. items: [{label, icon, color, onClick} | {sep:true}], title — необовʼязковий заголовок.
function openContextMenu(x, y, items, title) {
  document.querySelectorAll('.ctxmenu').forEach(m => m.remove());
  const menu = el(`<div class="ctxmenu"></div>`);
  if (title) menu.appendChild(el(`<div class="chead">${esc(title)}</div>`));
  items.forEach(it => {
    if (it.sep) { menu.appendChild(el(`<div class="sep"></div>`)); return; }
    const row = el(`<div class="ci">${it.icon?`<span class="cdot" style="background:${it.color||'#64748b'}">${it.icon}</span>`:''}<span>${esc(it.label)}</span></div>`);
    row.onclick = () => { close(); it.onClick(); };
    menu.appendChild(row);
  });
  document.body.appendChild(menu);
  translateTree(menu);
  // тримаємо меню в межах вікна
  const r = menu.getBoundingClientRect();
  const px = Math.min(x, window.innerWidth - r.width - 8);
  const py = Math.min(y, window.innerHeight - r.height - 8);
  menu.style.left = Math.max(8, px) + 'px';
  menu.style.top = Math.max(8, py) + 'px';
  function close(){ menu.remove(); document.removeEventListener('mousedown', onDown, true); document.removeEventListener('keydown', onKey, true); }
  function onDown(e){ if (!menu.contains(e.target)) close(); }
  function onKey(e){ if (e.key === 'Escape') close(); }
  setTimeout(() => { document.addEventListener('mousedown', onDown, true); document.addEventListener('keydown', onKey, true); }, 0);
}

// Перетягування картки рахунку через Pointer Events (працює і мишею, і пальцем).
// Тап без переміщення відкриває меню дій. Drop на іншу картку — діалог переказу.
function enableCardDrag(node, a){
  let sx=0, sy=0, dragging=false, armed=false, moved=false, ghost=null, target=null;
  const TH = 8;
  node.addEventListener('pointerdown', e => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    armed = !!(e.target.closest && e.target.closest('.grip'));   // тягнемо лише за ручку ⠿
    sx = e.clientX; sy = e.clientY; dragging = false; moved = false; target = null;
    document.addEventListener('pointermove', move, { passive:false });
    document.addEventListener('pointerup', up);
    document.addEventListener('pointercancel', up);
  });
  function move(e){
    const dx = e.clientX - sx, dy = e.clientY - sy;
    if (Math.hypot(dx, dy) >= TH) moved = true;
    if (!armed) return;            // не за ручку — не тягнемо (даємо прокрутити сторінку)
    if (!dragging) {
      if (Math.hypot(dx, dy) < TH) return;
      dragging = true; node.classList.add('dragging');
      ghost = node.cloneNode(true);
      Object.assign(ghost.style, { position:'fixed', left:'0', top:'0', margin:'0', pointerEvents:'none', opacity:'.92',
        width: node.offsetWidth+'px', zIndex:'70', boxShadow:'0 12px 28px rgba(0,0,0,.28)' });
      document.body.appendChild(ghost);
    }
    e.preventDefault();
    ghost.style.transform = `translate(${e.clientX - node.offsetWidth/2}px, ${e.clientY - 22}px)`;
    ghost.style.visibility = 'hidden';
    const under = document.elementFromPoint(e.clientX, e.clientY);
    ghost.style.visibility = '';
    const t = under && under.closest ? under.closest('.acc') : null;
    if (target && target !== t) target.classList.remove('dragover');
    target = (t && t !== node) ? t : null;
    if (target) target.classList.add('dragover');
  }
  function up(e){
    document.removeEventListener('pointermove', move);
    document.removeEventListener('pointerup', up);
    document.removeEventListener('pointercancel', up);
    node.classList.remove('dragging');
    if (ghost) { ghost.remove(); ghost = null; }
    if (dragging) {
      if (target) { target.classList.remove('dragover'); const toId = parseInt(target.dataset.acc); if (toId && toId !== a.id) openTransferDialog(a.id, toId); }
    } else if (!moved) {
      accountActionMenu(a, e.clientX || sx, e.clientY || sy);   // тап (без руху) → меню
    }
    target = null;
  }
}
